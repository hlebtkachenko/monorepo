name: DB migration lint (squawk)

# Runs squawk against migration SQL files on PRs that touch migrations/.
# Flags destructive or unsafe DDL patterns (missing NOT VALID, lock escalation
# risks, etc.) before they reach main.
#
# ADVISORY — continue-on-error: true per project convention for new workflows.
# Flip to required after a full PR cycle passes green.

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/db/migrations/**"

permissions: {}

concurrency:
  group: db-migration-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  squawk:
    name: squawk migration lint
    runs-on: ubuntu-latest
    continue-on-error: true # ADVISORY
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install squawk via cargo
        run: |
          set -euo pipefail
          # squawk distributes via crates.io; binary releases on GitHub are
          # inconsistent across versions. cargo install is the canonical path.
          # ubuntu-latest ships cargo via rustup.
          cargo install squawk --locked --version 2.59.0
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Lint migrations
        # Rule exclusions (per project convention; revisit when retrofitting):
        # - prefer-text-field: we use varchar/text intentionally per schema design.
        # - disallowed-unique-constraint: unique constraints via indexes are
        #   preferred but some early migrations use inline UNIQUE — allowed.
        # - require-timeout-settings: not retrofitted yet. The migration runner
        #   wraps every file in a transaction; bare `SET LOCAL statement_timeout`
        #   + `SET LOCAL lock_timeout` per migration would be tidier but is out
        #   of scope for the current rebuild. Track via a separate cleanup PR.
        # - ban-drop-column: 0013 intentionally drops `workspace_billing.plan`
        #   (the column was only present from 0012, never written to in
        #   production data, and is owned by the same PR that introduced it).
        #   Squawk can't distinguish that from a destructive drop.
        # - ban-drop-table: 0020 intentionally drops `auth_invite` after the
        #   AFF-198 cutover. Pre-prod posture, no real users; the table was
        #   migrated INTO auth_token in 0018 before being dropped here.
        #   Same rationale as ban-drop-column.
        # - ban-drop-not-null: 0021 intentionally drops NOT NULL from
        #   audit_event.workspace_id so Better Auth `hooks.after` pre-account
        #   events (failed login of unknown email) can persist with NULL
        #   workspace_id. RLS guards keep tenant reads scoped. Pre-prod, no
        #   existing clients to break.
        # - require-concurrent-index-creation / require-concurrent-index-deletion:
        #   the migration runner wraps every file in a transaction, and
        #   CONCURRENTLY cannot run inside one. 0023 documents the trade-off
        #   inline (tables are tiny pre-v1; revisit before tool_call_log /
        #   auth_token grow — same revisit marker as require-timeout-settings).
        # - ban-char-field: the accounting schema uses fixed-length codes where
        #   char(N) is correct, not a mistake — char(3) is ISO-4217 currency +
        #   3-digit directive codes, char(2) a generated group code. varchar
        #   would add zero safety and edit reviewed migrations + the snapshot.
        # - adding-field-with-default: fires on GENERATED-column additions in the
        #   accounting migrations (projection columns). The warning is about
        #   ACCESS EXCLUSIVE rewrite locks — moot pre-v1 on tiny tables inside the
        #   runner's per-file transaction (revisit before those tables grow).
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          squawk \
            --exclude prefer-text-field,disallowed-unique-constraint,require-timeout-settings,ban-drop-column,ban-drop-table,ban-drop-not-null,prefer-bigint-over-int,prefer-bigint-over-smallint,constraint-missing-not-valid,adding-foreign-key-constraint,require-concurrent-index-creation,require-concurrent-index-deletion,ban-char-field,adding-field-with-default \
            packages/db/migrations/*.sql
