# FireLens / Fluent Bit config for when log forwarding to Honeycomb gets
# enabled. Until then the awslogs driver in infra/cdk/lib/app-stack.ts is the
# sole log path; this file is referenced only by the (currently nonexistent)
# `log_router` container in the ECS task definition.
#
# Pipeline shape (when wired):
#   stdout (web / api / pgbouncer / cerbos / openfga) →
#     awslogs driver (always-on baseline, CloudWatch /ecs/{env}/{container})
#     +
#     FireLens stdout intercept →
#       Fluent Bit (this config) →
#         OTel Collector localhost:4318 (HTTP OTLP) → Honeycomb
#
# CloudWatch is the durable always-on sink. Honeycomb is the high-cardinality
# query target. If the OTLP forward fails, awslogs keeps the data — there is
# no data loss path when Honeycomb is down.

[SERVICE]
    Flush               5
    Grace               30
    Log_Level           info
    Daemon              off
    Parsers_File        parsers.conf
    HTTP_Server         off
    Health_Check        on
    HC_Errors_Count     5
    HC_Retry_Failure_Count 5
    HC_Period           60

# CloudWatch always-on baseline.
# ECS FireLens automatically generates an [INPUT] for each application
# container in the task; we do NOT redeclare it here. Stream tags come from
# the container name (matched below).

[FILTER]
    Name                parser
    Match               *-firelens-*
    Key_Name            log
    Parser              pino_json
    Reserve_Data        On
    Preserve_Key        Off

[FILTER]
    Name                modify
    Match               *
    Add                 ecs_cluster ${ECS_CLUSTER}
    Add                 ecs_task_definition ${ECS_TASK_DEFINITION_FAMILY}
    Add                 app_env ${APP_ENV}

# Sink 1 — CloudWatch (always on, the durable baseline). Required because
# ADR-0007 single-account MVP keeps CloudWatch as the contract surface for
# ECS task lifecycle / circuit-breaker observability.
[OUTPUT]
    Name                cloudwatch_logs
    Match               *-firelens-*
    region              ${AWS_REGION}
    log_group_name      /ecs/${APP_ENV}/firelens
    log_stream_prefix   ${ECS_TASK_ID}/
    auto_create_group   false

# Sink 2 — OTel Collector forward (conditional). The sidecar is only started
# when HONEYCOMB_API_KEY is provisioned in Secrets Manager. If the collector
# is not running, this output will retry per Fluent Bit defaults; logs still
# reach CloudWatch via Sink 1.
[OUTPUT]
    Name                opentelemetry
    Match               *-firelens-*
    Host                127.0.0.1
    Port                4318
    Metrics_uri         /v1/metrics
    Logs_uri            /v1/logs
    Traces_uri          /v1/traces
    Log_response_payload False
    add_label           app_env ${APP_ENV}
