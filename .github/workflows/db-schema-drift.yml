# Schema drift detector.
#
# Catches: a hand-edited Drizzle schema file that diverges from the
# migration DDL, OR a migration applied without updating the committed
# schema snapshot. Either way, runtime types and DB shape would disagree.
#
# Mechanism: apply migrations against a fresh postgres, pg_dump the result,
# normalize, diff against the committed snapshot at
# packages/db/migrations/.schema-snapshot.sql. Any diff fails the check.
#
# Updating the snapshot: developer runs `pnpm --filter @workspace/db
# db:schema-snapshot` locally (or copies the CI artifact on failure) and
# commits the result. Out-of-band updates are the intended workflow —
# schema changes always require a snapshot bump.
#
# Advisory until first green PR cycle. drizzle-kit introspect is forbidden
# by ADR-0009, so this is the alternative for tracking schema-vs-migration
# parity.
#
# ── KNOWN LIMITATION: model↔migration index drift ────────────────────────────
# This workflow compares applied migrations against the committed SQL snapshot
# only. It never parses the TypeScript Drizzle schema files under
# packages/db/src/schema/. A divergence between a migration-created index and
# the corresponding Drizzle model is therefore NOT detected here.
#
# Example: migration 0004_audit.sql creates UNIQUE index
# `tool_call_log_idemp_unique` on tool_call_log(organization_id, tool_name,
# idempotency_key). The Drizzle model packages/db/src/schema/tool_call_log.ts
# declares no matching uniqueIndex() — and intentionally never will.
#
# Project convention (ADR-0009): migrations are the sole owner of all index
# DDL; Drizzle schema files declare no indexes by design. This blind spot is
# therefore an accepted, documented limitation of this workflow, not a bug.
# ─────────────────────────────────────────────────────────────────────────────

name: DB schema drift

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/db/migrations/**"
      - "packages/db/schema-snapshot.sql"
      - "packages/db/src/schema/**"
      - "scripts/db-schema-snapshot.sh"
      - ".github/workflows/db-schema-drift.yml"
  push:
    branches: [main]
    paths:
      - "packages/db/migrations/**"
      - "packages/db/schema-snapshot.sql"

permissions: {}

concurrency:
  group: db-schema-drift-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  drift:
    name: Migration vs schema snapshot
    runs-on: ubuntu-latest
    continue-on-error: true # ADVISORY — flip to required after first green run
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Install pg client 18 via PGDG apt repo
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          # Ubuntu 24.04 (noble) default repos don't carry postgresql-18 yet.
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          codename=$(. /etc/os-release && echo "$VERSION_CODENAME")
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${codename}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-18

      - name: Wait for postgres + bootstrap roles
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do sleep 2; done
          for f in infra/compose/postgres/init.d/*.sql; do
            psql -h 127.0.0.1 -p 5432 -U postgres -f "$f"
          done

      - name: Apply migrations
        env:
          DATABASE_DIRECT_URL: postgresql://app_owner:dev_owner@127.0.0.1:5432/postgres
        run: pnpm --filter @workspace/db db:migrate

      - name: Dump schema (normalized)
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: app_owner
          PGPASSWORD: dev_owner
          PGDATABASE: postgres
        run: |
          set -euo pipefail
          chmod +x scripts/db-schema-snapshot.sh
          scripts/db-schema-snapshot.sh > /tmp/current-schema.sql

      - name: Diff against committed snapshot
        run: |
          set -euo pipefail
          snapshot="packages/db/schema-snapshot.sql"
          if [ ! -f "$snapshot" ]; then
            echo "::error::Snapshot file missing: $snapshot"
            echo "Generate with: pnpm --filter @workspace/db db:schema-snapshot"
            echo "Commit the result and re-run this check."
            exit 1
          fi
          if ! diff -u "$snapshot" /tmp/current-schema.sql; then
            echo "::error::Schema drift detected. The applied migrations produce a different shape than the committed snapshot."
            echo ""
            echo "If this PR adds/changes migrations, the lefthook pre-commit hook normally"
            echo "regenerates the snapshot automatically. If you bypassed the hook (--no-verify):"
            echo ""
            echo "  Option A — regenerate locally (requires running Postgres):"
            echo "    pnpm --filter @workspace/db db:schema-snapshot"
            echo "    git add packages/db/schema-snapshot.sql && git commit"
            echo ""
            echo "  Option B — download from CI (no local Postgres needed):"
            echo "    1. Go to the Actions run that failed."
            echo "    2. Download the 'schema-drift-current' artifact."
            echo "    3. Copy the extracted file to packages/db/schema-snapshot.sql."
            echo "    4. git add packages/db/schema-snapshot.sql && git commit"
            exit 1
          fi
          echo "Schema matches snapshot"

      - name: Upload current dump as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: schema-drift-current
          path: /tmp/current-schema.sql
          retention-days: 7
