# Tests for the journal_entry resource policy.
#
# Verifies:
#   - Delete action is always denied (no rule exists for it = default deny)
#   - Edit is denied when entry is posted
#   - Edit is allowed when entry is not yet posted
#   - View is allowed for all org members
#   - View is allowed for guests
---
name: Journal entry resource policy tests
description: Verifies immutability — delete always denied, edit denied once posted
tests:
  - name: delete is denied for org admin (no delete rule in policy)
    input:
      principals:
        - id: admin-001
          roles: [org_admin]
      resources:
        - id: je-001
          kind: journal_entry
          attr:
            posted: false
      actions: [delete]
    expected:
      - principal: admin-001
        resource: je-001
        actions:
          delete: EFFECT_DENY

  - name: delete is denied for org owner (no delete rule in policy)
    input:
      principals:
        - id: owner-001
          roles: [org_owner]
      resources:
        - id: je-001
          kind: journal_entry
          attr:
            posted: false
      actions: [delete]
    expected:
      - principal: owner-001
        resource: je-001
        actions:
          delete: EFFECT_DENY

  - name: edit is denied when entry is posted
    input:
      principals:
        - id: admin-001
          roles: [org_admin]
      resources:
        - id: je-posted
          kind: journal_entry
          attr:
            posted: true
      actions: [edit]
    expected:
      - principal: admin-001
        resource: je-posted
        actions:
          edit: EFFECT_DENY

  - name: edit is allowed when entry is not posted
    input:
      principals:
        - id: member-001
          roles: [org_member]
      resources:
        - id: je-draft
          kind: journal_entry
          attr:
            posted: false
      actions: [edit]
    expected:
      - principal: member-001
        resource: je-draft
        actions:
          edit: EFFECT_ALLOW

  - name: view is allowed for org member
    input:
      principals:
        - id: member-001
          roles: [org_member]
      resources:
        - id: je-posted
          kind: journal_entry
          attr:
            posted: true
      actions: [view]
    expected:
      - principal: member-001
        resource: je-posted
        actions:
          view: EFFECT_ALLOW

  - name: view is allowed for guest
    input:
      principals:
        - id: guest-001
          roles: [org_guest]
      resources:
        - id: je-001
          kind: journal_entry
          attr:
            posted: false
      actions: [view]
    expected:
      - principal: guest-001
        resource: je-001
        actions:
          view: EFFECT_ALLOW
