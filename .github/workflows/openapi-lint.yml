# OpenAPI spec drift + lint for the public API (apps/api).
#
# Two gates:
#   1. Drift — re-emit apps/api/openapi/v1.json from the code and fail on any
#      diff. The committed spec must always match the controllers (same idea
#      as db-schema-drift.yml). Regenerate with `pnpm --filter api emit:openapi`.
#   2. Lint — Spectral validates the spec against apps/api/.spectral.yaml.
#
# Required-check shim pattern (same as boundaries.yml / knip.yml): the
# workflow triggers on EVERY PR (no paths filter — a required check behind a
# paths filter hangs as "Expected" forever, see #295); a `changes` job does
# the path detection internally and the `openapi-lint` aggregator job owns
# the stable check name for the ruleset flip.

name: OpenAPI lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "apps/api/openapi/**"

permissions: {}

concurrency:
  group: openapi-lint-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            relevant:
              - 'apps/api/src/**'
              - 'apps/api/scripts/emit-openapi.ts'
              - 'apps/api/openapi/**'
              - 'apps/api/.spectral.yaml'
              - 'packages/shared/src/api/**'
              - '.github/workflows/openapi-lint.yml'

  openapi-run:
    name: Emit drift + Spectral lint
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Re-emit OpenAPI spec
        run: pnpm --filter api emit:openapi

      - name: Drift gate
        run: |
          set -euo pipefail
          if ! git diff --exit-code -- apps/api/openapi/v1.json; then
            echo "::error::OpenAPI spec drift. The committed apps/api/openapi/v1.json"
            echo "does not match the code. Regenerate and commit:"
            echo "  pnpm --filter api emit:openapi"
            exit 1
          fi
          echo "OpenAPI spec matches the code"

      - name: Spectral lint
        run: pnpm exec spectral lint apps/api/openapi/v1.json --ruleset apps/api/.spectral.yaml

      - name: Upload current spec as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openapi-v1-spec
          path: apps/api/openapi/v1.json
          retention-days: 7

  # Aggregation shim. `openapi-lint` is the stable status-check name for the
  # ruleset required-check flip. Always runs; treats `skipped` (no relevant
  # changes) as success — matching the `boundaries` / `knip` shims.
  openapi-lint:
    needs: [changes, openapi-run]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Aggregate openapi-lint result
        run: |
          if echo '${{ join(needs.*.result, ',') }}' | grep -qE 'failure|cancelled'; then
            echo "openapi-lint failed."; exit 1
          fi
          echo "openapi-lint passed (or skipped — no relevant changes)."
