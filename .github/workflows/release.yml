name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

# Turbo Remote Cache env. See note in ci.yml for full rationale.
env:
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

concurrency:
  # Never cancel a signing/release run mid-flight — interrupted Sigstore flows
  # leave half-state on Rekor.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    outputs:
      tarball-name: ${{ steps.pack.outputs.tarball }}
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Fail fast on tag-format typos. Convention is documented at
      # docs/conventions/RELEASES.md. A bad tag would otherwise produce a
      # half-built release with weird artifact names + Sigstore entries
      # that can't be revoked.
      - name: Validate tag format
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[1-9][0-9]*)?$ ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match the release convention."
            echo "Expected: v<MAJOR>.<MINOR>.<PATCH>  or  v<MAJOR>.<MINOR>.<PATCH>-rc.<N>"
            echo "Examples: v0.2.0   v0.2.1-rc.1   v1.0.0-rc.3"
            echo "See docs/conventions/RELEASES.md"
            exit 1
          fi
          echo "Tag '${GITHUB_REF_NAME}' is valid."

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Install
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build
        shell: bash
        run: pnpm turbo build

      - id: pack
        name: Pack apps/web standalone bundle
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="web-${GITHUB_REF_NAME}.tar.gz"
          if [ -d apps/web/.next/standalone ]; then
            tar -czf "${TARBALL}" -C apps/web/.next/standalone .
          else
            # Fallback if standalone output is not configured yet.
            tar -czf "${TARBALL}" -C apps/web .next public package.json
          fi
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - id: hash
        name: Compute SLSA subject hashes (base64)
        shell: bash
        run: |
          set -euo pipefail
          HASHES=$(sha256sum "${{ steps.pack.outputs.tarball }}" | base64 -w0)
          echo "hashes=${HASHES}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-tarball
          path: ${{ steps.pack.outputs.tarball }}
          retention-days: 30

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # `-rc.N` tags ship as Pre-release; stable tags become Latest.
          # See docs/conventions/RELEASES.md.
          PRERELEASE_FLAG=""
          if [[ "${GITHUB_REF_NAME}" =~ -rc\. ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              ${PRERELEASE_FLAG}
          fi
          gh release upload "${GITHUB_REF_NAME}" \
            "${{ steps.pack.outputs.tarball }}" \
            --clobber

  # SLSA L3 build provenance via the SLSA generator reusable workflow.
  # MUST be pinned to a semantic tag (the SLSA verifier rejects SHAs and float tags).
  slsa-provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true
      provenance-name: web-${{ github.ref_name }}.intoto.jsonl

  # SBOM + L2 provenance + cosign + license check via the shared orchestrator.
  # `artifact-source` names the workflow artifact uploaded by the `build`
  # job above (see the `actions/upload-artifact` step — name: web-tarball).
  # Without it, the supply-chain job runs in a fresh runner that has no
  # access to the tarball and sha256sum fails. Surfaced on v0.2.0 first
  # release. See AFF-229.
  supply-chain:
    needs: [build]
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write
      actions: read
    uses: ./.github/workflows/_supply-chain.yml
    with:
      artifact-path: ${{ needs.build.outputs.tarball-name }}
      artifact-source: web-tarball
      package-name: web
      version: ${{ github.ref_name }}
      release-mode: true
