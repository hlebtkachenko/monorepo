# Env Power - manual on/off for an environment without a redeploy.
#
# The caller matrix fans `all` out to staging + production. Each environment
# calls a reusable workflow whose resume path runs database and application
# lanes in parallel under one environment mutation lock.

name: Env Power (resume / warm / cold)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (all = both)"
        required: true
        type: choice
        options:
          - staging
          - production
          - all
      action:
        description: "resume = bring up | warm-pause = stop Fargate (keep RDS) | cold-pause = stop Fargate + RDS"
        required: true
        type: choice
        options:
          - resume
          - warm-pause
          - cold-pause

permissions: {}

jobs:
  power:
    name: power (${{ matrix.environment }})
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJSON(inputs.environment == 'all' && '["staging","production"]' || format('["{0}"]', inputs.environment)) }}
    concurrency:
      group: env-mutation-${{ matrix.environment }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/_power-environment.yml
    with:
      environment: ${{ matrix.environment }}
      action: ${{ inputs.action }}
    secrets: inherit
