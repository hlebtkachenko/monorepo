# `boundaries` is a REQUIRED status check on `.github/rulesets/main.json`.
# Same ci-status-shim pattern as knip.yml — the required-check name is
# owned by a tiny always-runs aggregator; the real `boundaries-run` job
# is gated on a `changes` upstream so docs-only and infra-only PRs skip
# the ~30-60s turbo boundaries run.
#
# See docs/conventions/CI-POLICY.md for the broader required-check rollout.

name: Boundaries

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: boundaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            source:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.mts'
              - '**/*.cts'
              - '**/package.json'
              - 'tsconfig*.json'
              - '**/tsconfig*.json'
              - 'turbo.json'
              - '**/turbo.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/boundaries.yml'

  boundaries-run:
    needs: [changes]
    if: needs.changes.outputs.source == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Turbo boundaries
        run: pnpm turbo boundaries

  # Aggregation shim. `boundaries` is the REQUIRED status check name on the
  # main branch ruleset. This job owns that name so the check posts green on
  # every PR (including docs/infra-only PRs that skip `boundaries-run`).
  # Treats `skipped` as non-failure, matching the `ci` and `knip` shims.
  boundaries:
    needs: [changes, boundaries-run]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Aggregate boundaries result
        run: |
          if echo '${{ join(needs.*.result, ',') }}' | grep -qE 'failure|cancelled'; then
            echo "boundaries failed."; exit 1
          fi
          echo "boundaries passed (or skipped — no source changes)."
