name: Workflow lint

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - "**/action.yml"
      - "**/action.yaml"
      - "infra/scripts/**"
      - "infra/cdk/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - "**/action.yml"
      - "**/action.yaml"
      - "infra/scripts/**"
      - "infra/cdk/**"

permissions: {}

concurrency:
  group: workflow-lint-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false
      - name: Install actionlint
        shell: bash
        run: |
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz" -o actionlint.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          rm actionlint.tar.gz
      - name: Run actionlint
        shell: bash
        run: |
          echo "::add-matcher::.github/actionlint-matcher.json"
          ./actionlint -color

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.4.x
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          advanced-security: true
          min-severity: error
          min-confidence: high

  shellcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false
      - name: Run shellcheck on infra scripts
        shell: bash
        run: |
          shopt -s nullglob
          files=(infra/scripts/*.sh infra/scripts/tests/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No infra shell scripts to lint"; exit 0
          fi
          # SC1091 = "can't follow non-constant source" — fine in trap setup.
          # SC2317 = "appears unreachable" — false-positive on trap handlers.
          shellcheck -x -e SC1091,SC2317 "${files[@]}"
      - name: Run inline test harnesses
        shell: bash
        run: |
          shopt -s nullglob
          tests=(infra/scripts/tests/test-*.sh)
          if [ ${#tests[@]} -eq 0 ]; then
            echo "No test harnesses to run"; exit 0
          fi
          fail=0
          for t in "${tests[@]}"; do
            echo "::group::$t"
            if bash "$t"; then echo "ok: $t"; else echo "::error::failed: $t"; fail=1; fi
            echo "::endgroup::"
          done
          exit "$fail"

  cdk-synth-strict:
    strategy:
      fail-fast: false
      matrix:
        env: [staging, production]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Dummy values keep `cdk synth --strict` deterministic and offline.
      # AWS_ACCOUNT_ID=000000000000 reuses the AZ context cached in
      # `cdk.context.json`, so synth never reaches AWS. The deploy workflow
      # ALWAYS overrides the 3 secret ARNs + AWS_ACCOUNT_ID at deploy time.
      AWS_REGION: eu-central-1
      AWS_ACCOUNT_ID: "000000000000"
      APP_DOMAIN: app.example.invalid
      ADMIN_DOMAIN: admin.example.invalid
      MAIL_FROM_ADDRESS: no-reply@example.invalid
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: cdk synth --strict (${{ matrix.env }})
        shell: bash
        working-directory: infra/cdk
        run: |
          pnpm exec cdk synth --strict \
            --context "env=${{ matrix.env }}" \
            --context "cloudflareTunnelSecretArn=arn:aws:secretsmanager:eu-central-1:000000000000:secret:dummy-cf-AAAAAA" \
            --context "resendApiKeySecretArn=arn:aws:secretsmanager:eu-central-1:000000000000:secret:dummy-resend-BBBBBB" \
            --context "betterAuthSecretArn=arn:aws:secretsmanager:eu-central-1:000000000000:secret:dummy-ba-CCCCCC" \
            --context "imageTag=sha-dummy"
