# Scope-aware PR checklist comment.
#
# Detects what the PR diff touches (api endpoint, SDK, MCP, infra, …)
# and posts a sticky comment listing the required follow-up steps for each
# scope. Re-runs on push so the comment stays in sync with the diff.
#
# The full checklist source-of-truth: docs/conventions/ENDPOINT-ADDITION.md.
# Advisory until the first green PR cycle.

name: PR checklist

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions: {}

concurrency:
  group: pr-checklist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checklist:
    name: Render scope-aware checklist
    runs-on: ubuntu-latest
    continue-on-error: true # ADVISORY
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect PR scope
        id: scope
        run: |
          set -euo pipefail
          base=${{ github.event.pull_request.base.sha }}
          head=${{ github.event.pull_request.head.sha }}
          node scripts/governance/detect-pr-scope.mjs "$base" "$head" > /tmp/scope.json
          echo "scope_file=/tmp/scope.json" >> "$GITHUB_OUTPUT"

      - name: Render checklist comment
        id: render
        run: |
          node scripts/governance/render-checklist-comment.mjs /tmp/scope.json > /tmp/comment.md
          echo "comment_file=/tmp/comment.md" >> "$GITHUB_OUTPUT"

      - name: Post sticky comment
        uses: marocchino/sticky-pull-request-comment@52423e01640425a022ef5fd42c6fb5f633a02728 # v2.9.1
        with:
          path: /tmp/comment.md
          header: pr-checklist
