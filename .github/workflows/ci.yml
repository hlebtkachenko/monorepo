# NOTE on path-filtering: required-status-check rules + paths-ignore on a
# workflow trigger create stuck PRs (skipped checks read as "missing" to the
# rule engine). We intentionally do NOT path-filter this workflow at the
# trigger level. TODO: revisit once we add a "ci-status" shim job pattern or
# branch-protection switches off "Require branches to be up to date".

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.1
      - uses: ./.github/actions/setup

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Lint
        run: pnpm turbo lint

      - name: Test
        run: pnpm turbo test

      - name: Build Storybook
        run: pnpm --filter @workspace/ui build-storybook

      - name: Build
        run: pnpm turbo build

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      # Run gitleaks via the binary directly. The official gitleaks-action v2
      # makes a GitHub API call to determine account type, which fails under
      # rate-limit pressure and falls back to "license required" — false
      # positive failures on every busy workflow run. Binary path has none of
      # that surface area.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.22.1"
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan
        run: gitleaks detect --source . --no-banner --redact --log-level info --exit-code 1
