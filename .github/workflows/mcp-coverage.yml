# MCP tool coverage gate.
#
# Two checks:
#   1. Drift — regenerate apps/mcp/src/tools/generated/ and fail on any diff.
#   2. Coverage — every committed spec operationId (GET + POST) must have a
#      corresponding file under apps/mcp/src/tools/generated/. Catches a
#      contributor adding an endpoint, regenerating the SDK, but skipping
#      `pnpm --filter @afframe/mcp gen`.
#
# Required-check shim pattern (same as boundaries.yml / knip.yml): triggers
# on every PR, `changes` does path detection internally, the `mcp-coverage`
# aggregator owns the stable check name (paths-filter trap, #295).

name: MCP coverage

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "apps/mcp/src/tools/generated/**"

permissions: {}

concurrency:
  group: mcp-coverage-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            relevant:
              - 'apps/api/openapi/**'
              - 'packages/shared/src/api/**'
              - 'apps/mcp/src/tools/generated/**'
              - 'apps/mcp/scripts/gen-tools.ts'
              - 'apps/mcp/package.json'
              - 'scripts/governance/check-mcp-coverage.mjs'
              - '.github/workflows/mcp-coverage.yml'

  mcp-coverage-run:
    name: Regenerate + cover
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Re-emit OpenAPI spec (input)
        run: pnpm --filter api emit:openapi

      - name: Regenerate MCP tools
        run: pnpm --filter @afframe/mcp gen

      - name: Drift gate
        run: |
          set -euo pipefail
          if ! git diff --exit-code -- apps/mcp/src/tools/generated/; then
            echo "::error::MCP generated drift. Run locally:"
            echo "  pnpm gen:all"
            echo "and commit the regenerated files."
            exit 1
          fi

      - name: Coverage gate
        run: |
          set -euo pipefail
          if ! node scripts/governance/check-mcp-coverage.mjs; then
            echo "::error::MCP coverage gap. Run 'pnpm gen:all' and commit."
            exit 1
          fi
          echo "Every spec GET/POST operation has a generated MCP tool."

  # Aggregation shim. `mcp-coverage` is the stable status-check name for the
  # ruleset required-check flip. Treats `skipped` as success.
  mcp-coverage:
    needs: [changes, mcp-coverage-run]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Aggregate mcp-coverage result
        run: |
          if echo '${{ join(needs.*.result, ',') }}' | grep -qE 'failure|cancelled'; then
            echo "mcp-coverage failed."; exit 1
          fi
          echo "mcp-coverage passed (or skipped — no relevant changes)."
