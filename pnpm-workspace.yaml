packages:
  - "apps/*"
  - "packages/*"
  - "infra/cdk"
  - "infra/cloudflare"
  - "infra/cloudflare-sleeping"
  - "infra/openfga"
overrides:
  # Force >=5.3.1: 4 CVEs in transitive 5.0.5 (path traversal, CRLF injection, 2x DoS)
  basic-ftp: ">=5.3.1"
  # Force >=0.28.1: GHSA dev-server SSRF (0.18.20 via drizzle-kit -> @esbuild-kit/core-utils)
  # plus CVE arbitrary file read via the dev server (>=0.27.3 <0.28.1, DB#51).
  esbuild: ">=0.28.1"
  # Force >=8.5.10: XSS via unescaped </style> in CSS stringify. Transitive 8.4.31 via next@16
  postcss: ">=8.5.10"
  # Pin v9.x: eslint v10 breaks eslint-plugin-react@7.37.5 'react/display-name'
  eslint: "^9.39.2"
  # Force >=0.2.7: type-confusion bypass of _assertPath allows path traversal (DB#53,
  # supersedes the earlier >=0.2.6 path-traversal fix). Transitive via exceljs + testcontainers.
  tmp: ">=0.2.7"
  # Force >=6.15.2: qs.stringify DoS fix. Transitive via express (body-parser) + supertest (superagent).
  qs: ">=6.15.2"
  # Force >=18.2.1: CVE-2026-48038 RangeError DoS via recursive link() schemas.
  # Transitive (dev/test only) via @storybook/test-runner -> jest-process-manager -> wait-on.
  joi: ">=18.2.1"
  # Pin 1.6.11: auth-critical, manual bumps only. 1.6.14 ships @better-auth/kysely-adapter
  # 1.6.14, which imports DEFAULT_MIGRATION_LOCK_TABLE from kysely 0.29.2 (no such export) and
  # breaks the Turbopack build. Bump better-auth deliberately + retest, never via a group bump.
  better-auth: "1.6.11"
  # Force >=4.12.21: 4 GHSAs in transitive 4.12.18 via @modelcontextprotocol/sdk
  # (Set-Cookie injection, IPv6 deny bypass, JWT scheme accept-any, mount-prefix
  # routing). SDK's own range is ^4.11.4, so dedupes onto our direct 4.12.25.
  # >=4.12.25 also clears CORS-credentials reflection, serve-static path traversal,
  # Lambda Set-Cookie/body-limit issues (DB#62-66).
  hono: ">=4.12.25"
  # --- Security overrides batch (v0.6.1): all transitive, all with a patched floor. ---
  # undici: 7.24.8/7.26.0 vulnerable (TLS validation bypass, SOCKS5 cross-origin routing,
  # WebSocket DoS, cache disclosure, Set-Cookie issues, DB#69-75). Bound to the 7.x line:
  # jsdom@29 deep-imports `undici/lib/handler/wrap-handler.js`, which exists only in undici
  # 7.x — an unbounded floor would replace jsdom's `^7` spec, float it onto undici@8, and
  # break the jsdom dispatcher. undici@8.5.0 consumers are already out of the CVE range.
  "undici@>=7.0.0 <8.0.0": ">=7.28.0 <8.0.0"
  # ws: memory-exhaustion DoS from tiny fragments (DB#54). Transitive 8.20.1.
  ws: ">=8.21.0"
  # multer: DoS via deeply nested field names + incomplete abort cleanup (DB#67,68).
  # Already on 2.x via @nestjs/platform-express; in-major bump.
  multer: ">=2.2.0"
  # form-data: CRLF injection via unescaped multipart field names (DB#58). Transitive 4.0.5.
  form-data: ">=4.0.6"
  # protobufjs: schema-derived names can shadow runtime properties (DB#59). Transitive 7.6.1.
  protobufjs: ">=7.6.3"
  # @opentelemetry/core: unbounded memory in W3C Baggage propagation (DB#61). Transitive 2.7.1.
  "@opentelemetry/core": ">=2.8.0"
  # vite: server.fs.deny bypass + launch-editor NTLM disclosure on Windows (DB#56,57).
  # Floor only; the unaffected vite@10 tree already satisfies it (8.0.11 -> 8.0.16).
  vite: ">=8.0.16"
  # js-yaml: quadratic-complexity DoS in merge-key handling (DB#55). Range-scoped to the
  # 4.x line via an explicit selector (a bare `@4` reads as exact) — the transitive 3.14.2
  # consumer can't take a major bump and the DoS is dev-tooling only.
  "js-yaml@>=4.0.0 <5.0.0": ">=4.2.0"
  # Pin 11.1.1 for vulnerable majors only (buf bounds check in v3/v5/v6 — none of our
  # consumers hit that path). Range selector leaves @cerbos/core's already-safe uuid@14
  # untouched. NOT an open ">=" range on purpose: uuid@12+ drops CommonJS, which would
  # break the 8.x/10.x require() consumers (exceljs, dockerode, storybook tooling); 11.1.1
  # is the last CJS-capable release and still exports the v1/v4 those consumers use.
  "uuid@<11.1.1": "11.1.1"
allowBuilds:
  "@nestjs/core": true
  # @parcel/watcher pulled in transitively by next-intl message loader.
  # Native postinstall is optional; pnpm falls back to FS polling.
  "@parcel/watcher": false
  "@scarf/scarf": false
  "@sentry/cli": true
  "@swc/core": true
  core-js-pure: false
  cpu-features: true
  esbuild: true
  # Git-hook install is driven by the root `prepare` script (`lefthook install`).
  # The package's own postinstall is redundant and fails inside git worktrees
  # where core.hooksPath is set.
  lefthook: false
  msgpackr-extract: true
  msw: false
  protobufjs: true
  sharp: true
  ssh2: true
  # Native postinstall is broken inside pnpm-managed isolated node_modules
  # (napi-postinstall can't resolve its own package.json). JS fallback is
  # transparent; only build-time resolution is marginally slower.
  unrs-resolver: false
  # vue-demi pulled in transitively by @scalar/api-reference-react (Scalar
  # mounts a Vue 3 tree under the hood). The postinstall is a Vue 2 / 3
  # compatibility switch; pnpm-isolated install doesn't need it.
  vue-demi: false
  # Cloudflare's official Worker runtime. Used by wrangler dev for local
  # iteration; CI deploys don't depend on the native binary so the build
  # script could be 'false' here, but local dev breaks without it.
  workerd: true
