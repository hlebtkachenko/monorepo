name: DB migration lint (squawk)

# Runs squawk against migration SQL files on PRs that touch migrations/.
# Flags destructive or unsafe DDL patterns (missing NOT VALID, lock escalation
# risks, etc.) before they reach main.
#
# ADVISORY — continue-on-error: true per project convention for new workflows.
# Flip to required after a full PR cycle passes green.

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/db/migrations/**"

permissions: {}

concurrency:
  group: db-migration-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  squawk:
    name: squawk migration lint
    runs-on: ubuntu-latest
    continue-on-error: true  # ADVISORY
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1

      - name: Install squawk via cargo
        run: |
          set -euo pipefail
          # squawk distributes via crates.io; binary releases on GitHub are
          # inconsistent across versions. cargo install is the canonical path.
          # ubuntu-latest ships cargo via rustup.
          cargo install squawk --locked --version 2.0.0
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Lint migrations
        # prefer-text-field: we use varchar/text intentionally per schema design.
        # disallowed-unique-constraint: unique constraints via indexes are preferred
        #   but some early migrations use inline UNIQUE — allowed for now.
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          squawk \
            --exclude prefer-text-field,disallowed-unique-constraint \
            packages/db/migrations/*.sql
