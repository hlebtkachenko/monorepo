services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: workspace-postgres:dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_owner
      POSTGRES_PASSWORD: dev_owner
      POSTGRES_DB: app_dev
      # pgaudit: log DDL + ROLE statements (matches RDS parameter group prod setting)
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    command: >
      postgres
        -c shared_preload_libraries=pgaudit,pg_stat_statements,vector
        -c pgaudit.log=ddl,role
        -c pgaudit.log_client=on
        -c log_min_messages=warning
        -c max_connections=200
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.d:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_owner -d app_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # edoburu/pgbouncer reads these env vars and generates pgbouncer.ini.
      # Alternatively mount pgbouncer.ini directly (see volumes below).
      DATABASE_URL: "postgres://app_user:dev_user@postgres:5432/app_dev"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "20"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6432:6432"
    healthcheck:
      # TCP probe: nc exits 0 if port is open.
      test: ["CMD-SHELL", "nc -z localhost 6432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  cerbos:
    # L3 of three-layer authz (ADR-0018). Upstream image, policies + config
    # bind-mounted from the repo so edits hot-reload via the shared
    # cerbos-config.yaml's storage.disk.watchForChanges:true. The same flag
    # is harmless in prod where /policies is baked into a content-hashed
    # image (no writes inside the running container).
    image: ghcr.io/cerbos/cerbos:0.53.0
    restart: unless-stopped
    profiles:
      - auth
    command: ["server", "--config=/etc/cerbos/config.yaml"]
    volumes:
      - ../cerbos/policies:/policies:ro
      - ../cerbos/config/cerbos-config.yaml:/etc/cerbos/config.yaml:ro
    ports:
      - "3592:3592"  # HTTP (admin + healthcheck)
      - "3593:3593"  # gRPC (api calls this)
    environment:
      CERBOS_NO_TELEMETRY: "1"
    healthcheck:
      test: ["CMD", "/cerbos", "healthcheck", "--insecure"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  pg_exporter:
    # Prometheus exporter for Postgres metrics + custom pg-boss / outbox
    # queue gauges (queries.yaml). Opt-in via the `observability` profile.
    image: prometheuscommunity/postgres-exporter:v0.18.1
    restart: unless-stopped
    profiles:
      - observability
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://app_owner:dev_owner@postgres:5432/app_dev?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/pg_exporter/queries.yaml
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "false"
    volumes:
      - ./pg_exporter/queries.yaml:/etc/pg_exporter/queries.yaml:ro
    ports:
      - "9187:9187"

  mailpit:
    image: axllent/mailpit:v1.30.0
    restart: unless-stopped
    profiles:
      - mailpit
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      MP_MAX_MESSAGES: "500"
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"

volumes:
  postgres_data:
