# yaml-language-server: $schema=https://www.openstatus.dev/schema.json
#
# OpenStatus monitors-as-code for status.afframe.com.
# Deployed on the OVH VPS, NOT AWS. See ./README.md and
# docs/adr/0019-status-page-and-uptime-monitoring.md.
#
# This file is operator-authored INTENT. The upstream `openstatus` CLI
# (`internal/api/client.go`) hardcodes `https://api.openstatus.dev/v1` and
# does NOT support self-host — see STATUS-PAGE.md "CLI does not target
# self-host". On self-host, monitors are applied via the dashboard UI;
# this YAML is the source-of-truth for what was configured, not a file
# any tool currently consumes.
#
# `regions` references the private-location probe registered on the VPS.
# In the dashboard the location is named "OVH EU"; reconcile any internal
# slug at apply time.
#
# Production monitors carry `active: false` until production is deployed
# (`app.afframe.com`, `api.afframe.com`, `admin.afframe.com` are prepared
# but not yet live). Flip to `active: true` after the first production
# deploy.

web-app-prod:
  name: "App (production)"
  description: "afframe.com web app reachability — app.afframe.com/api/version"
  frequency: "1m"
  active: false # PROD NOT DEPLOYED YET — flip after first production deploy
  regions:
    - ovh-eu
  retry: 3
  kind: http
  request:
    url: https://app.afframe.com/api/version
    method: GET
    headers:
      User-Agent: openstatus-afframe
  assertions:
    - kind: statusCode
      compare: eq
      target: 200

api-prod:
  name: "API (production)"
  description: "afframe.com API health — api.afframe.com/api/health, body must report ok"
  frequency: "1m"
  active: false # PROD NOT DEPLOYED YET
  regions:
    - ovh-eu
  retry: 3
  kind: http
  request:
    url: https://api.afframe.com/api/health
    method: GET
    headers:
      User-Agent: openstatus-afframe
  assertions:
    - kind: statusCode
      compare: eq
      target: 200
    - kind: textBody
      compare: contains
      target: '"status":"ok"'

admin-prod:
  name: "Admin (production)"
  description: "afframe.com admin app reachability — admin.afframe.com/api/health"
  frequency: "1m"
  active: false # PROD NOT DEPLOYED YET
  regions:
    - ovh-eu
  retry: 3
  kind: http
  request:
    url: https://admin.afframe.com/api/health
    method: GET
    headers:
      User-Agent: openstatus-afframe
  assertions:
    - kind: statusCode
      compare: eq
      target: 200
    - kind: textBody
      compare: contains
      target: '"ok":true'

dns-afframe:
  name: "DNS (afframe.com)"
  description: "afframe.com apex DNS resolution"
  frequency: "5m"
  active: true
  regions:
    - ovh-eu
  retry: 3
  kind: dns
  request:
    url: afframe.com
  assertions:
    # The self-host dashboard requires a target value for DNS assertions —
    # `Not Equal 0.0.0.0` passes for any real IP returned (Cloudflare proxy
    # returns 104.x / 172.67.x ranges). Effectively asserts "DNS resolves".
    - kind: dnsRecord
      key: A
      compare: not_eq
      target: "0.0.0.0"

staging-web:
  name: "App (staging)"
  description: "app-staging.afframe.com web app — private, kept off the public status page"
  frequency: "5m"
  active: true
  regions:
    - ovh-eu
  retry: 3
  kind: http
  request:
    url: https://app-staging.afframe.com/api/version
    method: GET
    headers:
      User-Agent: openstatus-afframe
  assertions:
    - kind: statusCode
      compare: eq
      target: 200

staging-api:
  name: "API (staging)"
  description: "api-staging.afframe.com API health — private, kept off the public status page"
  frequency: "5m"
  active: true
  regions:
    - ovh-eu
  retry: 3
  kind: http
  request:
    url: https://api-staging.afframe.com/api/health
    method: GET
    headers:
      User-Agent: openstatus-afframe
  assertions:
    - kind: statusCode
      compare: eq
      target: 200
    - kind: textBody
      compare: contains
      target: '"status":"ok"'

staging-admin:
  name: "Admin (staging)"
  description: "admin-staging.afframe.com admin app — private, kept off the public status page"
  frequency: "5m"
  active: true
  regions:
    - ovh-eu
  retry: 3
  kind: http
  request:
    url: https://admin-staging.afframe.com/api/health
    method: GET
    headers:
      User-Agent: openstatus-afframe
  assertions:
    - kind: statusCode
      compare: eq
      target: 200
    - kind: textBody
      compare: contains
      target: '"ok":true'
