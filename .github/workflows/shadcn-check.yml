name: shadcn component updates

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: shadcn-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Check for component updates
        id: diff
        env:
          SHADCN_REPORT_PATH: ${{ runner.temp }}/shadcn-report.md
        run: |
          pnpm check:shadcn-upstream

      - name: Ensure issue label exists
        if: steps.diff.outputs.has_updates == 'true'
        run: gh label create shadcn-update --color 0E8A16 --description "Upstream shadcn/ui review required" --force --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for existing issue
        id: existing
        run: |
          NUMBER=$(gh issue list --label shadcn-update --state open --json number --jq '.[0].number // ""')
          echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue
        if: steps.diff.outputs.has_updates == 'true' && steps.existing.outputs.number == ''
        run: |
          gh issue create \
            --title "chore: shadcn upstream review required" \
            --label shadcn-update \
            --body-file "${{ runner.temp }}/shadcn-report.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh issue
        if: steps.diff.outputs.has_updates == 'true' && steps.existing.outputs.number != ''
        run: gh issue edit "${{ steps.existing.outputs.number }}" --body-file "${{ runner.temp }}/shadcn-report.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close resolved issue
        if: steps.diff.outputs.has_updates == 'false' && steps.existing.outputs.number != ''
        run: gh issue close "${{ steps.existing.outputs.number }}" --comment "The reviewed shadcn upstream baseline is current."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
