version: 2

updates:
  # npm — workspace root (covers all workspaces via lockfile)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
    commit-message:
      prefix: "chore"
      include: scope
    cooldown:
      default-days: 7

  # GitHub Actions — group everything together so SHA bumps land in one PR
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: scope

  # Docker base image used by apps/web Dockerfile (the Next.js runtime)
  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    groups:
      apps-web-docker:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: scope

  # Docker base image used by apps/api Dockerfile (the NestJS runtime)
  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    groups:
      apps-api-docker:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: scope

  # Docker base image used by apps/admin Dockerfile (the admin Next.js
  # runtime — deployed prod container, digest-pinned like web/api).
  - package-ecosystem: docker
    directory: /apps/admin
    schedule:
      interval: weekly
      day: monday
    groups:
      apps-admin-docker:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: scope

  # Docker base image used by infra/Dockerfile.backup (ECS Scheduled Task in
  # BackupStack). Pinned per ADR-0015; bumped via Dependabot.
  - package-ecosystem: docker
    directory: /infra
    schedule:
      interval: weekly
      day: monday
    groups:
      infra-docker:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: scope

  # Cerbos PDP sidecar image (ghcr.io/cerbos/cerbos) baked into the CDK
  # asset via infra/cerbos/Dockerfile. The non-recursive /infra entry above
  # does not descend into subdirectories, so this separate entry is required.
  - package-ecosystem: docker
    directory: /infra/cerbos
    schedule:
      interval: weekly
      day: monday
    groups:
      infra-cerbos-docker:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: scope

  # Postgres base image used by the local-dev compose stack.
  - package-ecosystem: docker
    directory: /infra/compose/postgres
    schedule:
      interval: weekly
      day: monday
    groups:
      infra-compose-postgres-docker:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: scope

  # Postgres base image used by the pgTap test container.
  - package-ecosystem: docker
    directory: /infra/compose/pgtap
    schedule:
      interval: weekly
      day: monday
    groups:
      infra-compose-pgtap-docker:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: scope

  # Image pins inside the local-dev compose stack
  # (infra/compose/docker-compose.dev.yml: postgres-exporter, mailpit, plus
  # the pgbouncer/cerbos pins that duplicate the CDK copies). The `docker`
  # entries above only read Dockerfile FROM lines; the docker-compose
  # ecosystem reads compose `image:` keys.
  - package-ecosystem: docker-compose
    directory: /infra/compose
    schedule:
      interval: weekly
      day: monday
    groups:
      infra-compose-images:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: scope

  # Ubuntu base image used by the devcontainer.
  - package-ecosystem: docker
    directory: /.devcontainer
    schedule:
      interval: weekly
      day: monday
    groups:
      devcontainer-docker:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: scope
