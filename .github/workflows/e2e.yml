name: E2E Tests

# Path-filtered because e2e is ADVISORY (not in main branch ruleset's
# required checks). Trigger-level `paths:` is safe — a skipped check that
# is not required does not block the merge gate. If e2e is ever promoted
# to required (see Linear AFF-65), switch to the ci-status-shim pattern
# used by ci.yml so a skipped check still reports a green status.
#
# Triggers when anything that the Playwright auth-flow suite could
# exercise changes: web/api/admin app source, packages they consume
# (auth, db, shared, email, ui, testcontainers), lockfile (dep upgrades
# may change SSR/runtime behavior), the workflow file itself, and the
# shared setup composite action.

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "apps/admin/**"
      - "packages/auth/**"
      - "packages/db/**"
      - "packages/shared/**"
      - "packages/email/**"
      - "packages/ui/**"
      - "packages/testcontainers/**"
      - "packages/i18n/**"
      - "packages/observability/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/e2e.yml"
      - ".github/actions/setup/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "apps/admin/**"
      - "packages/auth/**"
      - "packages/db/**"
      - "packages/shared/**"
      - "packages/email/**"
      - "packages/ui/**"
      - "packages/testcontainers/**"
      - "packages/i18n/**"
      - "packages/observability/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/e2e.yml"
      - ".github/actions/setup/**"

permissions: {}

# Turbo Remote Cache env. See note in ci.yml for full rationale.
env:
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: none
    env:
      PORT: "3010"
      AWS_ACCOUNT_ID: "000000000000"
      APP_DOMAIN: example.com
      BETTER_AUTH_URL: "http://localhost:3010"
      BETTER_AUTH_SECRET: "e2e-test-secret-not-real-0123456789ab"
      # Build-time placeholders. The real database for the E2E run is the
      # disposable Postgres 18 testcontainer booted by apps/web/e2e/db-setup.ts
      # during Playwright config evaluation — it boots the container, runs
      # migrations + the loginable-owner seed, and spreads the ephemeral
      # connection URLs into the Playwright webServer env so the spawned
      # Next.js server picks them up. These two values exist only so
      # `next build` and any module that reads them at build time have a
      # non-empty, syntactically valid URL; db-setup.ts overrides both before
      # the web server starts.
      DATABASE_URL: "postgres://app_user:dev_user@127.0.0.1:5432/app_dev"
      DATABASE_DIRECT_URL: "postgres://app_owner:dev_owner@127.0.0.1:5432/app_dev"
      # Ephemeral CI runner is torn down after the job, so the Ryuk reaper
      # is unnecessary — disabling it drops one Docker Hub pull (and the
      # registry ping that can 500/timeout on a flaky Hub).
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Build web app
        run: pnpm turbo build --filter=web...

      - name: Resolve Playwright version
        id: pw-version
        run: echo "version=$(node -p "require('./apps/web/package.json').devDependencies['@playwright/test']")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw-version.outputs.version }}-chromium

      - name: Install Playwright (browsers + system deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm --filter web exec playwright install-deps chromium

      # The Postgres testcontainer (apps/web/e2e/db-setup.ts → bootPostgres18)
      # pulls postgres:18-alpine from Docker Hub during Playwright config
      # evaluation. Docker Hub intermittently returns HTTP 500 /
      # "context deadline exceeded", which aborts the whole e2e run before any
      # test executes. Pre-pull with retry/backoff so the container reuses a
      # locally-present image and a transient Hub blip no longer fails the job.
      #
      # Digest-pinned (T12): the pull resolves the manifest-list digest below,
      # then tags it as the floating `postgres:18-alpine` ref the testcontainer
      # helper requests (packages/testcontainers/src/postgres.ts — deliberately
      # un-digested there for local dev). testcontainers' default pull policy
      # skips the pull when the image is already present, so CI runs are
      # digest-reproducible without touching the shared helper. Drift between
      # this digest and the live 18-alpine tag is tracked by
      # tool-versions-check.yml (files an issue).
      - name: Pre-pull Postgres testcontainer image (digest-pinned, Docker Hub flakiness guard)
        env:
          # postgres:18-alpine manifest-list digest, verified 2026-06-11.
          POSTGRES_IMAGE_DIGEST: "sha256:96d56f7f57c6aacd1fcb908bc83b345ec5f83231ee486dd66a1baadce274db88"
        run: |
          image="postgres:18-alpine"
          pinned="postgres@${POSTGRES_IMAGE_DIGEST}"
          for attempt in 1 2 3 4 5; do
            if docker pull "$pinned"; then
              docker tag "$pinned" "$image"
              exit 0
            fi
            echo "::warning::docker pull $pinned failed (attempt $attempt/5); retrying in $((attempt * 10))s"
            sleep $((attempt * 10))
          done
          echo "::error::could not pull $pinned after 5 attempts (Docker Hub unreachable)"
          exit 1

      - name: Run E2E tests
        working-directory: apps/web
        run: pnpm e2e

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/e2e/.results/
          retention-days: 14
