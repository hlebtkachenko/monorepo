# NOTE on path-filtering: required-status-check rules + paths-ignore on a
# workflow trigger create stuck PRs (skipped checks read as "missing" to the
# rule engine). We intentionally do NOT path-filter this workflow at the
# trigger level. The `ci` aggregation shim job (bottom of file) satisfies
# the single required `ci` status check, and the `changes` job below uses
# `dorny/paths-filter` to skip expensive downstream jobs WITHIN this
# workflow — `ci` still posts on every run so branch protection is happy.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Upstream paths-filter so downstream jobs can skip when their inputs
  # didn't change. Wall-time impact: skipping `storybook` drops ~220s
  # from PRs that don't touch packages/ui/**. The `ci` aggregator at
  # the bottom of this file treats `skipped` as non-failure, so skipped
  # jobs do not break the required `ci` status check.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false
      - id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            ui:
              - 'packages/ui/**'
            infra:
              - 'infra/cdk/**'
              - 'apps/*/package.json'
              - 'pnpm-lock.yaml'

  lint-typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          # Full history so `turbo --affected` can diff against the PR base.
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup

      - id: filter
        # In-job paths-filter for the CDK Synth step gate below. Keeps
        # lint-typecheck from serializing behind the `changes` job — the
        # cdk gate is only one step, not the whole job.
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            infra:
              - 'infra/cdk/**'
              - 'apps/*/package.json'
              - 'pnpm-lock.yaml'

      - name: Typecheck
        # --affected scopes to packages touched vs the PR base. Empty diff
        # = no-op. Full graph still runs on push to main (HEAD^ base).
        env:
          AWS_ACCOUNT_ID: "000000000000"
          APP_DOMAIN: example.com
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || 'HEAD^' }}
        run: pnpm turbo typecheck --affected --ui=stream --continue

      - name: Lint
        env:
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || 'HEAD^' }}
        run: pnpm turbo lint --affected --ui=stream --continue

      - name: CDK Synth
        # Verifies infra/cdk synthesizes cleanly without real AWS credentials.
        # Real account ID + domains come from repo secrets at deploy time.
        # Gated on infra/** changes — saves ~20-40s on PRs that don't
        # touch CDK or dependency surfaces it reads.
        if: steps.filter.outputs.infra == 'true'
        env:
          AWS_ACCOUNT_ID: "000000000000"
          APP_DOMAIN: example.com
          ADMIN_DOMAIN: admin.example.com
        run: pnpm turbo synth --ui=stream

  unit-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          # Full history so `turbo --affected` can diff against the PR base.
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Test
        # @workspace/db tests require a Postgres 18 testcontainer or service.
        # They run in the dedicated db-tests.yml workflow. Excluding here
        # avoids Docker overhead + double execution.
        # --affected scopes to packages touched vs the PR base. Full graph
        # still runs on push to main (HEAD^ base = previous commit only,
        # so on main the affected scope is one-commit delta, which is the
        # right scope for main).
        env:
          AWS_ACCOUNT_ID: "123456789012"
          APP_DOMAIN: test.example.com
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || 'HEAD^' }}
        run: pnpm turbo test --filter=!@workspace/db --affected --ui=stream --continue

      - name: Test Coverage
        # Advisory step — scope to packages affected vs the PR base.
        # build-storybook below stays full-graph: the interaction test
        # consumes its storybook-static output, and the turbo cache
        # already restores that output on an unchanged run.
        env:
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || 'HEAD^' }}
        run: pnpm turbo test:coverage --filter=@workspace/ui --affected --ui=stream

  storybook:
    # Skipped when no `packages/ui/**` change — Storybook build + interaction
    # + a11y tests are ~220-240s on every UI PR. Skipping saves the full
    # wall on non-UI PRs. The `ci` aggregator below treats `skipped` as
    # non-failure (only `failure|cancelled` red it), so the required `ci`
    # status check still posts green when this job skips.
    needs: [changes]
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          # No `--affected` here — full graph for storybook build is fine
          # (turbo task cache already restores unchanged output) and
          # fetch-depth: 0 is unnecessary cost.
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Build Storybook
        run: pnpm turbo build-storybook --filter=@workspace/ui --ui=stream

      - name: Resolve Playwright version
        id: pw-version
        run: echo "version=$(node -p "require('./packages/ui/package.json').devDependencies.playwright")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright (browsers + system deps)
        # Run inside @workspace/ui where playwright is a devDependency.
        # `pnpm exec` from repo root cannot find the binary because the
        # package isn't a root dep. Include chromium-headless-shell:
        # @storybook/test-runner launches that variant explicitly and
        # GitHub runner image updates stopped pre-caching it.
        # `--with-deps` installs the apt dependencies too.
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @workspace/ui exec playwright install --with-deps chromium chromium-headless-shell webkit

      - name: Install Playwright system deps (cache hit)
        # Browser binaries are restored from cache; the apt system deps are
        # not cached by ~/.cache/ms-playwright, so install just those.
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @workspace/ui exec playwright install-deps chromium webkit

      - name: Storybook Interaction & A11y Tests
        run: |
          pnpm dlx concurrently -k -s first -n "SB,TEST" \
            "pnpm dlx http-server packages/ui/storybook-static --port 6006 --silent" \
            "pnpm dlx wait-on tcp:127.0.0.1:6006 && pnpm --filter @workspace/ui test-storybook --url http://127.0.0.1:6006"

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          # Build stays full-graph — deploy/release path consumes the full
          # build artifact set (apps/web/.next/standalone, apps/api/dist,
          # apps/admin/.next). Partial build = poisoned release. So no
          # --affected here, and no need for fetch-depth: 0 either.
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Build
        run: pnpm turbo build --ui=stream

      - name: Scan client bundle for leaked server secrets
        # Defence-in-depth post-build check. Fails if any server-only env var
        # or secret-shaped literal landed in apps/web/.next/static/**, or if
        # production source maps shipped. Cheap (<2s) — runs only when the
        # build above produced .next output.
        run: pnpm check:client-secrets

  # Aggregation shim. `ci` is a REQUIRED status check on the main branch
  # ruleset. After splitting the monolithic job into parallel jobs, this job
  # keeps reporting a single `ci` context that is green only when every real
  # job succeeded. `if: always()` ensures it runs even when a dependency
  # fails, so a failure is reported instead of the context going missing.
  # `changes` is in needs so a paths-filter failure surfaces here too.
  # `skipped` is treated as non-failure (only `failure|cancelled` red the
  # aggregator) — that's how the storybook skip works without breaking
  # the required `ci` check.
  ci:
    needs: [changes, lint-typecheck, unit-test, storybook, build]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Aggregate required checks
        run: |
          if echo '${{ join(needs.*.result, ',') }}' | grep -qE 'failure|cancelled'; then
            echo "A required CI job failed."; exit 1
          fi
          echo "All CI jobs passed."

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.22.1"
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan
        run: gitleaks detect --source . --no-banner --redact --log-level info --exit-code 1
