# Brain Eval — ADVISORY. Runs the Afframe Brain eval-runner (WP-0.9): the booking comparison metric
# (exact-match on account+amount+period) + the §9 threshold gate (booking_correctness ≥ 0.95,
# confident_wrong == 0 — the cardinal sin). For M0 this is the toy-case metric suite inside the brain
# tests; the full in-process eval against the golden fixtures (Fixture-1) lands at M1.
#
# Advisory by policy (all new workflows ship advisory; Hleb flips required-status after a green cycle —
# docs/conventions/CI-POLICY.md). Not in .github/rulesets/main.json, so a trigger-level `paths:` filter
# is safe here (the required-check path-filter trap only applies to REQUIRED checks).

name: Brain Eval

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/brain/**"
      - "packages/accounting-kb/**"
      - "scripts/brain-build/eval-thresholds.lock"
      - ".github/workflows/brain-eval.yml"

permissions: {}

concurrency:
  group: brain-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  brain-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Run Brain eval-runner + §9 metric suite
        run: pnpm --filter @workspace/brain test
