# Postgres-side pgTap tests for invariants vitest can't reach: policy
# existence, function ownership, trigger configuration, role grants.
#
# Advisory: not listed in the main branch ruleset. It still fails its own
# workflow on pgTap regressions so reviewers see a real red advisory check.
#
# Triggered on migration or pgTap test changes.

name: DB pgTap

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/db/migrations/**"
      - "packages/db/tests/pgtap/**"
      - "infra/compose/pgtap/**"
      - ".github/workflows/db-pgtap.yml"
  push:
    branches: [main]
    paths:
      - "packages/db/migrations/**"
      - "packages/db/tests/pgtap/**"

permissions: {}

concurrency:
  group: db-pgtap-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pgtap:
    name: pgTap suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Install pg_prove on the runner host
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          # Runner needs pg_prove (Perl TAP harness) + psql 18 to drive the
          # service container. PGDG repo for pg18 client.
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          codename=$(. /etc/os-release && echo "$VERSION_CODENAME")
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${codename}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            postgresql-client-18 \
            libtap-parser-sourcehandler-pgtap-perl

      - name: Install pgTap extension files inside the postgres service container
        run: |
          set -euo pipefail
          # The service container runs postgres:18 (Debian-based). pg_tap
          # extension files must live on the SAME filesystem as the server,
          # not the runner. Install via docker exec on the running container.
          container_id=$(docker ps --filter "ancestor=postgres:18" --format "{{.ID}}" | head -1)
          if [ -z "$container_id" ]; then
            echo "::error::Postgres service container not found"
            exit 1
          fi
          docker exec -u root "$container_id" bash -c '
            set -euo pipefail
            apt-get update
            apt-get install -y --no-install-recommends postgresql-18-pgtap
          '

      - name: Wait for postgres
        run: |
          set -euo pipefail
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do
            echo "waiting for postgres..."
            sleep 2
          done

      - name: Bootstrap roles
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          for f in infra/compose/postgres/init.d/*.sql; do
            echo "Applying $f"
            psql -h 127.0.0.1 -p 5432 -U postgres -f "$f"
          done

      - name: Apply migrations
        env:
          DATABASE_DIRECT_URL: postgresql://app_owner:dev_owner@127.0.0.1:5432/postgres
        run: pnpm --filter @workspace/db db:migrate

      - name: Run pgTap suite
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: app_owner
          PGPASSWORD: dev_owner
          PGDATABASE: postgres
        run: |
          set -euo pipefail
          chmod +x packages/db/tests/pgtap/run-pgtap.sh
          packages/db/tests/pgtap/run-pgtap.sh
