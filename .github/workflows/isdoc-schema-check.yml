# Update check for the vendored ISDOC XSD schemas (packages/filing/schemas/isdoc/).
# Dependabot cannot track these â€” they are verbatim copies of the official schema
# published at github.com/isdoc/schema, not an npm package. Alerts when upstream
# publishes a schema version newer than the one we vendor. Advisory.

name: isdoc schema update check

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compare vendored vs latest ISDOC schema version
        id: check
        run: |
          set -euo pipefail
          # Highest vendored version directory (e.g. 6.0.1).
          CURRENT=$(find packages/filing/schemas/isdoc -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -V | tail -1)
          # Latest tag published upstream (isdoc/schema uses vX.Y.Z tags).
          LATEST=$(gh api repos/isdoc/schema/tags --jq '.[].name' 2>/dev/null \
            | sed 's/^v//' | sort -V | tail -1 || true)
          echo "vendored=$CURRENT latest=$LATEST"
          if [ -n "$LATEST" ] && [ "$LATEST" != "$CURRENT" ] \
            && [ "$(printf '%s\n%s\n' "$CURRENT" "$LATEST" | sort -V | tail -1)" = "$LATEST" ]; then
            {
              echo "has_updates=true"
              echo "latest=$LATEST"
              echo "current=$CURRENT"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for existing issue
        if: steps.check.outputs.has_updates == 'true'
        id: existing
        run: |
          COUNT=$(gh issue list --label isdoc-schema-update --state open --json number --jq length)
          echo "exists=$COUNT" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue
        if: steps.check.outputs.has_updates == 'true' && steps.existing.outputs.exists == '0'
        run: |
          gh issue create \
            --title "chore: ISDOC schema ${{ steps.check.outputs.latest }} available (vendored ${{ steps.check.outputs.current }})" \
            --label isdoc-schema-update \
            --body "Upstream github.com/isdoc/schema published ISDOC ${{ steps.check.outputs.latest }}. We vendor ${{ steps.check.outputs.current }} under packages/filing/schemas/isdoc/. Review and vendor the new version + add it to the schema registry if we want to support it."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
