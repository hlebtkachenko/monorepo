<title>Afframe is asleep</title>
<style>
  /*
   * Self-contained sleeping page served at the Cloudflare edge while the
   * Fargate task is cold-paused. No external fonts/scripts/images — renders
   * instantly with zero origin dependency. Visual twin of the in-app
   * apps/web/app/sleeping/page.tsx; brand hex mirrors
   * packages/ui/src/styles/globals.css (--brand-mono-dark, --brand-primary-dark).
   */
  :root {
    color-scheme: dark;
    --bg: #0a1f1a;
    --mint: #28dcb1;
    --text: #e9f6f1;
    --muted: #9fc4ba;
    --faint: #5f8579;
    --card: #102a23;
    --border: rgba(40, 220, 177, 0.16);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: grid;
    place-items: center;
    padding: 28px;
    background:
      radial-gradient(120% 90% at 50% -10%, rgba(40, 220, 177, 0.14), transparent 60%),
      var(--bg);
    color: var(--text);
    font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .wrap { width: 100%; max-width: 33rem; text-align: center; }
  .brand { height: 26px; width: auto; opacity: 0.95; }
  .scene {
    position: relative;
    margin: 2.5rem auto 1.75rem;
    width: 240px;
    height: 170px;
  }
  .cat { transform-origin: 50% 100%; animation: breathe 4s ease-in-out infinite; }
  @keyframes breathe {
    0%, 100% { transform: scaleY(1) scaleX(1); }
    50%      { transform: scaleY(1.035) scaleX(1.01); }
  }
  .z {
    position: absolute;
    font-weight: 700;
    color: var(--mint);
    opacity: 0;
    animation: float 4s ease-in-out infinite;
  }
  .z1 { left: 150px; top: 64px; font-size: 18px; animation-delay: 0s; }
  .z2 { left: 168px; top: 50px; font-size: 24px; animation-delay: 0.7s; }
  .z3 { left: 190px; top: 34px; font-size: 32px; animation-delay: 1.4s; }
  @keyframes float {
    0%   { opacity: 0; transform: translateY(8px) scale(0.85); }
    30%  { opacity: 0.9; }
    70%  { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(-26px) scale(1.05); }
  }
  h1 { margin: 0 0 0.6rem; font-size: 1.7rem; font-weight: 650; letter-spacing: -0.01em; color: #fff; }
  p { margin: 0 auto; max-width: 27rem; color: var(--muted); }
  .actions { margin-top: 1.9rem; display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.6rem 1.1rem;
    border-radius: 0.7rem;
    font-size: 0.9rem;
    font-weight: 600;
    text-decoration: none;
    transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--mint); color: #06241c; }
  .btn-primary:hover { background: #45e8c1; }
  .btn-ghost { border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { border-color: rgba(40, 220, 177, 0.4); }
  .foot { margin-top: 2.5rem; font-size: 0.8rem; color: var(--faint); }
  .foot a { color: var(--muted); text-decoration: none; }
  .foot a:hover { color: var(--text); }
  @media (prefers-reduced-motion: reduce) {
    .cat, .z { animation: none; }
    .z { opacity: 0.6; }
  }
</style>
</head>

    <h1>Afframe is asleep</h1>
    <p>This environment powers down when nobody is using it, to keep things lean. It is not an outage. The service comes back automatically the next time it is started, and takes a short moment to wake.</p>
