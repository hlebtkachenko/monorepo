name: Boundaries

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: boundaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  boundaries:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
      - uses: ./.github/actions/setup
      - name: Turbo boundaries
        run: pnpm turbo boundaries
