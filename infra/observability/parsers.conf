# Fluent Bit parsers — referenced by firelens-fluentbit.conf [SERVICE]
# Parsers_File directive.
#
# pino_json: NestJS Logger (apps/api) and Next.js server logs print
# pino-style JSON to stdout. The default pino schema uses numeric `level`
# values; the `level_decoder` mapping below converts them to standard
# severity strings before they reach the OTLP exporter, so Honeycomb's
# `severity_text` column matches what operators expect.

[PARSER]
    Name        pino_json
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep   On
    Decode_Field_As escaped_utf8 msg do_next
    Decode_Field_As escaped_utf8 message
    # Pino level mapping: 10 trace, 20 debug, 30 info, 40 warn, 50 error,
    # 60 fatal. Fluent Bit does not natively rename numeric levels; the
    # OTel processor downstream rewrites these into severity_number /
    # severity_text. Documented here so the schema is discoverable from
    # the parser file alone.

# Generic JSON fallback for containers that emit non-pino structured logs
# (cloudflared sidecar, openfga server, cerbos). Less strict timestamp
# handling so unknown formats still parse.
[PARSER]
    Name        generic_json
    Format      json
    Time_Key    timestamp
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep   On
