"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

# Committed = source of truth for local AND cloud workspaces. Changes here take
# effect only after they merge to the default branch. Machine-local, secret, or
# per-user values (ssh_key_path, cloud GH_TOKEN) belong in the gitignored
# .conductor/settings.local.toml, never here. See docs/runbooks/CONDUCTOR.md.

[git]
# Land via PR; keep the branch after archiving. Auto-archive on PR merge.
delete_branch_on_archive = false
archive_on_merge = true

[scripts]
# Full per-workspace isolation: each workspace gets its own $CONDUCTOR_PORT
# range and its own Postgres database, so many workspaces run their dev servers
# in parallel without colliding. (This is the mutually-exclusive alternative to
# spotlight_testing — do NOT enable both.)
run_mode = "concurrent"
# Install + per-workspace DB (create, migrate, seed demo owner) + code index.
# Cloud-safe: the DB block is skipped when Docker is unavailable.
setup = "bash scripts/conductor/setup.sh"
# Drop this workspace's isolated database on archive.
archive = "bash scripts/conductor/archive.sh"

# --- Run buttons -----------------------------------------------------------
# No run script is marked `default` on purpose: a default is auto-started when a
# workspace is created, which wastes resources for the many workspaces that only
# need coding. Pick web/admin/api from the Run menu when you actually want a
# server.
#
# Each web-facing run script auto-opens its URL in the default browser once the
# port answers. The leading `( … ) &` subshell polls the port (bounded to ~60s,
# then gives up quietly) and opens on the first response; the dev server runs in
# the foreground so Conductor's SIGHUP stops the whole group. `kill -0 "$P"`
# rechecks the parent shell each tick, so if the server self-exits (crash /
# EADDRINUSE) the poller stops before it can open a stray tab. `open` is
# macOS-only and gated by `[ "$(uname)" = Darwin ]` so a non-Mac local teammate
# just skips it (`available_in = ["local"]` only excludes cloud, not other OSes).

# Web dev server on this workspace's port, against its isolated DB.
[scripts.run.web]
command = '( P=$$; for _ in $(seq 1 120); do kill -0 "$P" 2>/dev/null || exit; curl -s -m 5 -o /dev/null "http://localhost:$CONDUCTOR_PORT" && { [ "$(uname)" = Darwin ] && open "http://localhost:$CONDUCTOR_PORT"; break; }; sleep 0.5; done ) & pnpm --filter web exec next dev --turbopack --port "$CONDUCTOR_PORT"'
icon = "globe"
available_in = ["local"]

# API dev server on $CONDUCTOR_PORT+1. NestJS reads no .env file, so source the
# generated web env (same isolated DB + secrets) into its process first. Root
# `/` serves the Scalar API reference, so opening it lands on the live docs.
[scripts.run.api]
command = '( P=$$; for _ in $(seq 1 120); do kill -0 "$P" 2>/dev/null || exit; curl -s -m 5 -o /dev/null "http://localhost:$((CONDUCTOR_PORT + 1))" && { [ "$(uname)" = Darwin ] && open "http://localhost:$((CONDUCTOR_PORT + 1))"; break; }; sleep 0.5; done ) & set -a; . apps/web/.env.local; set +a; PORT="$((CONDUCTOR_PORT + 1))" pnpm --filter api dev'
icon = "server"
available_in = ["local"]

# Admin dev server on $CONDUCTOR_PORT+2, against the same isolated DB. Its own
# apps/admin/.env.local (generated by setup, gated to the seeded workspace) is
# auto-loaded by Next. Bypasses admin's package dev script (hardcoded :3100).
[scripts.run.admin]
command = '( P=$$; for _ in $(seq 1 120); do kill -0 "$P" 2>/dev/null || exit; curl -s -m 5 -o /dev/null "http://localhost:$((CONDUCTOR_PORT + 2))" && { [ "$(uname)" = Darwin ] && open "http://localhost:$((CONDUCTOR_PORT + 2))"; break; }; sleep 0.5; done ) & pnpm --filter admin exec next dev --turbopack --port "$((CONDUCTOR_PORT + 2))"'
icon = "shield"
available_in = ["local"]

# Fast type check — useful everywhere, including cloud workspaces.
[scripts.run.typecheck]
command = "pnpm typecheck"
icon = "check"

# Full test suite. Boots disposable Postgres testcontainers -> Docker required.
[scripts.run.test]
command = "pnpm test"
icon = "test-tube"
available_in = ["local"]

# Rebuild the local CodeGraph index for this worktree.
[scripts.run.codegraph]
command = "if cd \"$CONDUCTOR_WORKSPACE_PATH\" && pnpm codegraph:ready; then echo 'CodeGraph index ready.'; exit 0; else exit_code=$?; echo 'CodeGraph index build failed.' >&2; exit \"$exit_code\"; fi"
icon = "network"
available_in = ["local"]

# --- Action button prompts -------------------------------------------------
# Repo-wide instructions Conductor sends the agent for each action button.
# AGENTS.md remains the full source of truth; these are the short, button-
# specific reminders of the conventions most easily missed.
[prompts]
general = "Read AGENTS.md first (source of truth). English only in files/code/comments. Conventional commits. Money is Money<Currency> (bigint minor units), never native number. AI tool input schemas must never take organization_id/user_id/workspace_id/role."
code_review = "Focus on correctness, multi-tenant isolation (FORCE RLS + organization_id via withWorkspace/withOrganization/withAdminBypass), Money<Currency> usage, missing tests, and boundary validation. Flag any organization_id/user_id/role in AI tool input schemas. Prefer deleting complexity over rearranging it."
create_pr = "Title = Conventional Commit with an allowed scope (scripts/check-pr-title.mjs). Base on main. Add exactly one CHANGELOG.md Unreleased bullet with `pnpm changelog:add` before opening — never reorder or drop other entries. Body: what + why + a verification section. Use Closes #NNN for issues that should close on merge."
fix_errors = "Fix the root cause, not the symptom. Run pnpm typecheck + pnpm lint + the narrowest pnpm --filter <pkg> test. No any / unchecked casts to silence types. void fire-and-forget promises; wrap async React handlers as () => void handler()."
resolve_merge_conflicts = "CHANGELOG.md almost always conflicts — keep BOTH Unreleased entries, never drop another PR's bullet. Commit the merge with `git commit --no-verify` (lefthook corrupts merge commits and commitlint rejects a bare 'Merge' subject). Re-run pnpm typecheck after resolving."
rename_branch = "Branch = hlebtkachenko/<short-kebab-summary> derived from the task: lowercase, hyphens, no ticket prefixes."
