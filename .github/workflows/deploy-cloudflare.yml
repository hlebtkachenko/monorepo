# Trigger workflow for the Cloudflare Worker deploy.
#
# Push to main on `infra/cloudflare/**` → auto-deploy.
# Manual `workflow_dispatch` → one-off deploys (e.g. secret rotation, rollback).

name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - "infra/cloudflare/**"
      - ".github/workflows/_deploy-cloudflare.yml"
      - ".github/workflows/deploy-cloudflare.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target (currently production-only)"
        type: choice
        options:
          - production
        default: production

permissions: {}

jobs:
  deploy:
    # Caller MUST grant permissions at the job level — reusable workflow's
    # internal `permissions: { contents: read }` is capped by whatever the
    # caller grants. Without this, the called workflow gets zero
    # permissions and fails at startup (startup_failure, 0 jobs).
    permissions:
      contents: read
    uses: ./.github/workflows/_deploy-cloudflare.yml
    with:
      environment: ${{ inputs.environment || 'production' }}
    secrets: inherit
