name: Setup pnpm + Node + install
description: Bootstrap monorepo deps with pnpm 11 and Node (default 24). Caller runs actions/checkout first.
inputs:
  node-version:
    description: Node major version
    required: false
    default: "24"
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        run_install: false
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash

    - name: Configure Turbo Remote Cache defaults
      # If the caller workflow sets TURBO_API + TURBO_TOKEN at workflow or
      # job env scope, add the team + timeout defaults so turbo CLI picks
      # up a fully-configured remote cache automatically.
      #
      # When TURBO_API or TURBO_TOKEN is unset (e.g. the variable / secret
      # is missing, or this is a fork PR that can't access secrets), this
      # step no-ops and turbo falls back to the local .turbo cache only.
      # That keeps fork PRs working without giving them write access to
      # the cache.
      #
      # `continue-on-error: true` means a Cloudflare outage at this point
      # cannot red the build — worst case is a colder cache.
      shell: bash
      continue-on-error: true
      run: |
        if [ -n "${TURBO_API:-}" ] && [ -n "${TURBO_TOKEN:-}" ]; then
          echo "TURBO_TEAM=team_afframe" >> "$GITHUB_ENV"
          echo "TURBO_REMOTE_CACHE_TIMEOUT=30" >> "$GITHUB_ENV"
          echo "::add-mask::$TURBO_TOKEN"
          echo "turbo remote cache: enabled (api=$TURBO_API)" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "turbo remote cache: disabled (TURBO_API or TURBO_TOKEN unset)" >> "$GITHUB_STEP_SUMMARY"
        fi

    # PR / non-main events do NOT restore a local `.turbo` cache (CICD-06).
    # Measured: the read-only restore that used to run here cost ~38-50s per
    # job and almost always MISSED — the exact key carries the unique
    # `${{ github.sha }}`, and PRs never save (only main-push does), so the
    # prefix restore-keys only hit when a main-push had already saved this
    # job's `.turbo` at an identical input hash. The Cloudflare remote cache
    # (ADR-0021, `vars.TURBO_API` = cache.afframe.com) is the real cross-run
    # layer and turbo reads it directly per task — so the local layer was
    # pure latency on PRs. Removed. Fork PRs (no `TURBO_TOKEN`) run fully cold
    # at both layers, which is correct-but-slower and rare on this repo.
    #
    # Main-push STILL saves below so the deploy/release build path stays warm
    # and populates the remote cache for subsequent PRs.
    - name: Restore + save turbo cache (main push)
      # Writer side. Only push-to-main runs save (post-job hook); the per-job
      # key (`github.job`) means each job owns its own entry, so there is no
      # cross-job save race (matrix legs of one job share a key; the loser
      # logs a harmless "Unable to reserve cache" warning). Content-addressed
      # hash segment keeps cross-branch sharing. Inputs that invalidate:
      # dependency graph (lockfile + package.json), turbo config (turbo.json,
      # tsconfig.json), eslint config (lint task inputs).
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: .turbo
        key: turbo-${{ runner.os }}-${{ github.job }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/package.json', '**/tsconfig.json', 'eslint.config.js') }}-${{ github.sha }}
        restore-keys: |
          turbo-${{ runner.os }}-${{ github.job }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/package.json', '**/tsconfig.json', 'eslint.config.js') }}-
          turbo-${{ runner.os }}-${{ github.job }}-
