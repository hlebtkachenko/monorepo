name: Container Scan

# Activates as soon as apps/web/Dockerfile lands in the repo. Until then the
# guard step short-circuits so the workflow stays green on PRs that touch the
# listed paths but do not add a Dockerfile.
on:
  push:
    branches: [main]
    paths:
      - "apps/web/Dockerfile"
      - "apps/web/.dockerignore"
      - "apps/web/package.json"
      - "apps/web/pnpm-lock.yaml"
  pull_request:
    paths:
      - "apps/web/Dockerfile"
      - "apps/web/.dockerignore"
      - "apps/web/package.json"
      - "apps/web/pnpm-lock.yaml"

permissions: {}

concurrency:
  group: container-scan-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  trivy:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false

      - id: guard
        name: Detect Dockerfile presence
        shell: bash
        run: |
          set -euo pipefail
          if [ -f apps/web/Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/web/Dockerfile not present yet — skipping container scan."
          fi

      # 1. Filesystem scan — runs even before a Dockerfile exists, but only on
      # PRs that touch the watched paths. Catches dependency CVEs in the lock
      # file ahead of any image build.
      - if: steps.guard.outputs.exists == 'true'
        name: Trivy filesystem scan
        # SHA-pinned post the March 2026 supply-chain incident — re-verify if
        # aquasecurity ever force-pushes the tag (SHA pin defends against that).
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ./apps/web
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: "true"
          skip-dirs: "node_modules,.next"

      - if: steps.guard.outputs.exists == 'true' && always()
        name: Upload Trivy filesystem SARIF
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # zizmor: ignore[impostor-commit]
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      # 2. Image scan — only when a Dockerfile exists. Builds locally with no
      # push, then scans. linux/arm64 mirrors the eventual ECR Graviton target.
      - if: steps.guard.outputs.exists == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - if: steps.guard.outputs.exists == 'true'
        name: Build local image (no push)
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build --platform linux/arm64 \
            --load -t local/web:scan \
            -f apps/web/Dockerfile .

      - if: steps.guard.outputs.exists == 'true'
        name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: local/web:scan
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: "true"

      - if: steps.guard.outputs.exists == 'true' && always()
        name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # zizmor: ignore[impostor-commit]
        with:
          sarif_file: trivy-image.sarif
          category: trivy-container
