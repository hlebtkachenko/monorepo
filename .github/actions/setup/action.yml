name: Setup pnpm + Node + install
description: Bootstrap monorepo deps with pnpm 11 and Node (default 24). Caller runs actions/checkout first.
inputs:
  node-version:
    description: Node major version
    required: false
    default: "24"
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      with:
        run_install: false
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash
    - name: Restore turbo cache
      # Content-addressed primary key — same input hash on a different
      # branch hits the cache (cross-branch sharing). Falls back through
      # increasingly broad prefixes so a partial match still warms the
      # `.turbo` directory rather than starting cold.
      # Inputs that invalidate the cache: dependency graph (lockfile +
      # package.json), turbo config (turbo.json, tsconfig.json),
      # eslint config (lint task inputs).
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: .turbo
        key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/package.json', '**/tsconfig.json', 'eslint.config.js') }}-${{ github.sha }}
        restore-keys: |
          turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/package.json', '**/tsconfig.json', 'eslint.config.js') }}-
          turbo-${{ runner.os }}-
