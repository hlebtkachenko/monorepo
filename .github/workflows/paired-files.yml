name: Paired files

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: paired-files-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check paired files
        run: bash .github/scripts/check-paired-files.sh
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
      - name: Check documentation
        run: node scripts/check-docs.mjs
      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup
      - name: Check archetype body ratchet
        run: node scripts/governance/check-archetype-body.mjs
      - name: Check changelog fragment added
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
        run: node scripts/governance/check-changelog-fragment.mjs
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
