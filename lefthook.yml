commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  commands:
    prettier:
      glob: "*.{ts,tsx,js,jsx,mjs,json,jsonc,md,yml,yaml,css}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    no-drizzle-kit-generate:
      glob: "*.{json,jsonc,yml,yaml,sh,ts,mjs,cjs}"
      run: |
        if grep -nE 'drizzle-kit[[:space:]]+(generate|push)' {staged_files} | grep -v 'is forbidden'; then
          echo "ADR-0009: 'drizzle-kit generate' / 'drizzle-kit push' are forbidden — migrations are handwritten SQL in packages/db/migrations/."
          exit 1
        fi
