name: OSV-Scanner PR

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: osv-scanner-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-pr:
    permissions:
      actions: read
      contents: read
      security-events: write # SARIF upload to the Security tab
    # Reusable workflow — invoked at the job level via `uses:`, NOT as a step.
    # Reusable workflow refs cannot be SHA-pinned by GitHub policy; pin to the semantic tag.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.5
    with:
      scan-args: |-
        --recursive
        --skip-git
        ./
