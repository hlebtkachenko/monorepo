name: _deploy-aws

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub environment (staging | production)"
        required: true
        type: string
      stack:
        description: "Stack scope: all | infra-only | app-only"
        required: false
        type: string
        default: "all"
    outputs:
      deployed:
        description: "Whether the deploy step actually ran"
        value: ${{ jobs.deploy.outputs.deployed }}
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - staging
          - production
      stack:
        description: "Stack scope"
        required: false
        type: choice
        default: "all"
        options:
          - all
          - infra-only
          - app-only

permissions: {}

concurrency:
  group: deploy-aws-${{ inputs.environment }}-${{ inputs.stack }}
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      go: ${{ steps.flag.outputs.go }}
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - id: flag
        env:
          BOOTSTRAPPED: ${{ vars.AWS_BOOTSTRAPPED }}
        run: |
          if [ "${BOOTSTRAPPED}" = "true" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "AWS not yet connected. Set AWS_BOOTSTRAPPED=true after running cdk bootstrap once."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: guard
    if: needs.guard.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    outputs:
      deployed: ${{ steps.summary.outputs.deployed }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ENV_NAME: ${{ inputs.environment }}
      STACK_SCOPE: ${{ inputs.stack }}
      IMAGE_TAG: sha-${{ github.sha }}
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false

      - name: Mask account-bearing inputs in logs
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
        run: |
          echo "::add-mask::$ACCOUNT_ID"
          if [ -n "$STAGING_ROLE" ]; then echo "::add-mask::$STAGING_ROLE"; fi
          if [ -n "$PRODUCTION_ROLE" ]; then echo "::add-mask::$PRODUCTION_ROLE"; fi

      - name: Resolve role ARN + domain for environment
        id: env
        env:
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
          STAGING_DOMAIN: ${{ vars.APP_DOMAIN_STAGING }}
          PRODUCTION_DOMAIN: ${{ vars.APP_DOMAIN_PRODUCTION }}
        run: |
          case "$ENV_NAME" in
            staging)
              echo "role=$STAGING_ROLE" >> "$GITHUB_OUTPUT"
              echo "domain=$STAGING_DOMAIN" >> "$GITHUB_OUTPUT"
              ;;
            production)
              echo "role=$PRODUCTION_ROLE" >> "$GITHUB_OUTPUT"
              echo "domain=$PRODUCTION_DOMAIN" >> "$GITHUB_OUTPUT"
              ;;
            *) echo "Unknown environment: $ENV_NAME"; exit 1 ;;
          esac

      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ steps.env.outputs.role }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.run_id }}
          audience: sts.amazonaws.com

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 11.0.9

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v6.0.0
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy infra stacks (Network, Data, Security, Observability, BillingAlarms, Backup) [stack=all|infra-only]
        if: env.STACK_SCOPE != 'app-only'
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          APP_DOMAIN: ${{ steps.env.outputs.domain }}
        # BillingAlarms-${ENV_NAME} deploys to us-east-1 (EstimatedCharges is
        # only published there); the deploy IAM role must therefore have
        # CloudFormation + SNS + CloudWatch permissions in BOTH eu-central-1
        # and us-east-1. CDK handles the cross-region orchestration in a
        # single `cdk deploy` call.
        run: |
          pnpm --filter @workspace/cdk exec cdk deploy \
            "Network-${ENV_NAME}" "Data-${ENV_NAME}" \
            "Security-${ENV_NAME}" "Observability-${ENV_NAME}" \
            "BillingAlarms-${ENV_NAME}" "Backup-${ENV_NAME}" \
            --context "env=${ENV_NAME}" \
            --require-approval=never

      - name: ECR login [stack=all|app-only]
        if: env.STACK_SCOPE != 'infra-only'
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5
        id: ecr

      - name: Docker QEMU (arm64 cross-build on amd64 runners) [stack=all|app-only]
        if: env.STACK_SCOPE != 'infra-only'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Docker Buildx (enables gha cache + multi-arch) [stack=all|app-only]
        if: env.STACK_SCOPE != 'infra-only'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build + push web image [stack=all|app-only]
        if: env.STACK_SCOPE != 'infra-only'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/monorepo-${{ inputs.environment }}-web:${{ env.IMAGE_TAG }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=web-${{ inputs.environment }}
          cache-to: type=gha,scope=web-${{ inputs.environment }},mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.repository.updated_at }}
            BUILD_VERSION=${{ env.IMAGE_TAG }}

      - name: Build + push api image [stack=all|app-only]
        if: env.STACK_SCOPE != 'infra-only'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/monorepo-${{ inputs.environment }}-api:${{ env.IMAGE_TAG }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=api-${{ inputs.environment }}
          cache-to: type=gha,scope=api-${{ inputs.environment }},mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.repository.updated_at }}
            BUILD_VERSION=${{ env.IMAGE_TAG }}

      - name: Ensure Cloudflare Tunnel token secret exists in Secrets Manager [stack=all|app-only]
        if: env.STACK_SCOPE != 'infra-only'
        env:
          TUNNEL_TOKEN: ${{ secrets[format('CLOUDFLARE_TUNNEL_TOKEN_{0}', inputs.environment)] }}
        run: |
          if [ -z "$TUNNEL_TOKEN" ]; then
            echo "::error::CLOUDFLARE_TUNNEL_TOKEN_${ENV_NAME^^} secret is not set. Create the tunnel in Cloudflare and store its token."
            exit 1
          fi
          echo "::add-mask::$TUNNEL_TOKEN"
          SECRET_NAME="monorepo-${ENV_NAME}-cloudflare-tunnel-token"
          if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            aws secretsmanager put-secret-value \
              --secret-id "$SECRET_NAME" \
              --secret-string "$TUNNEL_TOKEN" \
              --region "$AWS_REGION" \
              >/dev/null
          else
            aws secretsmanager create-secret \
              --name "$SECRET_NAME" \
              --secret-string "$TUNNEL_TOKEN" \
              --description "Cloudflare Tunnel connector token for cloudflared sidecar (monorepo ${ENV_NAME})" \
              --region "$AWS_REGION" \
              >/dev/null
          fi

      - name: Deploy app stack with new image tag [stack=all|app-only]
        if: env.STACK_SCOPE != 'infra-only'
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          APP_DOMAIN: ${{ steps.env.outputs.domain }}
        run: |
          pnpm --filter @workspace/cdk exec cdk deploy \
            "App-${ENV_NAME}" \
            --context "env=${ENV_NAME}" \
            --context "imageTag=${IMAGE_TAG}" \
            --require-approval=never

      - id: summary
        run: echo "deployed=true" >> "$GITHUB_OUTPUT"
