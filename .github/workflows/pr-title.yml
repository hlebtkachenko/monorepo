name: PR title

# Squash-merge ships ONLY the PR title to main as the single commit.
# commitlint validates per-commit messages on the branch (discarded on squash).
# Both gates together keep main history conventional.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions: {}

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  conv-title:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            perf
            chore
            docs
            test
            build
            ci
            style
            revert
          scopes: |
            admin
            ai
            api
            auth
            bot
            brain
            bundle
            ci
            cli
            config
            db
            deps
            deps-dev
            docs
            email
            github
            governance
            i18n
            infra
            mcp
            observability
            pdf
            release
            sdk
            secrets
            shared
            storage
            tests
            turbo
            ui
            web
            workers
          requireScope: false
          subjectPattern: ^[a-z0-9].+$
