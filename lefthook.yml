commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  commands:
    prettier:
      glob: "*.{ts,tsx,js,jsx,mjs,json,jsonc,md,yml,yaml,css}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: "*.{ts,tsx,js,jsx,mjs}"
      run: pnpm exec eslint --flag v10_config_lookup_from_file --fix {staged_files}
      stage_fixed: true
    no-drizzle-kit-generate:
      glob: "*.{json,jsonc,yml,yaml,sh,ts,mjs,cjs}"
      run: |
        # Exclude lines that also say "forbidden": those are this repo's own
        # guard messages / anti-drizzle-kit scripts (lefthook.yml, packages/db
        # package.json), not real command invocations.
        if grep -nE 'drizzle-kit[[:space:]]+(generate|push)' {staged_files} | grep -v forbidden; then
          echo "ADR-0009: 'drizzle-kit generate' / 'drizzle-kit push' are forbidden — migrations are handwritten SQL in packages/db/migrations/."
          exit 1
        fi
    gitleaks:
      # Local secret scan on staged files. Defence-in-depth: CI gitleaks
      # (ci.yml gitleaks job) is the authoritative gate; this hook catches
      # secrets before they reach the remote. No-ops if gitleaks is not
      # installed (brew install gitleaks) so the hook never blocks a commit
      # on a fresh checkout without local tooling.
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --staged --redact --no-banner
        else
          echo "[lefthook gitleaks] not installed — skipping. brew install gitleaks to enable local secret scan."
        fi
