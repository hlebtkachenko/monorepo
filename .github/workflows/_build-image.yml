# ECR migration: replace registry with `${{ vars.AWS_ACCOUNT_ID_PROD }}.dkr.ecr.eu-central-1.amazonaws.com`,
# swap docker/login-action for aws-actions/amazon-ecr-login. Trust policy must use environment scope,
# not branch scope (branch claims are spoofable from PR forks).
name: _build-image

on:
  workflow_call:
    inputs:
      image-name:
        description: "Short image name (lands at ghcr.io/<owner>/<image-name>)"
        required: true
        type: string
      dockerfile-path:
        description: "Dockerfile path"
        required: false
        type: string
        default: "apps/web/Dockerfile"
      context-path:
        description: "Build context"
        required: false
        type: string
        default: "."
      platforms:
        description: "Target platforms (comma-separated)"
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      push:
        description: "Whether to push to registry"
        required: false
        type: boolean
        default: true
    outputs:
      image-digest:
        description: "Resulting image digest (sha256:...)"
        value: ${{ jobs.build.outputs.digest }}
      image-ref:
        description: "Resulting image refs (multi-line)"
        value: ${{ jobs.build.outputs.tags }}

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      id-token: write
      contents: read
      packages: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ inputs.image-name }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=ref,event=branch,prefix=branch-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.context-path }}
          file: ${{ inputs.dockerfile-path }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.repository.updated_at }}
            BUILD_VERSION=${{ steps.meta.outputs.version }}

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Cosign keyless sign
        if: ${{ inputs.push }}
        env:
          IMAGE: ghcr.io/${{ github.repository }}/${{ inputs.image-name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
