# Tests for the invoice resource policy.
#
# Verifies:
#   - Locked invoice cannot be edited (even by admin)
#   - Locked invoice cannot be deleted (even by admin)
#   - Guest can only view (not edit/delete/share)
#   - Org member can view and edit (unlocked)
#   - Org admin can share
#   - Org admin can delete (unlocked)
#   - Org member cannot delete
#   - Org member cannot share
---
name: Invoice resource policy tests
description: Full coverage of invoice CRUD + locked state + role matrix
tests:
  - name: locked invoice cannot be edited by org admin
    input:
      principals:
        - id: admin-001
          roles: [org_admin]
      resources:
        - id: inv-locked
          kind: invoice
          attr:
            locked: true
      actions: [edit]
    expected:
      - principal: admin-001
        resource: inv-locked
        actions:
          edit: EFFECT_DENY

  - name: locked invoice cannot be deleted by org admin
    input:
      principals:
        - id: admin-001
          roles: [org_admin]
      resources:
        - id: inv-locked
          kind: invoice
          attr:
            locked: true
      actions: [delete]
    expected:
      - principal: admin-001
        resource: inv-locked
        actions:
          delete: EFFECT_DENY

  - name: locked invoice cannot be edited by org owner
    input:
      principals:
        - id: owner-001
          roles: [org_owner]
      resources:
        - id: inv-locked
          kind: invoice
          attr:
            locked: true
      actions: [edit]
    expected:
      - principal: owner-001
        resource: inv-locked
        actions:
          edit: EFFECT_DENY

  - name: guest can view invoice
    input:
      principals:
        - id: guest-001
          roles: [org_guest]
      resources:
        - id: inv-001
          kind: invoice
          attr:
            locked: false
      actions: [view]
    expected:
      - principal: guest-001
        resource: inv-001
        actions:
          view: EFFECT_ALLOW

  - name: guest cannot edit invoice
    input:
      principals:
        - id: guest-001
          roles: [org_guest]
      resources:
        - id: inv-001
          kind: invoice
          attr:
            locked: false
      actions: [edit]
    expected:
      - principal: guest-001
        resource: inv-001
        actions:
          edit: EFFECT_DENY

  - name: guest cannot delete invoice
    input:
      principals:
        - id: guest-001
          roles: [org_guest]
      resources:
        - id: inv-001
          kind: invoice
          attr:
            locked: false
      actions: [delete]
    expected:
      - principal: guest-001
        resource: inv-001
        actions:
          delete: EFFECT_DENY

  - name: guest cannot share invoice
    input:
      principals:
        - id: guest-001
          roles: [org_guest]
      resources:
        - id: inv-001
          kind: invoice
          attr:
            locked: false
      actions: [share]
    expected:
      - principal: guest-001
        resource: inv-001
        actions:
          share: EFFECT_DENY

  - name: org member can edit unlocked invoice
    input:
      principals:
        - id: member-001
          roles: [org_member]
      resources:
        - id: inv-002
          kind: invoice
          attr:
            locked: false
      actions: [edit]
    expected:
      - principal: member-001
        resource: inv-002
        actions:
          edit: EFFECT_ALLOW

  - name: org member cannot delete invoice
    input:
      principals:
        - id: member-001
          roles: [org_member]
      resources:
        - id: inv-002
          kind: invoice
          attr:
            locked: false
      actions: [delete]
    expected:
      - principal: member-001
        resource: inv-002
        actions:
          delete: EFFECT_DENY

  - name: org member cannot share invoice
    input:
      principals:
        - id: member-001
          roles: [org_member]
      resources:
        - id: inv-002
          kind: invoice
          attr:
            locked: false
      actions: [share]
    expected:
      - principal: member-001
        resource: inv-002
        actions:
          share: EFFECT_DENY

  - name: org admin can share invoice
    input:
      principals:
        - id: admin-001
          roles: [org_admin]
      resources:
        - id: inv-002
          kind: invoice
          attr:
            locked: false
      actions: [share]
    expected:
      - principal: admin-001
        resource: inv-002
        actions:
          share: EFFECT_ALLOW

  - name: org admin can delete unlocked invoice
    input:
      principals:
        - id: admin-001
          roles: [org_admin]
      resources:
        - id: inv-002
          kind: invoice
          attr:
            locked: false
      actions: [delete]
    expected:
      - principal: admin-001
        resource: inv-002
        actions:
          delete: EFFECT_ALLOW
