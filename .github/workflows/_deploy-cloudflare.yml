# Reusable Cloudflare Workers deploy workflow.
#
# Called by `.github/workflows/deploy-cloudflare.yml` on push to main when
# `infra/cloudflare/**` changes, or manually via `workflow_dispatch`.
#
# What it does:
#   1. Ensures the account has a workers.dev subdomain registered
#      (account-level prereq for cron-trigger registration; wrangler v4
#      enforces it even when `workers_dev: false`).
#   2. Ensures R2 bucket exists (API pre-check, then create if missing).
#   3. Deploys the Worker from `infra/cloudflare/`.
#   4. Pushes `TURBO_TOKEN` as a Worker secret (stdin-piped, never logged).
#
# Cloudflare account/token via repo secrets `CLOUDFLARE_API_TOKEN` +
# `CLOUDFLARE_ACCOUNT_ID`. Worker auth token via repo secret `TURBO_TOKEN`.

name: _deploy-cloudflare

on:
  workflow_call:
    inputs:
      environment:
        description: "Cloudflare deployment target (e.g. production, preview). Maps to wrangler --env."
        required: false
        type: string
        default: "production"

permissions: {}

concurrency:
  group: deploy-cloudflare-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Ensure account has workers.dev subdomain registered
        # Wrangler v4 fails cron-trigger registration with error 10063
        # ("You need a workers.dev subdomain") even when `workers_dev: false`
        # in wrangler.jsonc. Custom-domain routing (cache.afframe.com) does
        # not satisfy this account-level prereq. Idempotent: GET pre-check;
        # PUT only on first run. The subdomain is never used at runtime —
        # all traffic flows through the custom domain.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          existing=$(curl -fsS \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
            | jq -r '.result.subdomain // ""')
          if [ -n "$existing" ]; then
            echo "Workers subdomain already registered: ${existing}.workers.dev"
            exit 0
          fi
          for name in hapd-cache afframe-cache hapdglobal-cache; do
            echo "Trying to register workers.dev subdomain: $name"
            resp=$(curl -sS -X PUT \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"subdomain\":\"$name\"}" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain")
            if echo "$resp" | jq -e '.success == true' >/dev/null; then
              echo "Registered: ${name}.workers.dev"
              exit 0
            fi
            echo "Failed: $resp"
          done
          echo "::error::Could not register any workers.dev subdomain — pick one manually in CF dashboard"
          exit 1

      - name: Ensure R2 bucket exists
        # Idempotent: check via API first, only call wrangler create when
        # the bucket genuinely doesn't exist. The prior version's pipe
        # `pnpm exec wrangler ... | tee ... || grep "already exists"`
        # was brittle (pipefail + grep pattern didn't match wrangler v4
        # error code 10004's actual output).
        working-directory: infra/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          http=$(curl -sS -o /tmp/cf-r2.json -w '%{http_code}' \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/r2/buckets")
          if [ "$http" != "200" ]; then
            echo "::error::R2 list returned HTTP $http"
            cat /tmp/cf-r2.json
            exit 1
          fi
          if jq -e --arg n turbo-cache-prod \
              '.result.buckets[]? | select(.name == $n)' \
              /tmp/cf-r2.json > /dev/null; then
            echo "Bucket turbo-cache-prod already exists — skipping create"
          else
            pnpm exec wrangler r2 bucket create turbo-cache-prod
          fi

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: infra/cloudflare
          wranglerVersion: "4.59.2"
          command: deploy

      - name: Push TURBO_TOKEN as Worker secret (stdin-piped)
        # `wrangler secret put` reads value from stdin. Piped from env, never
        # echoed. ::add-mask:: registers the value as a secret in this
        # job's log scrubber as belt-and-suspenders.
        working-directory: infra/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
        run: |
          echo "::add-mask::$TURBO_TOKEN"
          printf '%s' "$TURBO_TOKEN" | pnpm exec wrangler secret put TURBO_TOKEN

      - name: Resolve Worker URL
        id: worker
        env:
          TURBO_API: ${{ vars.TURBO_API }}
        run: |
          # Source of truth is `vars.TURBO_API` (the same URL CI consumers use
          # via `.github/actions/setup`). wrangler.jsonc must bind the Worker
          # to the matching custom domain — see docs/DOMAINS-AND-EMAIL.md
          # "cache.afframe.com" entry.
          url="${TURBO_API:?vars.TURBO_API is not set — configure it before deploying}"
          echo "url=${url}" >> "$GITHUB_OUTPUT"
          echo "Worker URL: ${url}" >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke check Worker is reachable
        env:
          URL: ${{ steps.worker.outputs.url }}
        run: |
          # Worker should respond on / even without auth (Hono default 404 or upstream's index route).
          # We just want a non-5xx HTTP response to prove the Worker is deployed and routing.
          http=$(curl -sSL -o /dev/null -w '%{http_code}' "${URL}")
          if [ "${http}" -ge 500 ]; then
            echo "::error::Worker URL ${URL} returned HTTP ${http}"
            exit 1
          fi
          echo "Worker reachable: HTTP ${http}" >> "$GITHUB_STEP_SUMMARY"
