# NOTE on path-filtering: required-status-check rules + paths-ignore on a
# workflow trigger create stuck PRs (skipped checks read as "missing" to the
# rule engine). We intentionally do NOT path-filter this workflow at the
# trigger level. TODO: revisit once we add a "ci-status" shim job pattern or
# branch-protection switches off "Require branches to be up to date".

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
      - uses: ./.github/actions/setup

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Lint
        run: pnpm turbo lint

      - name: Test
        # @workspace/db tests require a Postgres 18 testcontainer or service.
        # They run in the dedicated db-tests.yml workflow. Excluding here
        # avoids Docker overhead + double execution.
        run: pnpm turbo test --filter=!@workspace/db

      - name: Test Coverage
        run: pnpm --filter @workspace/ui test:coverage

      - name: Build Storybook
        run: pnpm --filter @workspace/ui build-storybook

      - name: Install Playwright
        # Run inside @workspace/ui where playwright is a devDependency.
        # `pnpm exec` from repo root cannot find the binary because the
        # package isn't a root dep. Include chromium-headless-shell:
        # @storybook/test-runner launches that variant explicitly and
        # GitHub runner image updates stopped pre-caching it.
        # `--with-deps` installs the apt dependencies too.
        run: pnpm --filter @workspace/ui exec playwright install --with-deps chromium chromium-headless-shell webkit

      - name: Storybook Interaction & A11y Tests
        run: |
          pnpm dlx concurrently -k -s first -n "SB,TEST" \
            "pnpm dlx http-server packages/ui/storybook-static --port 6006 --silent" \
            "pnpm dlx wait-on tcp:127.0.0.1:6006 && pnpm --filter @workspace/ui test-storybook --url http://127.0.0.1:6006"

      - name: Build
        run: pnpm turbo build

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.22.1"
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan
        run: gitleaks detect --source . --no-banner --redact --log-level info --exit-code 1
