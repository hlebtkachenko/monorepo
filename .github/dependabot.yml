version: 2

updates:
  # npm — workspace root (covers all workspaces via lockfile)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
    commit-message:
      prefix: "chore"
      include: scope
    cooldown:
      default-days: 7

  # GitHub Actions — group everything together so SHA bumps land in one PR
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: scope

  # Docker base image used by apps/web Dockerfile (the Next.js runtime)
  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    groups:
      apps-web-docker:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: scope

  # Docker base image used by apps/api Dockerfile (the NestJS runtime)
  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    groups:
      apps-api-docker:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: scope

  # Docker base image used by infra/Dockerfile.backup (ECS Scheduled Task in
  # BackupStack). Pinned per ADR-0015; bumped via Dependabot.
  - package-ecosystem: docker
    directory: /infra
    schedule:
      interval: weekly
      day: monday
    groups:
      infra-docker:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: scope
