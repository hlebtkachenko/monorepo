commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  commands:
    prettier:
      glob: "*.{ts,tsx,js,jsx,mjs,json,jsonc,md,yml,yaml,css}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: "*.{ts,tsx,js,jsx,mjs}"
      run: pnpm exec eslint --flag v10_config_lookup_from_file --fix {staged_files}
      stage_fixed: true
    no-drizzle-kit-generate:
      glob: "*.{json,jsonc,yml,yaml,sh,ts,mjs,cjs}"
      run: |
        # Exclude lines that also say "forbidden": those are this repo's own
        # guard messages / anti-drizzle-kit scripts (lefthook.yml, packages/db
        # package.json), not real command invocations.
        if grep -nE 'drizzle-kit[[:space:]]+(generate|push)' {staged_files} | grep -v forbidden; then
          echo "ADR-0009: 'drizzle-kit generate' / 'drizzle-kit push' are forbidden — migrations are handwritten SQL in packages/db/migrations/."
          exit 1
        fi
    gitleaks:
      # Local secret scan on staged files. Defence-in-depth: CI gitleaks
      # (ci.yml gitleaks job) is the authoritative gate; this hook catches
      # secrets before they reach the remote. No-ops if gitleaks is not
      # installed (brew install gitleaks) so the hook never blocks a commit
      # on a fresh checkout without local tooling.
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --staged --redact --no-banner
        else
          echo "[lefthook gitleaks] not installed — skipping. brew install gitleaks to enable local secret scan."
        fi
    infisical-scan:
      # Second secret scanner alongside gitleaks. Different rule set + token
      # heuristics catches what gitleaks misses (and vice-versa). Authoritative
      # gate is the CI infisical-scan job; local hook is best-effort. No-ops if
      # infisical CLI is not installed.
      run: |
        if command -v infisical >/dev/null 2>&1; then
          infisical scan git-changes --staged --verbose
        else
          echo "[lefthook infisical-scan] not installed — skipping. brew install infisical to enable."
        fi
    db-schema-snapshot:
      # Auto-regenerates packages/db/schema-snapshot.sql whenever a migration
      # file is staged. Requires a running local Postgres (see LOCAL-DEV.md
      # for how to bring one up with docker compose). The regenerated snapshot
      # is re-staged into the same commit so migration + snapshot are always
      # atomic. If Postgres is not running, the command fails noisily — start
      # it first:
      #   docker compose -f infra/compose/docker-compose.dev.yml up -d
      glob: "packages/db/migrations/*.sql"
      run: pnpm --filter @workspace/db db:schema-snapshot
      stage_fixed: true

pre-push:
  # Budget: total pre-push must stay under ~10s on a typical push so the
  # dev loop doesn't slow. Heavier checks (typecheck, full test, build,
  # osv-scanner, zizmor, knip) stay CI-only — pre-push is just the cheap
  # gates that catch the failure modes that cost a GitHub roundtrip.
  commands:
    pr-title:
      # Lints HEAD commit subject against the same Conventional Commits
      # rules as .github/workflows/pr-title.yml (conv-title check).
      # squash-merge ships ONLY the PR title to main, and `gh pr create`
      # defaults the title to the latest commit subject — so a bad subject
      # here will become a bad PR title and fail conv-title in CI.
      # Catches it before the push and the CI roundtrip.
      # `glob: "*"` forces the command to run on every push (default
      # behaviour skips when push has no file changes).
      glob: "*"
      run: node scripts/check-pr-title.mjs "$(git log -1 --format='%s')"
    actionlint:
      # Mirrors `.github/workflows/workflow-lint.yml` actionlint job.
      # Runs when workflow YAML changed. Composite actions under
      # `.github/actions/**` are intentionally excluded: actionlint's default
      # CLI invocation treats every input as a workflow and reports valid
      # composite-action syntax (`runs:`, `inputs:`, no `jobs:`/`on:`) as
      # syntax errors, blocking pushes that touch unrelated workflow files.
      # CI's `workflow-lint.yml` job covers composite actions via its own
      # actionlint setup; local pre-push coverage is workflows only.
      # ~300ms — catches GitHub Actions syntax + expression errors before
      # CI burns ~30s of runner time on the same failure.
      # No-ops gracefully if actionlint is not installed (brew install actionlint).
      glob:
        - ".github/workflows/*.yml"
        - ".github/workflows/*.yaml"
      run: |
        if command -v actionlint >/dev/null 2>&1; then
          actionlint {push_files}
        else
          echo "[lefthook actionlint] not installed — skipping. brew install actionlint to enable."
        fi
    boundaries:
      # Mirrors `.github/workflows/boundaries.yml` — turbo boundaries
      # enforces the dependency-tag deny-list in turbo.json (e.g. "ui"
      # cannot depend on "data"). ~1s on a warm turbo cache. Runs only
      # when something that could change the dep graph is in the push.
      glob:
        - "turbo.json"
        - "**/package.json"
        - "packages/**"
        - "apps/**"
        - "pnpm-workspace.yaml"
        - "pnpm-lock.yaml"
      run: pnpm turbo boundaries
    size-cap:
      # Mirrors `.github/workflows/size-cap.yml`. Hard cap 2000 lines added
      # (warn at 800) vs origin/main. Common review-burden gate. Excludes
      # the same noise paths as the workflow (lockfile, migrations meta,
      # binary assets). Sub-second.
      glob: "*"
      run: |
        if ! git rev-parse --verify --quiet origin/main >/dev/null; then
          echo "[lefthook size-cap] origin/main not fetched — skipping. Run: git fetch origin main"
          exit 0
        fi
        stat=$(git diff --shortstat origin/main...HEAD -- \
          ':!pnpm-lock.yaml' \
          ':!**/migrations/meta/**' \
          ':!**/*.svg' \
          ':!**/*.png' \
          ':!**/*.ico' \
          ':!**/*.woff' \
          ':!**/*.woff2')
        loc=$(echo "${stat}" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
        loc=${loc:-0}
        if [ "${loc}" -gt 2000 ]; then
          echo "[lefthook size-cap] FAIL: ${loc} lines added (cap 2000). Split the PR, or add label 'size-cap-override' on GitHub before pushing again."
          exit 1
        fi
        if [ "${loc}" -gt 800 ]; then
          echo "[lefthook size-cap] WARN: ${loc} lines added (warn at 800). Justify in PR description."
        fi
    osv-scanner:
      # Mirrors `.github/workflows/osv-scanner-pr.yml` (scan-pr / osv-scan).
      # Scans the pnpm lockfile for known CVEs. Only fires when the
      # lockfile or a package.json changed in this push. ~5-15s, gracefully
      # no-ops without local install (brew install osv-scanner).
      glob:
        - "pnpm-lock.yaml"
        - "**/package.json"
      run: |
        if command -v osv-scanner >/dev/null 2>&1; then
          osv-scanner --lockfile pnpm-lock.yaml
        else
          echo "[lefthook osv-scanner] not installed — skipping. brew install osv-scanner to enable local CVE scan."
        fi
    endpoint-checklist:
      # Catches the most common "added an endpoint, forgot to run codegen"
      # mistake before the push reaches CI. Fires when the registry, an api
      # controller, or the committed OpenAPI spec changed but the generated
      # SDK / MCP outputs did not. The full 7-step checklist lives in
      # `docs/runbooks/ENDPOINT-ADDITION-RUNBOOK.md` — this hook only flags
      # the codegen step, which is the failure mode CI gates `sdk-drift`
      # and `mcp-coverage` would otherwise catch ~5 min later.
      glob:
        - "packages/shared/src/api/**"
        - "apps/api/src/v1/**"
        - "apps/api/openapi/v1.json"
        - "packages/sdk/src/generated/**"
        - "apps/mcp/src/tools/generated/**"
      run: node scripts/governance/check-endpoint-checklist.mjs {push_files}
    db-smoke:
      # Mirrors `.github/workflows/db-tests.yml` smoke job:
      #   - migration filenames match NNNN_<snake>.sql
      #   - no lac_ prefix residue in db/observability source
      #   - drizzle-kit journal absent or empty (ADR-0009)
      # Only fires when db migrations or db/observability source changed.
      # Sub-second.
      glob:
        - "packages/db/migrations/**"
        - "packages/db/src/**"
        - "packages/observability/src/**"
      run: |
        bad=()
        for f in packages/db/migrations/*.sql; do
          [ -e "$f" ] || continue
          base=$(basename "$f")
          if ! echo "$base" | grep -qE '^[0-9]{4}_[a-z][a-z0-9_]*\.sql$'; then
            bad+=("$base")
          fi
        done
        if [ ${#bad[@]} -gt 0 ]; then
          echo "[lefthook db-smoke] FAIL: migration filenames must match NNNN_<snake>.sql:"
          printf '  %s\n' "${bad[@]}"
          exit 1
        fi
        matches=$(grep -rn 'lac_' packages/db/src/ packages/observability/src/ 2>/dev/null || true)
        if [ -n "$matches" ]; then
          echo "[lefthook db-smoke] FAIL: lac_ prefix residue in source:"
          echo "$matches"
          exit 1
        fi
        journal="packages/db/migrations/meta/_journal.json"
        if [ -f "$journal" ]; then
          entries=$(node -e "const j = JSON.parse(require('fs').readFileSync('$journal', 'utf8')); console.log((j.entries ?? []).length);")
          if [ "$entries" -gt 0 ]; then
            echo "[lefthook db-smoke] FAIL: $journal has $entries entries — drizzle-kit generate/push is forbidden (ADR-0009). Remove meta/ or wipe entries."
            exit 1
          fi
        fi
