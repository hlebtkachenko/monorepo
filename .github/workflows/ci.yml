# NOTE on path-filtering: required-status-check rules + paths-ignore on a
# workflow trigger create stuck PRs (skipped checks read as "missing" to the
# rule engine). We intentionally do NOT path-filter this workflow at the
# trigger level. The `ci` aggregation shim job (bottom of file) satisfies
# the single required `ci` status check, and the `changes` job below uses
# `dorny/paths-filter` to skip expensive downstream jobs WITHIN this
# workflow — `ci` still posts on every run so branch protection is happy.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

# Turbo Remote Cache env. Workflow-level so every job inherits.
# - `vars.TURBO_API` is a NON-SECRET GitHub repo variable holding the
#   Cloudflare Worker URL (https://turbo-cache.<account>.workers.dev).
#   Set manually after first Worker deploy — see
#   `docs/runbooks/CI-TURBO-REMOTE-CACHE.md`.
# - `secrets.TURBO_TOKEN` + `secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY`
#   are repo secrets generated during PR-D pre-flight.
# - When `vars.TURBO_API` is empty (e.g. fork PRs without access to
#   variables, or before first deploy), the composite's "Configure
#   Turbo Remote Cache defaults" step no-ops and turbo falls back to
#   local .turbo cache only. No build break.
env:
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Upstream paths-filter so downstream jobs can skip when their inputs
  # didn't change. Wall-time impact: skipping `storybook` drops ~3-4 min
  # of job time from PRs that don't touch packages/ui/**. The `ci`
  # aggregator at the bottom of this file treats `skipped` as non-failure,
  # so skipped jobs do not break the required `ci` status check.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
      infra: ${{ steps.filter.outputs.infra }}
      code: ${{ steps.filter.outputs.code }}
      deps: ${{ steps.filter.outputs.deps }}
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # .gitignore only affects UNTRACKED files — a force-add (or a rule added
      # after the fact) silently keeps ignored paths (_junk/, .env*, .context/)
      # in the tree, and nothing else gates on it (found via a _junk/ file that
      # rode to main inside #444). Runs here because `changes` runs on EVERY PR.
      - name: No tracked-but-gitignored files
        run: |
          tracked_ignored="$(git ls-files -i -c --exclude-standard)"
          if [ -n "$tracked_ignored" ]; then
            echo "::error::gitignored paths are tracked in the repo:"
            echo "$tracked_ignored"
            exit 1
          fi
      - id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            ui:
              - 'packages/ui/**'
            infra:
              - 'infra/cdk/**'
              - 'apps/*/package.json'
              - 'pnpm-lock.yaml'
            code:
              - 'apps/**'
              - 'packages/**'
              - 'infra/cdk/**'
              - 'tsconfig*.json'
              - '**/tsconfig*.json'
              - 'turbo.json'
              - '**/turbo.json'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - '.github/workflows/ci.yml'
              - '.github/actions/setup/**'
            deps:
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '**/package.json'

  # Split out of the old `lint-typecheck` job (CICD-05): typecheck and lint
  # are independent turbo tasks that share nothing but the runner setup, so
  # running them as two parallel jobs turns a ~sum into a ~max on the critical
  # path. Both are internal jobs rolled up by the `ci` aggregator — neither is
  # an individually-required context, so splitting adds no ruleset change. The
  # `eslint` name is deliberate: the required `lint` context belongs to
  # commitlint (commitlint.yml), so a job named `lint` here would collide.
  typecheck:
    needs: [changes]
    # Skip the whole runner setup on docs-only PRs (no code = no typecheck
    # work; --affected makes the inside a no-op but the setup still costs
    # ~60-90s). Aggregator treats `skipped` as non-failure so `ci` stays green.
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so `turbo --affected` can diff against the PR base.
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Typecheck
        # --affected scopes to packages touched vs the PR base. Empty diff
        # = no-op. Full graph still runs on push to main (HEAD^ base).
        env:
          AWS_ACCOUNT_ID: "000000000000"
          APP_DOMAIN: example.com
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || 'HEAD^' }}
        run: pnpm turbo typecheck --affected --ui=stream --continue

  eslint:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so `turbo --affected` can diff against the PR base.
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Lint
        env:
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || 'HEAD^' }}
        run: pnpm turbo lint --affected --ui=stream --continue

      # Hard gate for the org-UI rebuild dependency wall: the new /o tree must
      # stay warning-free (its no-cross-org-tree-import rule is downgraded to a
      # warning by the repo-wide onlyWarn, so --max-warnings 0 is what makes it
      # blocking). Not --affected: the wall must be checked on every run so a
      # new->old import can never slip through during coexistence. Cheap; skips
      # cleanly once the tree is git-mv'd to the canonical path at the flip.
      - name: Org tree boundary (new /o tree)
        run: pnpm --filter web lint:org-new

      # Deletion-safety gate for the FROZEN old tree: no file outside both org
      # trees may import app/[orgSlug]/** (scripts/* generators exempt until the
      # flip). Track A extracted every domain consumer out by hand; this keeps
      # that inbound list empty so the old tree can be deleted without breaking
      # any consumer. Runs a dedicated warning-immune config (the rule is
      # onlyWarn-downgraded in the base config, so error severity + a clean
      # standalone config is what makes outside->old blocking). Every run, not
      # --affected. Advisory until Hleb flips it required.
      - name: Org tree boundary (frozen old tree — no inbound imports)
        run: pnpm --filter web lint:org-orphan

      # `cdk synth` coverage moved to `workflow-lint / cdk-synth-strict` —
      # per-env + --strict mode + offline. See .github/workflows/workflow-lint.yml.

  unit-test:
    needs: [changes]
    # Same rationale as lint-typecheck: skip runner setup on docs-only PRs.
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so `turbo --affected` can diff against the PR base.
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Test
        # @workspace/db tests require a Postgres 18 testcontainer or service.
        # They run in the dedicated db-tests.yml workflow. Excluding here
        # avoids Docker overhead + double execution.
        # `web` is excluded too (CICD-05): apps/web tests boot a Postgres 18
        # testcontainer and run serially (fileParallelism: false) — a slow,
        # Docker-bound pole that would otherwise gate every other package's
        # fast pure-unit run. It gets its own `web-integration` job below so
        # the two run in parallel (critical path = max, not sum).
        # --affected scopes to packages touched vs the PR base. Full graph
        # still runs on push to main (HEAD^ base = previous commit only,
        # so on main the affected scope is one-commit delta, which is the
        # right scope for main).
        env:
          AWS_ACCOUNT_ID: "123456789012"
          APP_DOMAIN: test.example.com
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || 'HEAD^' }}
        run: pnpm turbo test --filter=!@workspace/db --filter=!web --affected --ui=stream --continue

  # apps/web integration tests, split out of `unit-test` (CICD-05). These boot
  # a Postgres 18 testcontainer via globalSetup and run serially, so they are
  # the slow pole of the old combined job. Isolated here they run concurrently
  # with the fast pure-unit packages. Docker is preinstalled on ubuntu-latest.
  web-integration:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so `turbo --affected` can diff against the PR base.
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Test (apps/web integration)
        env:
          AWS_ACCOUNT_ID: "123456789012"
          APP_DOMAIN: test.example.com
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || 'HEAD^' }}
        run: pnpm turbo test --filter=web --affected --ui=stream --continue

  coverage:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    # Advisory job — NOT in the `ci` aggregator's needs, so a coverage
    # failure cannot red the required `ci` check (same posture as the
    # trufflehog job below). Moved out of unit-test (CICD-03): the coverage
    # run added ~95s to the non-UI PR critical path while being explicitly
    # advisory. Runs in parallel instead.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so `turbo --affected` can diff against the PR base.
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Test Coverage
        env:
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || 'HEAD^' }}
        run: pnpm turbo test:coverage --filter=@workspace/ui --affected --ui=stream

  # Storybook build + interaction/a11y tests, sharded across a matrix (CICD-05).
  # History: single job (~220-240s) -> build + 2-shard test matrix with an
  # artifact handoff (SLOWER: each shard paid setup + Playwright deps + a
  # ~35s turbo-cache SAVE + an artifact download for only ~70-82s of test
  # work) -> collapsed back to one job. Two things changed since, which make
  # sharding win now: (1) build-storybook restores from the Cloudflare turbo
  # remote cache as `>>> FULL TURBO` in ~2s per leg, so there is NO artifact
  # handoff — each leg rebuilds instantly; (2) the a11y suite grew to ~173s,
  # large enough that splitting it 4 ways beats the per-leg fixed overhead.
  # `--shard=k/4` splits the 145 story suites evenly. webkit dropped: the
  # test-runner runs chromium only (no playwright.config declares a webkit
  # project), so installing it was pure waste. Gated on
  # `needs.changes.outputs.ui == 'true'` so non-UI PRs skip the whole job;
  # the aggregator treats `skipped` as non-failure.
  storybook:
    needs: [changes]
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      # One failing shard must not cancel the others — we want the full
      # a11y/interaction failure set in one run, not the first shard's only.
      fail-fast: false
      matrix:
        shard: ["1", "2", "3", "4"]
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Build Storybook
        run: pnpm turbo build-storybook --filter=@workspace/ui --ui=stream

      - name: Story coverage audit (advisory)
        # Advisory — surfaces missing variant stories / story files in the
        # log without blocking merge. Flip to required only after a green
        # cycle (same policy as every other new gate). Runs on one shard only
        # (identical output on every leg — no reason to run it four times).
        if: matrix.shard == '1'
        continue-on-error: true
        run: pnpm --filter @workspace/ui audit:stories

      # Key the browser cache on the INSTALLED playwright-core version (what
      # actually determines the bundled chromium revision), not the declared
      # range string — see the note in e2e.yml. Busts the cache on every real
      # version change so a stale browser can never survive a bump.
      - name: Resolve Playwright version
        id: pw-version
        run: |
          v=$(pnpm --filter @workspace/ui exec playwright --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw-version.outputs.version }}-chromium

      - name: Install Playwright (browsers + system deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @workspace/ui exec playwright install --with-deps chromium chromium-headless-shell

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @workspace/ui exec playwright install-deps chromium

      - name: Storybook Interaction & A11y Tests (shard ${{ matrix.shard }}/4)
        run: |
          pnpm dlx concurrently -k -s first -n "SB,TEST" \
            "pnpm dlx http-server packages/ui/storybook-static --port 6006 --silent" \
            "pnpm dlx wait-on tcp:127.0.0.1:6006 && pnpm --filter @workspace/ui test-storybook --url http://127.0.0.1:6006 --shard=${{ matrix.shard }}/4"

  build:
    needs: [changes]
    # Skip the full build on docs-only PRs. Aggregator treats `skipped` as
    # non-failure so the required `ci` check still posts green. Build stays
    # full-graph WHEN it runs (turbo cache restores unchanged outputs); we
    # only skip the runner setup + cold-cache cost when no buildable code
    # changed.
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # fetch-depth: 0 so the PR build can diff against the PR base for
          # `turbo --affected` (see the Build step). Cheap; harmless on push.
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Build
        # PR builds are compile-verify only, so they scope to `--affected`
        # (CICD-05): a change that can't affect a package's build can't break
        # it, and turbo's graph pulls in every dependent of a shared change.
        # Same gap as the typecheck --affected already in use, and the
        # main-push full-graph build below is the backstop. Push to main and
        # releases stay FULL-GRAPH — the deploy/release path consumes the
        # complete artifact set (apps/web/.next/standalone, apps/api/dist,
        # apps/admin/.next); a partial build there would poison the release.
        env:
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || 'HEAD^' }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm turbo build --affected --ui=stream
          else
            pnpm turbo build --ui=stream
          fi

      - name: Scan client bundle for leaked server secrets
        # Defence-in-depth post-build check. Fails if any server-only env var
        # or secret-shaped literal landed in apps/web/.next/static/**, or if
        # production source maps shipped. Cheap (<2s) — runs only when the
        # build above produced .next output.
        run: pnpm check:client-secrets

  # Lockfile dedupe drift check (DX-06 / DEP-09). ADVISORY — deliberately
  # NOT in the `ci` aggregator's needs, so a failure cannot red the required
  # `ci` check (same posture as the coverage and trufflehog jobs).
  # `pnpm dedupe --check` exits non-zero when the lockfile contains
  # dedupe-able duplicate entries; fix locally with `pnpm dedupe`.
  # No frozen install needed — the check only re-resolves the lockfile.
  dedupe-check:
    needs: [changes]
    if: needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
      - name: pnpm dedupe --check
        run: pnpm dedupe --check

  # Aggregation shim. `ci` is a REQUIRED status check on the main branch
  # ruleset. After splitting the monolithic job into parallel jobs, this job
  # keeps reporting a single `ci` context that is green only when every real
  # job succeeded. `if: always()` ensures it runs even when a dependency
  # fails, so a failure is reported instead of the context going missing.
  # `changes` is in needs so a paths-filter failure surfaces here too.
  # `skipped` is treated as non-failure (only `failure|cancelled` red the
  # aggregator) — that's how the storybook skip works without breaking
  # the required `ci` check.
  ci:
    needs:
      [changes, typecheck, eslint, unit-test, web-integration, storybook, build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Aggregate required checks
        run: |
          if echo '${{ join(needs.*.result, ',') }}' | grep -qE 'failure|cancelled'; then
            echo "A required CI job failed."; exit 1
          fi
          echo "All CI jobs passed."

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan
        run: gitleaks detect --source . --no-banner --redact --log-level info --exit-code 1

  infisical-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    # Second secret scanner alongside gitleaks. Different rule set + token
    # heuristics. Both must pass; either is sufficient to block a leak.
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # --no-git below means history is not scanned; shallow clone is enough.
          fetch-depth: 1
          persist-credentials: false
      - name: Install infisical CLI
        env:
          INFISICAL_VERSION: "0.43.100"
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/Infisical/cli/releases/download/v${INFISICAL_VERSION}/cli_${INFISICAL_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin infisical
          infisical --version
      - name: Scan
        # `--no-git`: scan working tree only (history false positives from pre-allowlist
        # paths are filtered by gitleaks' own job; this job catches new leaks).
        # `--config`: reuse the existing .gitleaks.toml allowlist + rules.
        # infisical CLI's `--exit-code` flag is vestigial (always exits 0), so we
        # post-process the JSON report and fail on any non-allowlisted finding.
        run: |
          set -euo pipefail
          infisical scan --no-git --config .gitleaks.toml \
            --report-path infisical-report.json --redact --verbose
          count=$(jq 'length' infisical-report.json)
          echo "infisical scan: $count finding(s)"
          if [ "$count" -gt 0 ]; then
            echo "::error::infisical-scan found $count secret(s). See report below."
            jq -r '.[] | "::error file=\(.File),line=\(.Line // 0)::\(.RuleID): \(.Description // "secret detected")"' infisical-report.json
            exit 1
          fi

  trufflehog:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    # Third secret scanner. gitleaks + infisical are regex/entropy only — they
    # flag *candidate* secrets but can't tell a live key from a dead one.
    # TruffleHog's `--only-verified` authenticates each finding against its
    # provider, so this job catches differently-shaped secrets the regex
    # scanners miss and confirms which are still active (near-zero false
    # positives). Advisory: not in the required `ci` rollup.
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          # MUST stay `audit`, never `block`: `--only-verified` makes outbound
          # calls to each provider's API to confirm a secret is live. Under
          # `block` those calls are dropped and verification silently degrades
          # to "unknown" — live secrets would stop failing the job.
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history — verified scan over every commit
          persist-credentials: false
      - name: Install trufflehog
        env:
          TRUFFLEHOG_VERSION: "3.95.8"
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin trufflehog
          trufflehog --version
      - name: Scan
        # `git file://.` scans full local history (fetch-depth: 0 above).
        # `--only-verified`: provider-confirmed live secrets only.
        # `--fail`: non-zero exit when any verified secret is found.
        # `--no-update`: block the self-update network call.
        run: trufflehog git file://. --only-verified --fail --no-update
