name: _deploy-aws

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub environment (staging | production)"
        required: true
        type: string
      stack:
        description: "Stack scope: all | infra-only | app-only"
        required: false
        type: string
        default: "all"
      image_tag_override:
        description: "Existing image tag to deploy (e.g. sha-abcdef). When set, skips image build + push and the secret-ensure steps; the CDK step uses this tag. The three images (web, api, admin) must already exist in ECR for the target env."
        required: false
        type: string
        default: ""
      force_rebuild_images:
        description: "Force the build-images matrix to run even when no app source changed since the last successful deploy. Default false — the detect-changes job skips image builds when apps/** + relevant packages did not change, and reuses the last-deployed image tag from SSM."
        required: false
        type: boolean
        default: false
      build_version:
        description: "Value to bake into the image's BUILD_VERSION env (drives the runtime footer + /api/version + OpenAPI info.version + Sentry release tag). Strip-leading-v applied. Empty = auto-detect: a git tag at HEAD wins (e.g. v0.2.0 -> 0.2.0); otherwise short SHA (e.g. sha-3793b59). For release deploys: leave empty after tagging — the tag context is picked up automatically. Set explicitly only for hotfix / cosmetic relabel scenarios."
        required: false
        type: string
        default: ""
    outputs:
      deployed:
        description: "Whether the deploy step actually ran"
        value: ${{ jobs.deploy.outputs.deployed }}
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - staging
          - production
      stack:
        description: "Stack scope"
        required: false
        type: choice
        default: "all"
        options:
          - all
          - infra-only
          - app-only
      image_tag_override:
        description: "Existing image tag to deploy (e.g. sha-abcdef). Empty = build+push images for the current commit (or reuse last-deployed images if app source did not change since last deploy). Set this to a specific tag to pin a CDK-only retry."
        required: false
        type: string
        default: ""
      force_rebuild_images:
        description: "Force build-images matrix even when no app source changed since last deploy."
        required: false
        type: boolean
        default: false
      build_version:
        description: "Override BUILD_VERSION baked into the image. Empty = auto-detect (git tag at HEAD, else short SHA). Set for hotfix relabel only."
        required: false
        type: string
        default: ""

permissions: {}

concurrency:
  # Per-env, scope-independent. `stack=app-only` and `stack=infra-only`
  # touch overlapping CFN/ECS state; sequencing them per env prevents
  # races on shared resources (log groups, secrets, services).
  group: deploy-aws-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      go: ${{ steps.flag.outputs.go }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - id: flag
        env:
          BOOTSTRAPPED: ${{ vars.AWS_BOOTSTRAPPED }}
        run: |
          if [ "${BOOTSTRAPPED}" = "true" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "AWS deploy gated: vars.AWS_BOOTSTRAPPED is not 'true'. Set it to 'true' to enable deploys."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

  # Pre-deploy fast-fail on missing repo vars / secrets. CDK throws on the
  # same conditions ~8 min into the deploy job; surfacing them here turns
  # an opaque half-deploy failure into a 30-second guard step.
  validate-inputs:
    needs: guard
    if: needs.guard.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    environment: ${{ inputs.environment }}
    env:
      ENV_NAME: ${{ inputs.environment }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      APP_DOMAIN_STAGING: ${{ vars.APP_DOMAIN_STAGING }}
      APP_DOMAIN_PRODUCTION: ${{ vars.APP_DOMAIN_PRODUCTION }}
      ADMIN_DOMAIN_STAGING: ${{ vars.ADMIN_DOMAIN_STAGING }}
      ADMIN_DOMAIN_PRODUCTION: ${{ vars.ADMIN_DOMAIN_PRODUCTION }}
      STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
      PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
      STAGING_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN_STAGING }}
      PRODUCTION_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN_PRODUCTION }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_FORWARD_TO: ${{ secrets.EMAIL_FORWARD_TO }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Assert required vars + secrets are present
        run: |
          set -euo pipefail
          fail=0
          check() {
            local label="$1" value="$2"
            if [ -z "${value:-}" ] || [[ "$value" =~ ^[[:space:]]*$ ]]; then
              echo "::error::Required input '${label}' is empty for env=${ENV_NAME}"
              fail=1
            fi
          }
          check AWS_REGION "$AWS_REGION"
          check AWS_ACCOUNT_ID "$AWS_ACCOUNT_ID"
          check RESEND_API_KEY "$RESEND_API_KEY"
          check EMAIL_FORWARD_TO "$EMAIL_FORWARD_TO"
          case "$ENV_NAME" in
            staging)
              check APP_DOMAIN_STAGING "$APP_DOMAIN_STAGING"
              check ADMIN_DOMAIN_STAGING "$ADMIN_DOMAIN_STAGING"
              check AWS_DEPLOY_ROLE_ARN_STAGING "$STAGING_ROLE"
              check CLOUDFLARE_TUNNEL_TOKEN_STAGING "$STAGING_TUNNEL_TOKEN"
              ;;
            production)
              check APP_DOMAIN_PRODUCTION "$APP_DOMAIN_PRODUCTION"
              check ADMIN_DOMAIN_PRODUCTION "$ADMIN_DOMAIN_PRODUCTION"
              check AWS_DEPLOY_ROLE_ARN_PRODUCTION "$PRODUCTION_ROLE"
              check CLOUDFLARE_TUNNEL_TOKEN_PRODUCTION "$PRODUCTION_TUNNEL_TOKEN"
              ;;
            *)
              echo "::error::Unknown environment: $ENV_NAME"
              exit 1
              ;;
          esac
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more required deploy inputs are empty. Set them in repo settings (Variables / Secrets) for the '${ENV_NAME}' environment before re-running."
            exit "$fail"
          fi
          echo "All required deploy inputs present for env=${ENV_NAME}."

  # Brand surface guard for production deploys only. Staging is allowed to
  # ship with <BRAND-*> placeholders in i18n messages + constants so brand
  # copy can be iterated against a real deploy without blocking; production
  # must not. Kept in a dedicated job (not inside validate-inputs) so it
  # has its own `contents: read` permission for actions/checkout — the
  # validate-inputs job intentionally runs at `permissions: {}`.
  brand-placeholder-guard:
    needs: guard
    if: needs.guard.outputs.go == 'true' && inputs.environment == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false
      - name: Brand placeholder check
        env:
          CHECK_BRAND_STRICT: "false"
        run: node scripts/check-brand-placeholders.mjs

  # Detect whether app source changed since the last successful deploy to
  # this environment. Outputs drive the `build-images` skip decision and
  # the IMAGE_TAG handed to `cdk deploy`. SSM Parameter Store
  # `/monorepo/${env}/last-deploy/git-sha` is written at the end of the
  # `deploy` job — first-ever deploy or a wiped param falls through to a
  # full rebuild (safe default).
  #
  # Why not dorny/paths-filter? It's PR-event-centric. We need a
  # workflow_dispatch-compatible comparison against an arbitrary past
  # commit (the last deploy), which is a plain `git diff --name-only`.
  detect-changes:
    needs: [guard, validate-inputs]
    if: needs.guard.outputs.go == 'true' && inputs.stack != 'infra-only'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ENV_NAME: ${{ inputs.environment }}
    outputs:
      skip_image_build: ${{ steps.decide.outputs.skip_image_build }}
      image_tag: ${{ steps.decide.outputs.image_tag }}
      last_deploy_sha: ${{ steps.decide.outputs.last_deploy_sha }}
      # Per-service build decision. JSON array of services to build (e.g.
      # ["web","admin"]). Build-images matrix consumes via fromJSON().
      # New apps/<name>/Dockerfile is auto-discovered — no workflow edit.
      services_to_build: ${{ steps.decide.outputs.services_to_build }}
      # Per-service image tag. Built services → sha-<git>. Skipped services
      # → last-deploy tag for that service (or legacy fallback). Deploy
      # passes each as --context <svc>ImageTag=<tag>.
      image_tag_web: ${{ steps.decide.outputs.image_tag_web }}
      image_tag_api: ${{ steps.decide.outputs.image_tag_api }}
      image_tag_admin: ${{ steps.decide.outputs.image_tag_admin }}
      # True when packages/db/migrations/** changed since last deploy.
      # Defaults to true on first/unknown/failed-last-deploy (safe).
      migrations_changed: ${{ steps.decide.outputs.migrations_changed }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          # Need history back to the last-deploy SHA for `git diff`.
          fetch-depth: 0
          persist-credentials: false

      - name: Mask account-bearing inputs in logs
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
          ALERT_EMAIL: ${{ secrets.EMAIL_FORWARD_TO }}
        run: |
          echo "::add-mask::$ACCOUNT_ID"
          if [ -n "$STAGING_ROLE" ]; then echo "::add-mask::$STAGING_ROLE"; fi
          if [ -n "$PRODUCTION_ROLE" ]; then echo "::add-mask::$PRODUCTION_ROLE"; fi
          if [ -n "$ALERT_EMAIL" ]; then echo "::add-mask::$ALERT_EMAIL"; fi

      - name: Resolve role ARN
        id: env
        env:
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
        run: |
          case "$ENV_NAME" in
            staging)    echo "role=$STAGING_ROLE" >> "$GITHUB_OUTPUT" ;;
            production) echo "role=$PRODUCTION_ROLE" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unknown environment: $ENV_NAME"; exit 1 ;;
          esac

      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ steps.env.outputs.role }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-detect-${{ github.run_id }}
          audience: sts.amazonaws.com
          role-duration-seconds: 3600

      - uses: ./.github/actions/setup

      - id: decide
        env:
          IMAGE_TAG_OVERRIDE: ${{ inputs.image_tag_override }}
          FORCE_REBUILD: ${{ inputs.force_rebuild_images }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Discover all deployable services. Convention: a directory
          # apps/<name>/ with a Dockerfile means "this is a containerized
          # service the deploy workflow knows how to build". New service
          # added → auto-included (no workflow edit needed).
          all_services=()
          for d in apps/*/; do
            if [ -f "${d}Dockerfile" ]; then
              all_services+=("$(basename "$d")")
            fi
          done
          echo "Deployable services discovered: ${all_services[*]}"

          # Per-service last-deploy SSM tag lookup. New per-service key
          # `/monorepo/<env>/last-deploy/image-tag-<svc>`. Falls back to
          # the legacy single `image-tag` key for back-compat on the first
          # deploy after this lands.
          LAST_TAG=$(aws ssm get-parameter --name "/monorepo/${ENV_NAME}/last-deploy/image-tag" --region "$AWS_REGION" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          last_tag_for() {
            local svc="$1" v
            v=$(aws ssm get-parameter --name "/monorepo/${ENV_NAME}/last-deploy/image-tag-${svc}" --region "$AWS_REGION" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
            if [ -z "$v" ] || [ "$v" = "None" ]; then v="$LAST_TAG"; fi
            echo "$v"
          }

          # Emit a JSON array of service names.
          emit_services() {
            local arr_json
            if [ "$#" -eq 0 ]; then
              arr_json='[]'
            else
              arr_json=$(printf '%s\n' "$@" | jq -R . | jq -s -c .)
            fi
            printf 'services_to_build=%s\n' "$arr_json" >> "$GITHUB_OUTPUT"
            echo "services_to_build=$arr_json"
          }

          # Emit per-service image tag context for CDK.
          emit_per_service_tags() {
            local default_tag="$1"; shift
            local built_set=" $* "
            for svc in "${all_services[@]}"; do
              local tag
              if printf '%s' "$built_set" | grep -q " ${svc} "; then
                tag="$default_tag"
              else
                tag="$(last_tag_for "$svc")"
              fi
              # Empty fallback: use default_tag (covers first-ever deploy where
              # the skipped service has no historical tag).
              if [ -z "$tag" ] || [ "$tag" = "None" ]; then tag="$default_tag"; fi
              printf 'image_tag_%s=%s\n' "$svc" "$tag" >> "$GITHUB_OUTPUT"
              echo "image_tag_${svc}=${tag}"
            done
          }

          emit_legacy() {
            local skip="$1" tag="$2" base="$3"
            {
              printf 'skip_image_build=%s\n' "$skip"
              printf 'image_tag=%s\n' "$tag"
              printf 'last_deploy_sha=%s\n' "$base"
            } >> "$GITHUB_OUTPUT"
          }

          # Default: migrations run on first/unknown/failed-last-deploy.
          # Overridden below to 'false' only when LAST_SHA is reachable and
          # the diff has no packages/db/migrations/** entries.
          MIGRATIONS_CHANGED=true

          # Priority 1: explicit image_tag_override → skip build, use that tag
          # uniformly for every service (operator pinned a known-good tag).
          if [ -n "$IMAGE_TAG_OVERRIDE" ]; then
            echo "image_tag_override set — skipping build."
            emit_legacy true "$IMAGE_TAG_OVERRIDE" ""
            emit_services
            emit_per_service_tags "$IMAGE_TAG_OVERRIDE"
            printf 'migrations_changed=%s\n' "$MIGRATIONS_CHANGED" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Priority 2: operator force-rebuild → build all.
          if [ "$FORCE_REBUILD" = "true" ]; then
            echo "force_rebuild_images=true — building all services."
            emit_legacy false "sha-$GITHUB_SHA" ""
            emit_services "${all_services[@]}"
            emit_per_service_tags "sha-$GITHUB_SHA" "${all_services[@]}"
            printf 'migrations_changed=%s\n' "$MIGRATIONS_CHANGED" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Priority 3: compare HEAD against SSM last-deploy SHA.
          LAST_SHA=$(aws ssm get-parameter --name "/monorepo/${ENV_NAME}/last-deploy/git-sha" --region "$AWS_REGION" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          echo "Last deploy SHA: ${LAST_SHA:-<none>}"
          echo "Last image tag:  ${LAST_TAG:-<none>}"

          if [ -z "$LAST_SHA" ] || [ "$LAST_SHA" = "None" ] || [ -z "$LAST_TAG" ] || [ "$LAST_TAG" = "None" ]; then
            echo "First deploy (or wiped state) — full build, run migrations."
            emit_legacy false "sha-$GITHUB_SHA" ""
            emit_services "${all_services[@]}"
            emit_per_service_tags "sha-$GITHUB_SHA" "${all_services[@]}"
            printf 'migrations_changed=true\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git rev-parse --verify "$LAST_SHA" >/dev/null 2>&1; then
            echo "Last SHA $LAST_SHA not reachable in checkout — full build."
            emit_legacy false "sha-$GITHUB_SHA" ""
            emit_services "${all_services[@]}"
            emit_per_service_tags "sha-$GITHUB_SHA" "${all_services[@]}"
            printf 'migrations_changed=true\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          diff=$(git diff --name-only "$LAST_SHA" HEAD || true)
          if [ -z "$diff" ]; then
            echo "No file changes since $LAST_SHA — skip build entirely, no migrations, reuse $LAST_TAG."
            emit_legacy true "$LAST_TAG" "$LAST_SHA"
            emit_services
            emit_per_service_tags "$LAST_TAG"
            printf 'migrations_changed=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Migrations gate — independent of the per-service build matrix.
          if echo "$diff" | grep -qE '^packages/db/migrations/'; then
            MIGRATIONS_CHANGED=true
            echo "Migration files changed — migrations step will run."
          else
            MIGRATIONS_CHANGED=false
            echo "No migration file changes — migrations step will skip."
          fi
          printf 'migrations_changed=%s\n' "$MIGRATIONS_CHANGED" >> "$GITHUB_OUTPUT"

          # Turbo computes "affected" packages and their dependents given
          # the changeset since LAST_SHA. We then intersect with the
          # deployable-service set to get the build matrix. This is the
          # authoritative dep graph — adding a new packages/* or apps/*
          # consumer auto-picks up.
          affected_json=$(pnpm turbo run build --filter="...[${LAST_SHA}]" --dry=json 2>/dev/null || echo '{"packages":[]}')
          affected=$(printf '%s' "$affected_json" | jq -r '.packages[]?' 2>/dev/null || true)
          echo "Turbo-affected packages:"
          printf '%s\n' "$affected" | sed 's/^/  /'

          built=()
          for svc in "${all_services[@]}"; do
            if printf '%s\n' "$affected" | grep -qx "$svc"; then
              built+=("$svc")
            fi
          done

          # Fallback safety: pnpm-lock.yaml or .github/actions/setup change
          # affects every service (different node_modules graph). Turbo
          # picks these up via globalDependencies/inputs but be explicit.
          if echo "$diff" | grep -qE '^(pnpm-lock\.yaml$|\.github/actions/setup/)'; then
            echo "Lockfile or setup-action changed — building all services."
            built=("${all_services[@]}")
          fi

          if [ "${#built[@]}" -eq 0 ]; then
            echo "No deployable service affected. Skipping image build entirely; reusing per-service last-deploy tags."
            emit_legacy true "$LAST_TAG" "$LAST_SHA"
            emit_services
            emit_per_service_tags "$LAST_TAG"
            exit 0
          fi

          echo "Services to build: ${built[*]}"
          echo "Files (first 20):"
          echo "$diff" | head -20
          emit_legacy false "sha-$GITHUB_SHA" "$LAST_SHA"
          emit_services "${built[@]}"
          emit_per_service_tags "sha-$GITHUB_SHA" "${built[@]}"

  # Build the 3 app images in parallel (web, api, admin) on separate
  # runners. Sequential pre-2026-05-19 build time was web ~5m + api ~4m +
  # admin ~1.5m ≈ 10.5 min. Matrix wall-clock = max(web) + ~30s setup
  # overhead ≈ 5.5 min. Net saving ~5 min per deploy.
  #
  # `fail-fast: true` so a CRITICAL CVE on web cancels api + admin builds —
  # the deploy can't run anyway.
  #
  # Skipped when stack=infra-only OR image_tag_override is set OR
  # detect-changes determined no app source changed since the last deploy
  # (then deploy reuses the last-deployed image tag from SSM).
  # Runs in parallel with build-images. Pre-creates the ECS log groups
  # that CDK references, overlapping the work with the image build so
  # ~9s comes off the deploy critical path.
  #
  # Why not also the secret-ensure step? GitHub Actions masks the account
  # ID in logs via ::add-mask:: (good — keeps PII out of public logs),
  # but cross-job output propagation refuses to pass values containing
  # masked substrings — they arrive as empty strings at the consuming
  # job. Secrets Manager ARNs contain the account ID, so capturing them
  # here and reading via `needs.deploy-prep.outputs.*` would deliver
  # empty ARNs to `deploy` (verified in run 26194109206). Secret-ensure
  # therefore stays inside the deploy job where step→step output access
  # works fine within the same job. ~15s of parallel saving deferred to
  # a future workflow change (e.g. artifact-encoded ARN pass).
  deploy-prep:
    needs: [guard, validate-inputs]
    if: |
      needs.guard.outputs.go == 'true' &&
      needs.validate-inputs.result == 'success' &&
      inputs.stack != 'infra-only'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ENV_NAME: ${{ inputs.environment }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false

      - name: Mask account-bearing inputs in logs
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
        run: |
          echo "::add-mask::$ACCOUNT_ID"
          if [ -n "$STAGING_ROLE" ]; then echo "::add-mask::$STAGING_ROLE"; fi
          if [ -n "$PRODUCTION_ROLE" ]; then echo "::add-mask::$PRODUCTION_ROLE"; fi

      - name: Resolve role ARN
        id: env
        env:
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
        run: |
          case "$ENV_NAME" in
            staging)    echo "role=$STAGING_ROLE" >> "$GITHUB_OUTPUT" ;;
            production) echo "role=$PRODUCTION_ROLE" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unknown environment: $ENV_NAME"; exit 1 ;;
          esac

      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ steps.env.outputs.role }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-prep-${{ github.run_id }}
          audience: sts.amazonaws.com
          role-duration-seconds: 3600

      - name: Pre-create ECS log groups (only when CFN already owns them)
        # CFN's AWS::IAM::Policy GetAtt(LogGroup.Arn) hits CloudControl,
        # which has ~1s read-after-write lag. On a steady-state deploy
        # this manifests as 'Unable to retrieve Arn attribute for
        # AWS::Logs::LogGroup ... was not found' when CFN re-resolves the
        # ARN during the IAM::Policy update. Pre-creating the log group
        # OUTSIDE CFN (idempotent describe-then-create) gives the IAM
        # policy a stable ARN to GetAtt against.
        #
        # CRITICAL INVARIANT: only pre-create log groups CFN ALREADY OWNS.
        # If a log group is in the CDK template but NOT yet in the deployed
        # stack (new resource — e.g. PR K's db-migrate/openfga-migrate
        # added to an env where App-stack already existed), pre-creating
        # it externally makes CFN's own CREATE fail with
        # AlreadyExistsException at the next stack UPDATE. Symptom from
        # run 26227049301 staging deploy: `Resource of type
        # 'AWS::Logs::LogGroup' with identifier '/ecs/monorepo-staging/
        # db-migrate' already exists`. Accept the small CloudControl-race
        # window on the very first CFN CREATE of a new log group; CDK
        # retries it. Subsequent deploys see CFN owning the new log
        # group, this step pre-creates it (no-op since it exists), race
        # protection restored.
        #
        # First-deploy guard: skip entire step when App-<env> stack does
        # not exist yet. CDK's first CREATE has its own ordering graph;
        # nothing to pre-protect.
        run: |
          set -euo pipefail
          if ! aws cloudformation describe-stacks --stack-name "App-${ENV_NAME}" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "App-${ENV_NAME} stack does not exist yet — skipping log-group pre-create on first-deploy."
            exit 0
          fi
          # Snapshot the log groups CFN currently OWNS in App-<env>.
          # PhysicalResourceId for AWS::Logs::LogGroup is the log group
          # name. New log groups added in the CDK template but not yet in
          # the deployed stack are absent here — by design.
          # JSON + jq instead of --output text avoids tab/space tr parsing.
          owned=$(aws cloudformation describe-stack-resources \
            --stack-name "App-${ENV_NAME}" \
            --region "$AWS_REGION" \
            --query "StackResources[?ResourceType=='AWS::Logs::LogGroup'].PhysicalResourceId" \
            --output json 2>/dev/null | jq -r '.[]' || true)
          echo "App-${ENV_NAME} CFN-owned log groups:"
          if [ -n "$owned" ]; then
            while IFS= read -r name; do echo "  $name"; done <<<"$owned"
          else
            echo "  (none)"
          fi
          for svc in web admin api cloudflared pgbouncer cerbos openfga db-migrate openfga-migrate; do
            lg="/ecs/monorepo-${ENV_NAME}/${svc}"
            if ! printf '%s\n' "$owned" | grep -Fxq "$lg"; then
              echo "skip:   $lg — not yet in App-${ENV_NAME} stack. CFN will CREATE on the next stack UPDATE."
              continue
            fi
            if aws logs describe-log-groups --log-group-name-prefix "$lg" --region "$AWS_REGION" --query 'logGroups[?logGroupName==`'"$lg"'`]' --output text 2>&1 | grep -q "$lg"; then
              echo "exists: $lg"
            else
              # CFN owns it but it's missing on the AWS side (out-of-band
              # delete). Recreate so the IAM::Policy GetAtt resolves.
              aws logs create-log-group --log-group-name "$lg" --region "$AWS_REGION" 2>/dev/null && echo "created: $lg" || echo "::warning::create-log-group failed for $lg (may be racing)"
              aws logs put-retention-policy --log-group-name "$lg" --retention-in-days 7 --region "$AWS_REGION" >/dev/null 2>&1 || true
            fi
          done

  build-images:
    needs: [guard, validate-inputs, detect-changes]
    # `services_to_build` is a JSON array from detect-changes. Empty array
    # means no service needs a rebuild (e.g. docs-only PR landed on top of
    # the last good image set) — the whole matrix expansion is then empty
    # and this job no-ops. New apps/<x>/Dockerfile auto-flows through the
    # turbo-driven detection in detect-changes; no edit here required.
    if: |
      needs.guard.outputs.go == 'true' &&
      inputs.stack != 'infra-only' &&
      needs.detect-changes.outputs.skip_image_build != 'true' &&
      needs.detect-changes.outputs.services_to_build != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services_to_build) }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ENV_NAME: ${{ inputs.environment }}
      IMAGE_TAG: sha-${{ github.sha }}
      SERVICE: ${{ matrix.service }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false
          # Needed by the "Compute BUILD_VERSION" step below — `git describe
          # --exact-match` walks tag history. Default fetch-depth=1 is too
          # shallow to discover tags pointing at HEAD.
          fetch-depth: 0

      # Decouples the image's BUILD_VERSION env (display + observability:
      # footer, /api/version, OpenAPI info.version, Sentry release) from
      # IMAGE_TAG (ECR pin: stays sha-<full> for deterministic uniqueness
      # and the existing rollback / image_tag_override flow).
      #
      # Resolution order:
      #   1. inputs.build_version (explicit override; strip leading "v")
      #   2. git describe --exact-match (tag at HEAD; strip leading "v")
      #   3. fallback: <nearest-tag>-<short-sha> (e.g. 0.2.3-dfa7401)
      #
      # Plain semver gets the "v" prefix re-added at render time by
      # getBuildVersion() in packages/ui/src/brand-assets/version.ts.
      - id: ver
        name: Compute BUILD_VERSION
        env:
          BUILD_VERSION_INPUT: ${{ inputs.build_version }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "$BUILD_VERSION_INPUT" ]; then
            VALUE="${BUILD_VERSION_INPUT#v}"
            SOURCE="input"
          elif TAG=$(git describe --exact-match --tags HEAD 2>/dev/null); then
            VALUE="${TAG#v}"
            SOURCE="git-tag"
          elif NEAREST=$(git describe --tags --abbrev=0 HEAD 2>/dev/null); then
            VALUE="${NEAREST#v}-${SHA:0:7}"
            SOURCE="nearest-tag+sha"
          else
            VALUE="sha-${SHA:0:7}"
            SOURCE="short-sha"
          fi
          echo "BUILD_VERSION resolved via ${SOURCE}: ${VALUE}"
          echo "value=${VALUE}" >> "$GITHUB_OUTPUT"

      - name: Mask account-bearing inputs in logs
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
          ALERT_EMAIL: ${{ secrets.EMAIL_FORWARD_TO }}
        run: |
          echo "::add-mask::$ACCOUNT_ID"
          if [ -n "$STAGING_ROLE" ]; then echo "::add-mask::$STAGING_ROLE"; fi
          if [ -n "$PRODUCTION_ROLE" ]; then echo "::add-mask::$PRODUCTION_ROLE"; fi
          if [ -n "$ALERT_EMAIL" ]; then echo "::add-mask::$ALERT_EMAIL"; fi

      - name: Resolve role ARN
        id: env
        env:
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
        run: |
          case "$ENV_NAME" in
            staging)    echo "role=$STAGING_ROLE" >> "$GITHUB_OUTPUT" ;;
            production) echo "role=$PRODUCTION_ROLE" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unknown environment: $ENV_NAME"; exit 1 ;;
          esac

      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ steps.env.outputs.role }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-build-${{ matrix.service }}-${{ github.run_id }}
          audience: sts.amazonaws.com
          role-duration-seconds: 3600

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - id: ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5

      # First-deploy chicken-and-egg: Data stack creates the ECR repos, but
      # the docker push here runs BEFORE `cdk deploy`. Idempotent — does
      # nothing if the repo already exists. Matches the Data stack config so
      # the next `cdk deploy Data-*` stays clean (still need a one-time
      # `stack=infra-only` for brand-new services to seed CFN ownership).
      - name: Ensure ECR repository exists
        run: |
          set -euo pipefail
          repo="monorepo-${ENV_NAME}-${SERVICE}"
          if aws ecr describe-repositories --repository-names "$repo" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "OK   ECR repo exists: $repo"
          else
            echo "CREATE ECR repo: $repo"
            aws ecr create-repository \
              --repository-name "$repo" \
              --image-tag-mutability IMMUTABLE \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256 \
              --region "$AWS_REGION" >/dev/null
          fi

      - name: Build + push ${{ matrix.service }} image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/monorepo-${{ inputs.environment }}-${{ matrix.service }}:${{ env.IMAGE_TAG }}
          # SLSA L2 attestations (provenance + sbom) deliberately disabled.
          # With them ON, docker/build-push-action emits an OCI image-index
          # multi-manifest artifact (mediaType
          # application/vnd.oci.image.index.v1+json). ECR Basic Scanning
          # rejects that with UnsupportedImageTypeException — no scan ever
          # runs and the CVE gate downstream fails on NOT_FOUND.
          # Restore both flags when this account moves to ECR Enhanced
          # Scanning (Inspector), which supports OCI artifacts. Tracked as
          # the SLSA L2 follow-up (was AFF audit §4.1).
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.service }}-${{ inputs.environment }}
          cache-to: type=gha,scope=${{ matrix.service }}-${{ inputs.environment }},mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.repository.updated_at }}
            BUILD_VERSION=${{ steps.ver.outputs.value }}

      # CVE gate: wait for ECR's scanOnPush to finish, fail on CRITICAL.
      # ECR Basic scanning takes ~30-90s after push. The wait + describe
      # together usually adds ~10s of wall time per matrix item; if the
      # scan finds nothing CRITICAL the deploy continues.
      - name: Wait for ECR scan + fail on CRITICAL CVE
        run: |
          set -euo pipefail
          repo="monorepo-${ENV_NAME}-${SERVICE}"
          tag="${IMAGE_TAG}"
          echo "Waiting for scan results: $repo:$tag"

          # scanOnPush is async — there's a propagation delay between
          # `docker push` and ECR registering the scan. `aws ecr wait
          # image-scan-complete` errors with ScanNotFoundException if the
          # scan hasn't started yet. Either kick the scan ourselves
          # (idempotent: re-starting an existing scan returns
          # LimitExceededException for that day, which we suppress) or poll
          # describe-image-scan-findings until findingsStatus != IN_PROGRESS.
          aws ecr start-image-scan \
            --repository-name "$repo" \
            --image-id imageTag="$tag" \
            --region "$AWS_REGION" >/dev/null 2>&1 || true

          # Poll describe-image-scan-findings up to ~5 min. The findings
          # status transitions IN_PROGRESS -> COMPLETE | FAILED.
          status=""
          for i in $(seq 1 60); do
            status=$(aws ecr describe-image-scan-findings \
              --repository-name "$repo" \
              --image-id imageTag="$tag" \
              --region "$AWS_REGION" \
              --query 'imageScanStatus.status' \
              --output text 2>/dev/null || echo "NOT_FOUND")
            case "$status" in
              COMPLETE) break ;;
              FAILED)
                echo "::error::ECR scan FAILED for $repo:$tag"
                aws ecr describe-image-scan-findings \
                  --repository-name "$repo" \
                  --image-id imageTag="$tag" \
                  --region "$AWS_REGION" \
                  --query 'imageScanStatus' --output json || true
                exit 1
                ;;
              *) echo "  poll $i/60: status=$status"; sleep 5 ;;
            esac
          done
          if [ "$status" != "COMPLETE" ]; then
            echo "::error::ECR scan did not complete in 5 min for $repo:$tag (last status: $status)"
            exit 1
          fi

          # Allowlist of CVE IDs that are accepted (no upstream fix, no
          # exploit path in our containers, etc). One per line, # comments.
          allowlist_file=".github/security/cve-allowlist.txt"
          allowed_ids=""
          if [ -f "$allowlist_file" ]; then
            allowed_ids=$(grep -vE '^\s*#|^\s*$' "$allowlist_file" | sort -u | xargs || true)
          fi
          echo "CVE allowlist: ${allowed_ids:-<empty>}"

          # Fetch CRITICAL finding names (one per line) then filter.
          # describe-image-scan-findings returns up to 1000 findings; the
          # filter is narrow enough that pagination is unlikely.
          # ANSI-C quoting ($'...') keeps shellcheck SC2016 quiet on the
          # JMESPath backtick string literal (intentional, not shell
          # command substitution).
          query=$'imageScanFindings.findings[?severity==\x60CRITICAL\x60].name'
          all_criticals=$(aws ecr describe-image-scan-findings \
            --repository-name "$repo" \
            --image-id imageTag="$tag" \
            --region "$AWS_REGION" \
            --query "$query" \
            --output text | tr '\t' '\n' | sort -u)

          if [ -z "$all_criticals" ]; then
            echo "OK  No CRITICAL CVEs in $repo:$tag"
            exit 0
          fi

          unallowed=""
          for cve in $all_criticals; do
            allowed=0
            for a in $allowed_ids; do
              if [ "$cve" = "$a" ]; then allowed=1; break; fi
            done
            if [ "$allowed" = "0" ]; then unallowed="$unallowed $cve"; fi
          done

          if [ -n "$unallowed" ]; then
            count=$(echo "$unallowed" | wc -w | tr -d ' ')
            echo "::error::$repo:$tag has $count un-allowlisted CRITICAL CVE(s):$unallowed"
            echo "Run \`aws ecr describe-image-scan-findings --repository-name $repo --image-id imageTag=$tag --region $AWS_REGION\` to see the full list."
            exit 1
          fi

          allowed_count=$(echo "$all_criticals" | wc -l | tr -d ' ')
          echo "OK  All $allowed_count CRITICAL CVE(s) in $repo:$tag are allowlisted."
          echo "Allowlisted: $(echo "$all_criticals" | tr '\n' ' ')"

  deploy:
    needs:
      [
        guard,
        validate-inputs,
        brand-placeholder-guard,
        detect-changes,
        deploy-prep,
        build-images,
      ]
    # Run the deploy when guard is green AND (build-images succeeded OR was
    # skipped) AND deploy-prep succeeded (or was skipped on infra-only).
    # build-images is skipped for: infra-only, image_tag_override set, OR
    # detect-changes determined no app source changed. detect-changes is
    # skipped only on infra-only — its result must be success then.
    # brand-placeholder-guard is skipped on staging (production-only); on
    # production it must be success. `needs.X.result` values: success |
    # skipped | failure | cancelled.
    #
    # The `!cancelled()` prefix is REQUIRED — without it GitHub Actions
    # applies an implicit `success()` over `needs:`, and a SKIPPED ancestor
    # (build-images on image_tag_override / no-app-changes / infra-only)
    # auto-skips this job before the explicit conditions below ever run.
    # Verified on deploy run 26110934645 (image_tag_override path,
    # build-images=skipped) which silently SKIPPED deploy without these.
    if: |
      !cancelled() &&
      needs.guard.outputs.go == 'true' &&
      needs.validate-inputs.result == 'success' &&
      (needs.brand-placeholder-guard.result == 'success' || needs.brand-placeholder-guard.result == 'skipped') &&
      (needs.detect-changes.result == 'success' || needs.detect-changes.result == 'skipped') &&
      (needs.deploy-prep.result == 'success' || needs.deploy-prep.result == 'skipped') &&
      (needs.build-images.result == 'success' || needs.build-images.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Production deploys pause here for human approval. Configured on the
    # `production` GitHub Environment via deployment-protection-rules
    # (required-reviewers). Staging has no protection rule so deploys
    # flow through. See docs/runbooks/AWS-DEPLOY.md "Production deploy
    # approval".
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    outputs:
      deployed: ${{ steps.summary.outputs.deployed }}
      # 'true' iff the "Apply DB migrations" step actually ran THIS deploy.
      # Consumed by the smoke job's rollback guard: when migrations were
      # applied, rolling the ECS service back to the previous task def
      # would put OLD code in front of NEW schema — same shape as the PR F
      # bug. The rollback step refuses and pages the operator instead.
      # `steps.<id>.conclusion` is 'skipped' when the if: gate filtered the
      # step (no migrations changed), 'success' when it ran cleanly.
      migrations_applied: ${{ steps.migrate.conclusion == 'success' && 'true' || 'false' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ENV_NAME: ${{ inputs.environment }}
      STACK_SCOPE: ${{ inputs.stack }}
      # Tag resolution priority (decided by detect-changes):
      #   1. inputs.image_tag_override (operator pin)
      #   2. SSM last-deployed tag when no app source changed (changeset-aware
      #      skip — saves ~5 min image-build wall)
      #   3. sha-<github.sha> (default: build fresh)
      # detect-changes is skipped for infra-only — fall back to sha tag.
      IMAGE_TAG: ${{ needs.detect-changes.outputs.image_tag || format('sha-{0}', github.sha) }}
      # Per-service image tags. Built services → sha-<git>. Skipped
      # services → their last-deploy tag (or IMAGE_TAG fallback if no
      # history). Defaults to the global IMAGE_TAG when detect-changes
      # is skipped (stack=infra-only path), keeping back-compat.
      IMAGE_TAG_WEB: ${{ needs.detect-changes.outputs.image_tag_web || needs.detect-changes.outputs.image_tag || format('sha-{0}', github.sha) }}
      IMAGE_TAG_API: ${{ needs.detect-changes.outputs.image_tag_api || needs.detect-changes.outputs.image_tag || format('sha-{0}', github.sha) }}
      IMAGE_TAG_ADMIN: ${{ needs.detect-changes.outputs.image_tag_admin || needs.detect-changes.outputs.image_tag || format('sha-{0}', github.sha) }}
      # Truthy when image build path was skipped (infra-only, override, or
      # no-app-change). The secret-ensure steps still need to run if any
      # app container will be deployed; the only path that truly skips
      # them is stack=infra-only.
      SKIP_IMAGE_BUILD: ${{ inputs.stack == 'infra-only' && 'true' || 'false' }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false

      - name: Mask account-bearing inputs in logs
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
          ALERT_EMAIL: ${{ secrets.EMAIL_FORWARD_TO }}
        run: |
          echo "::add-mask::$ACCOUNT_ID"
          if [ -n "$STAGING_ROLE" ]; then echo "::add-mask::$STAGING_ROLE"; fi
          if [ -n "$PRODUCTION_ROLE" ]; then echo "::add-mask::$PRODUCTION_ROLE"; fi
          # Operator email is PII. Mask it so no subsequent `set -x` /
          # `aws ... --output text` / debug echo leaks it into the run log.
          # The CDK templates themselves no longer reference this address
          # (security-stack + observability-stack switched to SNS-only
          # subscribers); the workflow subscribes it to the alert topics
          # out-of-band via `aws sns subscribe` further down.
          if [ -n "$ALERT_EMAIL" ]; then echo "::add-mask::$ALERT_EMAIL"; fi

      - name: Resolve role ARN + domains for environment
        id: env
        env:
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
          STAGING_DOMAIN: ${{ vars.APP_DOMAIN_STAGING }}
          PRODUCTION_DOMAIN: ${{ vars.APP_DOMAIN_PRODUCTION }}
          STAGING_ADMIN_DOMAIN: ${{ vars.ADMIN_DOMAIN_STAGING }}
          PRODUCTION_ADMIN_DOMAIN: ${{ vars.ADMIN_DOMAIN_PRODUCTION }}
        run: |
          case "$ENV_NAME" in
            staging)
              echo "role=$STAGING_ROLE" >> "$GITHUB_OUTPUT"
              echo "domain=$STAGING_DOMAIN" >> "$GITHUB_OUTPUT"
              echo "admin_domain=$STAGING_ADMIN_DOMAIN" >> "$GITHUB_OUTPUT"
              ;;
            production)
              echo "role=$PRODUCTION_ROLE" >> "$GITHUB_OUTPUT"
              echo "domain=$PRODUCTION_DOMAIN" >> "$GITHUB_OUTPUT"
              echo "admin_domain=$PRODUCTION_ADMIN_DOMAIN" >> "$GITHUB_OUTPUT"
              ;;
            *) echo "Unknown environment: $ENV_NAME"; exit 1 ;;
          esac

      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ steps.env.outputs.role }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.run_id }}
          audience: sts.amazonaws.com
          # Long deploys: CDK + migrations + secret captures + budget
          # reconciliation. 3600s is the standard IAM-role default; raise
          # MaxSessionDuration on the role if your deploy regularly nears it.
          role-duration-seconds: 3600

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: "24"
          cache: pnpm

      # Scoped install: this job only needs @workspace/cdk + its deps to run
      # `cdk deploy`. Image builds happen inside Docker (no runner
      # node_modules). Full-workspace install added ~30-60s of dependency
      # resolution with zero benefit.
      - run: pnpm install --frozen-lockfile --filter @workspace/cdk...

      # QEMU + Buildx: needed before any Docker build. The web/api/admin
      # images are cross-built to arm64 here; `cdk deploy` ALSO builds the
      # Cerbos (App) and Backup arm64 DockerImageAssets inline, so QEMU +
      # Buildx must be present even when image_tag_override skips our own
      # build steps. Only skipped for `stack=infra-only` (Network + Data
      # have no Docker assets at all).
      - name: Docker QEMU (arm64 cross-build on amd64 runners)
        if: env.STACK_SCOPE != 'infra-only'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Docker Buildx (enables gha cache + multi-arch)
        if: env.STACK_SCOPE != 'infra-only'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # NOTE: ECR login + the 3 image builds + the CVE gate moved to the
      # parallel `build-images` matrix job above. This deploy job only runs
      # AFTER all three images are pushed + scan-clean. Keep QEMU + Buildx
      # here (above) because cdk deploy ALSO builds arm64 DockerImageAssets
      # inline for Cerbos (App stack) and the Backup Lambda.

      - name: Sync Cloudflare Tunnel token from GHA secret → SSM SecureString
        if: env.SKIP_IMAGE_BUILD != 'true'
        env:
          TUNNEL_TOKEN: ${{ secrets[format('CLOUDFLARE_TUNNEL_TOKEN_{0}', inputs.environment)] }}
        run: |
          set -euo pipefail

          # M4 (AFF-245): TUNNEL_TOKEN is the only workflow-managed secret
          # that does NOT live in Vault — it's a Cloudflare-issued connector
          # token that the deploy workflow owns end-to-end. AppStack reads
          # it via EcsSecret.fromSsmParameter at task start (parameter name
          # `/monorepo/${env}/cloudflare-tunnel-token`).
          #
          # better-auth-secret + resend-api-key are mirrored to SSM by the
          # VPS-side `vault-to-ssm-sync` timer every 5 min — NOT here.
          # `.github/workflows/secrets-drift.yml` fails the daily check on
          # divergence.
          if [ -z "$TUNNEL_TOKEN" ]; then
            echo "::error::CLOUDFLARE_TUNNEL_TOKEN_${ENV_NAME^^} repo/env secret is not set. Re-issue the tunnel in Cloudflare and store its token."
            exit 1
          fi
          echo "::add-mask::$TUNNEL_TOKEN"

          NAME="/monorepo/${ENV_NAME}/cloudflare-tunnel-token"
          # ssm:PutParameter is idempotent with --overwrite; the parameter
          # is created with Type=SecureString on first put and never recreated.
          aws ssm put-parameter \
            --name "$NAME" \
            --value "$TUNNEL_TOKEN" \
            --type SecureString \
            --description "Cloudflare Tunnel connector token (monorepo ${ENV_NAME}). Source: GHA secret CLOUDFLARE_TUNNEL_TOKEN_${ENV_NAME^^}. M4 — does not transit Vault." \
            --overwrite \
            --region "$AWS_REGION" >/dev/null
          echo "synced: $NAME"

      # Sanity check: when image_tag_override is set the operator is asking
      # CDK to reuse images that should already be in ECR. Fail fast if any
      # service image is missing — otherwise the App stack will deploy and
      # ECS will start crash-looping on `ImagePullFailure` ~5 min from now.
      #
      # Service list is discovered from apps/*/Dockerfile (mirrors the
      # turbo-driven detect-changes job) so adding apps/foo/Dockerfile
      # auto-flows through here. No hardcoded triple.
      - name: Verify override images exist in ECR
        if: inputs.image_tag_override != '' && env.STACK_SCOPE != 'infra-only'
        run: |
          set -euo pipefail
          all_services=()
          for d in apps/*/; do
            [ -f "${d}Dockerfile" ] && all_services+=("$(basename "$d")")
          done
          if [ "${#all_services[@]}" -eq 0 ]; then
            echo "::error::no apps/*/Dockerfile found — repo layout changed?"
            exit 1
          fi
          missing=0
          for svc in "${all_services[@]}"; do
            repo="monorepo-${ENV_NAME}-${svc}"
            if aws ecr describe-images \
                --repository-name "$repo" \
                --image-ids imageTag="$IMAGE_TAG" \
                --region "$AWS_REGION" >/dev/null 2>&1; then
              echo "OK   ${repo}:${IMAGE_TAG}"
            else
              echo "::error::MISSING ${repo}:${IMAGE_TAG} — image_tag_override points at a non-existent image"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::${missing} image(s) missing in ECR for tag ${IMAGE_TAG}. Re-run with image_tag_override='' to build fresh."
            exit 1
          fi

      # Pre-create ECS log groups lives in the `deploy-prep` job now —
      # runs parallel with build-images.

      # The 'Pre-deploy cleanup (staging only)' step that USED to live here
      # is gone entirely. It force-deleted the generated BetterAuth +
      # AppToken secrets on every deploy; CDK then re-created them with
      # NEW random suffixes; the TaskExecutionRole IAM policy lagged and
      # ECS task start failed with:
      #
      #   AccessDeniedException: ... is not authorized to perform:
      #   secretsmanager:GetSecretValue on resource:
      #   .../monorepo-staging-better-auth-secret-EQ76ea
      #
      # — see deploy run 26089910853 (2026-05-19 12:26Z). The same
      # cascading-secret pattern caused the ECS Deployment Circuit Breaker
      # to trip + the stack to wedge in UPDATE_ROLLBACK_FAILED. Resolved
      # by manual `aws cloudformation continue-update-rollback`.
      #
      # PendingDeletion recovery (the original justification) is now
      # handled inline by the 'Ensure ... secret exists' steps above,
      # which call `aws secretsmanager restore-secret` when DeletedDate
      # is non-null. RemovalPolicy.DESTROY on staging (set in PR #153)
      # handles tear-down on rollback. The combination supersedes the
      # belt-and-braces cleanup.

      # The "Migrate live AWS Budgets to SNS-only subscribers" step lived
      # here. It existed to work around AWS::Budgets immutability on
      # NotificationsWithSubscribers: any subscriber/threshold change forced
      # a REPLACE on the budget name, which collided with the live budget
      # of the same name. security-stack.ts now appends a deterministic
      # 8-char hash suffix to every budgetName, so meaningful spec changes
      # CREATE(new)+DELETE(old) cleanly and the workaround is unnecessary.
      # If you bring this back, also drop the suffix from security-stack.ts.

      # Apply pending `packages/db/migrations/*.sql` to RDS via a one-off
      # ECS Fargate task that reuses the Backup TaskDef (it already has
      # the network + `app_owner` secret wiring). Replaces the operator-
      # driven bastion `pnpm db:migrate` step in docs/runbooks/AWS-DEPLOY.md.
      #
      # Runs BEFORE `cdk deploy App-*` so:
      #   1. New schema (auth_token, audit_event.workspace_id nullable, etc.)
      #      is in place when ECS rolls out the new App task definition.
      #   2. Old App task (still on the previous task def) keeps serving
      #      until rollout — migrations include `DROP TABLE auth_invite`
      #      (0020), which the old code does not read; the inverse path
      #      (apply AFTER deploy) crashed the OLD task and tripped
      #      circuit breaker.
      #
      # Idempotent: every applied SQL file is journaled in `_app_migrations`
      # and skipped on re-run. The script also no-ops cleanly when
      # `packages/db/migrations/` is empty.
      - id: migrate
        name: Apply DB migrations via one-off ECS task
        # Gated on detect-changes — when no migration files changed since
        # the last successful deploy, skip the ECS one-off task entirely
        # (saves ~2 min wall on app-only PRs). Default-runs on first
        # deploy / unknown last-SHA / image_tag_override / force-rebuild.
        # The underlying script remains idempotent against `_app_migrations`
        # so manual reruns are still safe.
        #
        # `id: migrate` is consumed by the deploy job's
        # `migrations_applied` output and by smoke's rollback guard. When
        # this step is skipped (no migration files changed), conclusion is
        # 'skipped' and rollback proceeds as normal. When this step ran,
        # conclusion is 'success' and rollback refuses — see smoke job.
        if: |
          env.STACK_SCOPE != 'infra-only' &&
          needs.detect-changes.outputs.migrations_changed != 'false'
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: bash infra/scripts/apply-migrations-via-ecs.sh

      # Single cdk deploy, AFTER images + secrets exist. App and the stacks
      # that depend on it (Security, Observability, Backup) cannot deploy
      # before the web/api images are in ECR and the tunnel/Resend secrets
      # exist — so there is exactly one deploy, it runs last, and always
      # passes imageTag. infra-only = Network + Data only (the App-independent
      # foundation); Security/Observability/Backup depend on App.
      - name: Deploy CDK stacks
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          APP_DOMAIN: ${{ steps.env.outputs.domain }}
          # Admin public host — its own per-env value, NOT a subdomain of
          # APP_DOMAIN (production admin is admin.afframe.com, web is
          # app.afframe.com). bin/app.ts requires it.
          ADMIN_DOMAIN: ${{ steps.env.outputs.admin_domain }}
          # Comma-separated workspace ids allowed into admin.afframe.com.
          # Empty when the variable is unset — the admin gate then fails
          # closed (nobody authorized). Set vars.ADMIN_WORKSPACE_ALLOWLIST
          # to grant staff access; changing it is a redeploy.
          ADMIN_WORKSPACE_ALLOWLIST: ${{ vars.ADMIN_WORKSPACE_ALLOWLIST }}
          # Outbound email "From" address. Optional override; bin/app.ts
          # falls back to no-reply@afframe.com (the Resend-verified parent
          # domain). Set vars.MAIL_FROM_ADDRESS_{ENV} to override per-env
          # once you verify a per-env subdomain on Resend. See
          # docs/runbooks/AWS-DEPLOY.md "Email sender verification".
          MAIL_FROM_ADDRESS: ${{ vars.MAIL_FROM_ADDRESS }}
          # ALERT_EMAIL is intentionally NOT passed to CDK. The operator
          # email never enters CFN templates / `cdk diff` snapshots / CI
          # logs. The post-deploy step "Subscribe operator email to alert
          # SNS topics" handles it out-of-band with ::add-mask::.
          # M4: TUNNEL_TOKEN + BETTER_AUTH_SECRET + RESEND_API_KEY moved to
          # SSM SecureString. AppStack reads each one via
          # EcsSecret.fromSsmParameter with hardcoded names
          # (/monorepo/${env}/cloudflare-tunnel-token, etc.) — no context
          # plumbing needed any more.
        run: |
          case "$STACK_SCOPE" in
            all)        STACKS=("Network-${ENV_NAME}" "Data-${ENV_NAME}" "App-${ENV_NAME}" "Security-${ENV_NAME}" "Observability-${ENV_NAME}" "Backup-${ENV_NAME}") ;;
            infra-only) STACKS=("Network-${ENV_NAME}" "Data-${ENV_NAME}") ;;
            app-only)   STACKS=("App-${ENV_NAME}") ;;
            *) echo "::error::Unknown stack scope: $STACK_SCOPE"; exit 1 ;;
          esac
          # --exclusively: do not deploy stacks not named in STACKS[] just
          # because they are upstream dependencies that happen to be dirty.
          # --concurrency 3: Security, Observability, Backup are App-stack
          # siblings (no cross-deps after App is up) — deploy them in
          # parallel. Saves ~2 min on full `stack=all` deploys.

          # Staging: --hotswap-fallback bypasses CFN for supported resource
          # types (ECS Service, Lambda, S3 assets, CodeBuild, Step Functions).
          # On app-only deploys this drops App-stack from ~130s to ~30s by
          # updating ECS::Service directly via the AWS API instead of waiting
          # for the CFN UPDATE wait-for-stable cycle. Falls back to standard
          # CFN automatically when a non-hotswappable change is in scope
          # (any IAM / Network / TaskDefinition CPU/memory change).
          #
          # Production stays vanilla CFN — hotswap leaves CFN state stale
          # relative to live resources until the next non-hotswap deploy
          # reconciles, which is fine for staging but breaks drift detection
          # + audit guarantees we want on prod. Verified by `cdk diff` after
          # hotswap: change set present until next full deploy.
          HOTSWAP_FLAGS=()
          if [ "$ENV_NAME" = "staging" ]; then
            HOTSWAP_FLAGS+=(--hotswap-fallback)
          fi

          # Production: cdk diff guard against destructive REPLACE of stateful
          # resources. `--require-approval=never` (required for unattended CI)
          # bypasses CDK's destructive-change prompt, so a typo'd construct-id
          # rename on RDS/S3/KMS/Secret/IAM/DynamoDB/EFS/LogGroup would
          # silently REPLACE the resource (e.g. RDS rename = new DB, data
          # gone; S3 bucket rename = new bucket, files gone). Even RETAIN
          # removal policy only blocks `cdk destroy`, not REPLACE-on-Update.
          #
          # The PR-L class (account-global name CREATE collision) also shows
          # up here as `[+] AWS::CloudWatch::Dashboard` on a new logical id;
          # we don't gate on that one because dashboards have no state, but
          # the same diff machinery would catch it for the stateful set.
          #
          # Override: include `[allow-replace]` in the head commit message
          # for a legitimately-intended rename. Staging is unfiltered (free
          # to move).
          if [ "$ENV_NAME" = "production" ]; then
            echo "::group::cdk diff replace-guard (production)"
            DIFF_FILE=$(mktemp)
            # --method=change-set asks CloudFormation what would REPLACE on
            # update (more accurate than the local template diff which can
            # miss physical-replacement signals). Best-effort: pipe to tee +
            # `|| true` so we don't abort on diff exit codes (cdk diff exits
            # 1 when changes exist; we want the text, not the exit code).
            pnpm --filter @workspace/cdk exec cdk diff "${STACKS[@]}" \
              --exclusively \
              --method=change-set \
              --context "env=${ENV_NAME}" \
              --context "imageTag=${IMAGE_TAG}" \
              --context "webImageTag=${IMAGE_TAG_WEB}" \
              --context "apiImageTag=${IMAGE_TAG_API}" \
              --context "adminImageTag=${IMAGE_TAG_ADMIN}" 2>&1 | tee "$DIFF_FILE" || true
            STATEFUL_TYPES='AWS::(RDS::DB(Instance|Cluster|ClusterParameterGroup|ParameterGroup|SubnetGroup)|S3::Bucket|KMS::Key|SecretsManager::Secret|IAM::(Role|User)|DynamoDB::Table|EFS::FileSystem)'
            # `[~] <Type> <LogicalId> <PhysicalId> replace` = REPLACE-on-Update
            # `[+] <Type>` = CREATE of a new logical id (catches typo'd renames
            # of a stateful resource into a new construct id — the resource
            # is detached from CFN's perspective, original retained but
            # orphaned, new resource created alongside; for a stateful
            # resource that's silent data loss).
            #
            # Logs::LogGroup intentionally omitted: log groups are not
            # stateful here (1-week retention, removalPolicy=DESTROY). Init
            # containers like openfga-bootstrap legitimately add new log
            # groups on cdk deploy; treating those as destructive blocked
            # PR #243's prod deploy (run 26235464860) for zero safety gain.
            REPLACE_LINES=$(grep -E "^\[~\] ${STATEFUL_TYPES}.* replace$|^\[\+\] ${STATEFUL_TYPES}\b" "$DIFF_FILE" || true)
            echo "::endgroup::"
            if [ -n "$REPLACE_LINES" ]; then
              if git log -1 --pretty=%B | grep -qF '[allow-replace]'; then
                echo "::warning::Destructive REPLACE detected on stateful resource(s) — proceeding because head commit has [allow-replace] override."
                echo "$REPLACE_LINES"
              else
                echo "::error::Destructive REPLACE detected on stateful resource(s). Refusing to deploy. Add [allow-replace] to the head commit message to override (use ONLY for an intentional rename that you've audited)."
                echo "$REPLACE_LINES"
                exit 1
              fi
            fi
          fi

          pnpm --filter @workspace/cdk exec cdk deploy "${STACKS[@]}" \
            --exclusively \
            --concurrency 3 \
            --context "env=${ENV_NAME}" \
            --context "imageTag=${IMAGE_TAG}" \
            --context "webImageTag=${IMAGE_TAG_WEB}" \
            --context "apiImageTag=${IMAGE_TAG_API}" \
            --context "adminImageTag=${IMAGE_TAG_ADMIN}" \
            "${HOTSWAP_FLAGS[@]}" \
            --require-approval=never

      # Subscribe operator email to the 3 alert SNS topics. CDK does NOT
      # add the email subscriber from inside the template (would leak the
      # address as plaintext into the CFN template + `cdk diff` output
      # that any account-read role can fetch). Workflow does it here,
      # idempotently, with ::add-mask:: on the address.
      #
      # Topics + roles:
      #   - Security-${env} KillSwitchOpsTopicArn  — operator email lands
      #     here for budget breaches (80% + 100%) and kill-switch handler
      #     failures.
      #   - Security-${env} KillSwitchTopicArn     — Lambda kill-switch
      #     consumes; we ALSO subscribe the email so the operator gets a
      #     copy when the kill-switch fires (defense in depth).
      #   - Observability-${env} BillingTopicArn   — CloudWatch alarm
      #     fan-out for the 6 attack-vector + 2 Fargate-Critical alarms.
      #
      # Idempotent: skip if a CONFIRMED email subscription already exists
      # on the topic for this address. Pending subscriptions are not
      # re-subscribed (the recipient has the confirmation link in inbox).
      - name: Subscribe operator email to alert SNS topics
        if: env.STACK_SCOPE != 'infra-only'
        env:
          ALERT_EMAIL: ${{ secrets.EMAIL_FORWARD_TO }}
        run: |
          set -euo pipefail
          if [ -z "${ALERT_EMAIL:-}" ]; then
            echo "::error::EMAIL_FORWARD_TO repo secret is empty — no operator alert email to subscribe."
            exit 1
          fi
          echo "::add-mask::$ALERT_EMAIL"

          subscribe_idempotent() {
            local topic_arn="$1" label="$2"
            if [ -z "$topic_arn" ] || [ "$topic_arn" = "None" ]; then
              echo "::warning::$label topic ARN empty — skipping subscription."
              return 0
            fi
            # Look for an existing CONFIRMED subscription where Endpoint
            # equals the operator email. ListSubscriptionsByTopic caps at
            # 100 results per page, so we paginate via NextToken until empty
            # to avoid creating duplicate subscriptions once the page fills.
            #
            # Status filter rationale: AWS retains cancelled subscriptions
            # as `SubscriptionArn=="Deleted"` for up to 2 days, and
            # unconfirmed ones as `"PendingConfirmation"` for up to 3 days
            # (https://repost.aws/knowledge-center/sns-cannot-delete-topic-subscription).
            # Without filtering both out, a stale entry counts as "already
            # subscribed" and we'd silently skip re-subscribing — operator
            # never gets a confirmation email and prod alerts go dark.
            # PendingConfirmation is intentionally re-sent: re-issuing the
            # confirmation costs one extra email; permanent un-subscribe
            # would be invisible until something fails to page.
            local existing=0 next_token="" page match
            while :; do
              if [ -n "$next_token" ]; then
                page=$(aws sns list-subscriptions-by-topic --topic-arn "$topic_arn" --region "$AWS_REGION" --starting-token "$next_token" --output json)
              else
                page=$(aws sns list-subscriptions-by-topic --topic-arn "$topic_arn" --region "$AWS_REGION" --output json)
              fi
              match=$(echo "$page" | jq -r --arg e "$ALERT_EMAIL" '[.Subscriptions[]? | select(.Protocol=="email" and .Endpoint==$e and .SubscriptionArn != "Deleted" and .SubscriptionArn != "PendingConfirmation")] | length')
              existing=$((existing + match))
              next_token=$(echo "$page" | jq -r '.NextToken // ""')
              [ -z "$next_token" ] && break
            done
            if [ "$existing" -gt 0 ]; then
              echo "OK   $label: operator email already subscribed (count=$existing)."
              return 0
            fi
            echo "SUB  $label: subscribing operator email (one-time AWS confirmation email will arrive)."
            aws sns subscribe --topic-arn "$topic_arn" --protocol email --notification-endpoint "$ALERT_EMAIL" --region "$AWS_REGION" >/dev/null
          }

          # JMESPath query strings — ANSI-C wrap quiets shellcheck SC2016.
          ops_query=$'Stacks[0].Outputs[?OutputKey==\x60KillSwitchOpsTopicArn\x60].OutputValue'
          kill_query=$'Stacks[0].Outputs[?OutputKey==\x60KillSwitchTopicArn\x60].OutputValue'
          bill_query=$'Stacks[0].Outputs[?OutputKey==\x60BillingTopicArn\x60].OutputValue'
          OPS_ARN=$(aws cloudformation describe-stacks --stack-name "Security-${ENV_NAME}" --region "$AWS_REGION" --query "$ops_query" --output text 2>/dev/null || echo "")
          KILL_ARN=$(aws cloudformation describe-stacks --stack-name "Security-${ENV_NAME}" --region "$AWS_REGION" --query "$kill_query" --output text 2>/dev/null || echo "")
          BILL_ARN=$(aws cloudformation describe-stacks --stack-name "Observability-${ENV_NAME}" --region "$AWS_REGION" --query "$bill_query" --output text 2>/dev/null || echo "")

          subscribe_idempotent "$OPS_ARN"  "KillSwitchOpsTopic"
          subscribe_idempotent "$KILL_ARN" "KillSwitchTopic"
          subscribe_idempotent "$BILL_ARN" "BillingTopic"

      # Last-deploy SSM record was here; moved to the `smoke` job's success
      # path so a deploy that hotswapped a broken image (and smoke later
      # rolls back) doesn't poison the per-service `image-tag-<svc>` SSM
      # the next deploy reads as "last known good". See smoke job below.

      - id: summary
        run: echo "deployed=true" >> "$GITHUB_OUTPUT"

  # Post-deploy smoke test of the live URL + auto-rollback on failure.
  # Probes the web /api/version + admin /api/health endpoints through
  # Cloudflare Tunnel. If either fails to reach 200 within ~150s, we
  # roll the ECS service back to the previous task-definition revision
  # and exit the workflow non-zero. Covers Bucket 1 of past failures
  # (ECS Circuit Breaker on App-staging, 5/20 fails) by giving the
  # operator an automatic recovery path instead of a wedged service.
  smoke:
    needs: [guard, validate-inputs, detect-changes, deploy]
    if: |
      !cancelled() &&
      needs.guard.outputs.go == 'true' &&
      needs.validate-inputs.result == 'success' &&
      needs.deploy.result == 'success' &&
      inputs.stack != 'infra-only'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    env:
      ENV_NAME: ${{ inputs.environment }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
      PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
      STAGING_APP_DOMAIN: ${{ vars.APP_DOMAIN_STAGING }}
      PRODUCTION_APP_DOMAIN: ${{ vars.APP_DOMAIN_PRODUCTION }}
      STAGING_ADMIN_DOMAIN: ${{ vars.ADMIN_DOMAIN_STAGING }}
      PRODUCTION_ADMIN_DOMAIN: ${{ vars.ADMIN_DOMAIN_PRODUCTION }}
      # Inputs forwarded from detect-changes so the post-smoke SSM-record
      # step can pin per-service `last-known-good` tags only when smoke
      # has actually validated the deploy.
      GITHUB_SHA: ${{ github.sha }}
      IMAGE_TAG: ${{ needs.detect-changes.outputs.image_tag || format('sha-{0}', github.sha) }}
      IMAGE_TAG_WEB: ${{ needs.detect-changes.outputs.image_tag_web || needs.detect-changes.outputs.image_tag || format('sha-{0}', github.sha) }}
      IMAGE_TAG_API: ${{ needs.detect-changes.outputs.image_tag_api || needs.detect-changes.outputs.image_tag || format('sha-{0}', github.sha) }}
      IMAGE_TAG_ADMIN: ${{ needs.detect-changes.outputs.image_tag_admin || needs.detect-changes.outputs.image_tag || format('sha-{0}', github.sha) }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - id: env
        run: |
          set -euo pipefail
          case "$ENV_NAME" in
            staging)
              echo "role=$STAGING_ROLE" >> "$GITHUB_OUTPUT"
              echo "app=https://$STAGING_APP_DOMAIN" >> "$GITHUB_OUTPUT"
              echo "admin=https://$STAGING_ADMIN_DOMAIN" >> "$GITHUB_OUTPUT"
              ;;
            production)
              echo "role=$PRODUCTION_ROLE" >> "$GITHUB_OUTPUT"
              echo "app=https://$PRODUCTION_APP_DOMAIN" >> "$GITHUB_OUTPUT"
              echo "admin=https://$PRODUCTION_ADMIN_DOMAIN" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unknown environment: $ENV_NAME"
              exit 1
              ;;
          esac
      # Configure AWS up-front (was previously only on the failure path).
      # Both the success record + failure rollback need AWS now; doing it
      # once keeps the step graph simpler and avoids re-assuming the role
      # twice on the rollback path.
      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ steps.env.outputs.role }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-smoke-${{ github.run_id }}
          audience: sts.amazonaws.com
          role-duration-seconds: 1800
      - id: smoke
        name: Smoke probe (web + admin)
        env:
          APP_URL: ${{ steps.env.outputs.app }}
          ADMIN_URL: ${{ steps.env.outputs.admin }}
        run: |
          set -euo pipefail
          # 30 attempts x 5s = 150s ceiling. Aligns with healthCheckGracePeriod
          # (180s) so the probe gives ECS a chance to settle.
          #
          # Probes only routes that are guaranteed to exist in the current
          # build:
          #   - /api/version (apps/web/app/api/version/route.ts) → 200
          #   - /api/health  (apps/admin/app/api/health/route.ts) → 200
          #   - /api/auth/get-session (Better Auth canonical endpoint via
          #     apps/web/app/api/auth/[...all]/route.ts catch-all) →
          #     200 with body "null" for anonymous, session JSON for
          #     signed-in. Any 2xx proves the auth handler is wired.
          #
          # Adding a probe? Verify the route exists in the source first
          # (`find apps/*/app/api -name route.ts`). A probe of a non-existent
          # endpoint will 404 forever and trip rollback every deploy.
          for i in $(seq 1 30); do
            v=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 10 "$APP_URL/api/version" || true)
            h=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 10 "$ADMIN_URL/api/health" || true)
            s=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 10 "$APP_URL/api/auth/get-session" || true)
            if [ "$v" = "200" ] && [ "$h" = "200" ] && [[ "$s" =~ ^2 ]]; then
              echo "smoke: PASS  version=$v admin-health=$h auth-session=$s  (attempt $i)"
              exit 0
            fi
            echo "smoke: try=$i  version=$v admin-health=$h auth-session=$s"
            sleep 5
          done
          echo "::error::smoke failed after 30 attempts"
          exit 1
      # Record last-known-good state in SSM AFTER smoke verifies the deploy.
      # Before this PR the record was inside the deploy job, which fires
      # even when smoke later rolls back — poisoning the per-service
      # `image-tag-<svc>` SSM with a broken-image SHA that the next deploy
      # then "intelligently" reuses (verified run 26210496331 left staging
      # serving 503 because rollback target rev26 ALSO had the broken image).
      # Now the record runs only on green smoke and captures both the per-
      # service image tags AND the live task-definition ARN, so rollback
      # has a known-good revision to target instead of "previous ACTIVE".
      - name: Record last-known-good in SSM
        if: success()
        run: |
          set -euo pipefail
          CLUSTER="monorepo-${ENV_NAME}"
          SERVICE_ARN=$(aws ecs list-services --cluster "$CLUSTER" --region "$AWS_REGION" --query 'serviceArns[0]' --output text)
          SERVICE_NAME=${SERVICE_ARN##*/}
          GOOD_TD=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE_NAME" --region "$AWS_REGION" --query 'services[0].taskDefinition' --output text)
          aws ssm put-parameter --name "/monorepo/${ENV_NAME}/last-deploy/git-sha" --type String --value "$GITHUB_SHA" --overwrite --region "$AWS_REGION" >/dev/null || echo "::warning::Failed to write last-deploy/git-sha"
          aws ssm put-parameter --name "/monorepo/${ENV_NAME}/last-deploy/image-tag" --type String --value "$IMAGE_TAG" --overwrite --region "$AWS_REGION" >/dev/null || echo "::warning::Failed to write last-deploy/image-tag"
          aws ssm put-parameter --name "/monorepo/${ENV_NAME}/last-deploy/task-def-arn" --type String --value "$GOOD_TD" --overwrite --region "$AWS_REGION" >/dev/null || echo "::warning::Failed to write last-deploy/task-def-arn"
          for pair in "web=$IMAGE_TAG_WEB" "api=$IMAGE_TAG_API" "admin=$IMAGE_TAG_ADMIN"; do
            svc="${pair%%=*}"
            tag="${pair#*=}"
            aws ssm put-parameter --name "/monorepo/${ENV_NAME}/last-deploy/image-tag-${svc}" --type String --value "$tag" --overwrite --region "$AWS_REGION" >/dev/null || echo "::warning::Failed to write last-deploy/image-tag-${svc}"
          done
          echo "Recorded last-known-good: sha=$GITHUB_SHA task-def=$GOOD_TD web=$IMAGE_TAG_WEB api=$IMAGE_TAG_API admin=$IMAGE_TAG_ADMIN (env=$ENV_NAME)"
      - name: Roll back ECS service to last-known-good task-definition
        if: failure() && steps.smoke.conclusion == 'failure'
        env:
          MIGRATIONS_APPLIED: ${{ needs.deploy.outputs.migrations_applied }}
        run: |
          set -euo pipefail
          # HI-05 safety gate: when migrations ran THIS deploy, the new
          # task def expects new schema. Rolling ECS back to the previous
          # task def puts OLD code in front of NEW schema → reads/writes
          # against columns that don't exist yet (or do exist but mean
          # something different post-migration). Pattern is identical to
          # the PR F bug (SSM tag poisoning): automation does the right
          # thing in steady state but the wrong thing when state has
          # moved. Refuse to roll back, page the operator, point them at
          # the runbook (docs/runbooks/AWS-DEPLOY.md "Migration rollback
          # recovery"). Recovery is forward-fix in nearly all cases.
          if [ "${MIGRATIONS_APPLIED:-false}" = "true" ]; then
            echo "::error::smoke failed AND migrations were applied this deploy. Auto-rollback is unsafe — old task def would meet new schema. Aborting rollback. See docs/runbooks/AWS-DEPLOY.md#migration-rollback-recovery for the manual path (forward-fix or PITR + manual task-def revert)."
            exit 1
          fi
          CLUSTER="monorepo-${ENV_NAME}"
          SERVICE_ARN=$(aws ecs list-services --cluster "$CLUSTER" --region "$AWS_REGION" --query 'serviceArns[0]' --output text)
          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
            echo "::error::no service in cluster $CLUSTER — cannot roll back"
            exit 1
          fi
          SERVICE_NAME=${SERVICE_ARN##*/}
          CURRENT_TD=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE_NAME" --region "$AWS_REGION" --query 'services[0].taskDefinition' --output text)
          echo "Rolling back service=$SERVICE_NAME current=$CURRENT_TD"
          # Preferred: last-known-good task-def stored by a prior successful
          # smoke. This is immune to the "previous ACTIVE was ALSO broken"
          # case (run 26210496331 rolled back to rev26 which also failed
          # auth-session because a prior failed-smoke deploy left it
          # ACTIVE).
          TARGET_TD=$(aws ssm get-parameter --name "/monorepo/${ENV_NAME}/last-deploy/task-def-arn" --region "$AWS_REGION" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          if [ -z "$TARGET_TD" ] || [ "$TARGET_TD" = "None" ]; then
            echo "::warning::SSM last-deploy/task-def-arn empty — falling back to previous ACTIVE revision in the family. This is only safe on the first smoke run after PR F; expect SSM to be populated thereafter."
            FAMILY="${CURRENT_TD##*/}"
            FAMILY="${FAMILY%:*}"
            TARGET_TD=$(aws ecs list-task-definitions --family-prefix "$FAMILY" --status ACTIVE --sort DESC --max-items 2 --region "$AWS_REGION" --query 'taskDefinitionArns' --output json | jq -r '.[1] // empty')
            if [ -z "$TARGET_TD" ] || [ "$TARGET_TD" = "null" ]; then
              # First-deploy smoke fail: no SSM record yet, and only ONE
              # revision in the family. There is genuinely nowhere to roll
              # back to. Cap cost immediately by scaling the service to 0
              # (manual remediation required afterward — likely the deploy
              # never reached steady state, e.g. Cloudflare Tunnel ingress
              # not yet wired). Surface clearly so the operator knows the
              # next step.
              echo "::warning::first-deploy smoke failure — no rollback target exists. Scaling service to 0 to cap cost; manual remediation required."
              aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE_NAME" --desired-count 0 --region "$AWS_REGION" >/dev/null || echo "::warning::scale-to-0 failed; service may still be running"
              echo "::error::smoke failed on first deploy; service scaled to 0. Investigate ingress + container logs, then redeploy to retry."
              exit 1
            fi
          fi
          if [ "$TARGET_TD" = "$CURRENT_TD" ]; then
            echo "::error::smoke failed but rollback target ($TARGET_TD) equals current — no earlier revision to roll to. Live state is the last-known-good; investigate logs (smoke probably hit a transient or external issue)."
            exit 1
          fi
          echo "Target last-known-good: $TARGET_TD"
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE_NAME" \
            --task-definition "$TARGET_TD" \
            --force-new-deployment \
            --region "$AWS_REGION" >/dev/null
          echo "::error::smoke failed; rollback issued to $TARGET_TD; exiting non-zero"
          exit 1
