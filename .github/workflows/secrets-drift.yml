# Drift check between Vault (source of truth) and AWS SSM SecureString
# (runtime cache). Catches the case where the vault-to-ssm-sync timer dies
# silently and SSM diverges.
#
# Runs as a separate workflow (not in ci.yml) so a Vault-side outage
# doesn't red the PR CI gate. Fail-on-divergence; the workflow runs
# only against main.
#
# Auth (provisioned 2026-06-06, DEV-46; first scheduled run after this merge):
#   1. AWS: least-privilege SSM-read role (`AWS_SECRETS_DRIFT_ROLE_ARN`) whose
#      trust allows `repo:hlebtkachenko/monorepo:environment:secrets-drift`
#      (env-scoped per docs/specs/OIDC-TRUST.md § "Read-only CI roles"), hence
#      the job's `environment: secrets-drift`. Not the deploy role.
#   2. Vault: the `gha-drift` JWT role + read-only policy on the four
#      platform/data/{staging,production}/{better-auth-secret,resend-api-key}
#      keys, read via hashicorp/vault-action (same pattern as linear-sync.yml).
#
# Tracks: AFF-245 M4 advisor Gate 0 should-fix #7; DEV-46.

name: secrets-drift

on:
  workflow_dispatch: {}
  schedule:
    # Daily 08:00 UTC (10:00 CEST) — after the 5-min sync timer has had
    # multiple chances to catch up post any overnight blip.
    - cron: "0 8 * * *"

permissions: {}

concurrency:
  group: secrets-drift
  cancel-in-progress: true

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Environment-scoped OIDC. The AWS drift role trusts the
    # `repo:...:environment:secrets-drift` subject, not a branch ref
    # (docs/specs/OIDC-TRUST.md: environment-scoped, not branch-scoped). The
    # `secrets-drift` GitHub environment MUST carry no protection rules (no
    # required reviewers, no wait timer) or scheduled/dispatch runs would hang
    # awaiting approval.
    environment: secrets-drift
    permissions:
      id-token: write # OIDC → AWS (SSM read) + OIDC → Vault (JWT)
      contents: read
    env:
      AWS_REGION: eu-central-1
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          # Keep `audit`: this job makes outbound calls to AWS STS/SSM, to
          # secrets-admin.afframe.com (Vault via Cloudflare), and to the
          # Cloudflare Access edge. `block` would need every endpoint allowlisted.
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          # Least-privilege SSM-read role (ssm:GetParameter on /monorepo/* +
          # kms:Decrypt). Provisioned per docs/specs/OIDC-TRUST.md § "Read-only
          # CI roles". NOT the deploy role.
          role-to-assume: ${{ secrets.AWS_SECRETS_DRIFT_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch tracked secrets from Vault
        id: vault
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          # Vault on the Hostinger VPS behind Cloudflare Access. The
          # CF-Access-Client-{Id,Secret} service token gets past the edge gate;
          # the GitHub OIDC JWT (role gha-drift) proves "may read these keys".
          # See linear-sync.yml for the same pattern.
          url: https://secrets-admin.afframe.com
          method: jwt
          role: gha-drift
          jwtGithubAudience: https://secrets-admin.afframe.com
          # Explicit (the action defaults to true): export each fetched secret
          # as a masked env var so the compare step below can read it. Pinned
          # here so a future default change can't silently break the compare.
          exportEnv: true
          extraHeaders: |
            CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
            CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          # Each line: "<path> <field> | <ENV_NAME> ;". These ENV_NAMEs are the
          # masked env vars the compare step reads by name. vault-action masks
          # the values in logs.
          secrets: |
            platform/data/staging/better-auth-secret value | VAULT_STAGING_BETTER_AUTH_SECRET ;
            platform/data/staging/resend-api-key value | VAULT_STAGING_RESEND_API_KEY ;
            platform/data/production/better-auth-secret value | VAULT_PRODUCTION_BETTER_AUTH_SECRET ;
            platform/data/production/resend-api-key value | VAULT_PRODUCTION_RESEND_API_KEY ;

      - name: Compare Vault vs SSM (each tracked key)
        run: |
          set -euo pipefail
          DIVERGED=0

          # Compare one tracked key: its Vault value (the masked env var the
          # vault-action step exported) against SSM. Under `set -u` a key the
          # Vault step failed to export fails loud at the call site, not as a
          # silent mis-compare. Mirrors the post-deploy verify in
          # `_deploy-aws.yml` — keep this key set + the 15-min heartbeat
          # threshold below in sync with that sibling.
          check() {
            local name="$1" vault_val="$2" ssm_val
            ssm_val=$(aws ssm get-parameter \
              --name "/monorepo/${name}" --with-decryption \
              --query 'Parameter.Value' --output text 2>/dev/null || echo "__SSM_MISSING__")
            if [[ "$vault_val" == "$ssm_val" ]]; then
              echo "::notice::${name}: in sync"
            else
              echo "::error::${name}: DRIFT detected (Vault != SSM)"
              DIVERGED=1
            fi
          }

          check staging/better-auth-secret     "$VAULT_STAGING_BETTER_AUTH_SECRET"
          check staging/resend-api-key          "$VAULT_STAGING_RESEND_API_KEY"
          check production/better-auth-secret   "$VAULT_PRODUCTION_BETTER_AUTH_SECRET"
          check production/resend-api-key       "$VAULT_PRODUCTION_RESEND_API_KEY"

          # Heartbeat freshness: each env should have a recent sync-heartbeat.
          for env in staging production; do
            hb=$(aws ssm get-parameter \
              --name "/monorepo/${env}/sync-heartbeat" --with-decryption \
              --query 'Parameter.Value' --output text 2>/dev/null || echo "0")
            age=$(( $(date -u +%s) - hb ))
            if (( age > 900 )); then
              echo "::error::${env}/sync-heartbeat is ${age}s stale (> 15 min)"
              DIVERGED=1
            else
              echo "::notice::${env}/sync-heartbeat: ${age}s fresh"
            fi
          done

          if [[ "$DIVERGED" == "1" ]]; then
            echo "drift_detected=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
