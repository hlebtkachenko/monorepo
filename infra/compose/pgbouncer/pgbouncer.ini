[databases]
; app_dev maps to the local postgres container at port 5432.
; The database name on the right must match POSTGRES_DB in docker-compose.dev.yml.
app_dev = host=postgres port=5432 dbname=app_dev

[pgbouncer]
listen_addr     = 0.0.0.0
listen_port     = 6432

; Transaction mode: connections are returned to the pool at the end of every
; transaction (not session). This is the mode used by RDS Proxy in production.
; SET LOCAL / set_config(..., true) are transaction-scoped and safe under
; transaction mode. Session-level SET (bare SET without LOCAL) would leak across
; pool connections — the ESLint no-set-local-outside-wrapper rule blocks this.
pool_mode       = transaction

; Max client connections. Tune per developer machine memory.
max_client_conn = 100
; Pool size per database/user pair.
default_pool_size = 20

; Auth: scram-sha-256. Postgres 18 defaults password_encryption to
; scram-sha-256, so pg_authid holds SCRAM verifiers and the backend offers a
; SCRAM challenge. pgbouncer derives SCRAM for both the client leg and the
; backend leg from the plaintext credentials in userlist.txt.
auth_type       = scram-sha-256
auth_file       = /etc/pgbouncer/userlist.txt

; Log settings (verbose enough for dev debugging, quiet for CI).
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

; Keep alive so the pooler detects dead postgres connections.
server_idle_timeout = 600
client_idle_timeout = 0

; Stats exposed on port 6432 admin console (psql -p 6432 pgbouncer).
admin_users     = app_owner
stats_users     = app_owner
