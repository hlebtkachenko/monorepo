# Monthly backup-restore drill.
#
# On the 2nd of each month at 03:00 UTC:
#   1. Trigger a fresh backup via ECS RunTask (writes a dated dump to S3).
#   2. Run the restore drill ON THE GHA RUNNER (docker available there).
#      The same restore-drill.sh script that the BackupStack task could
#      not execute (distroless Fargate has no docker daemon) pulls the
#      latest dump from S3, boots a scratch postgres:18 container, runs
#      pg_restore --exit-on-error, and asserts row counts > 0 across the
#      seven org-scoped tables.
#
# The schedule overlaps the daily 03:00 UTC EventBridge schedule by
# design — the daily backup is the write side, this workflow is the
# read-back validation.
#
# Advisory until the first green run (continue-on-error true).

name: backup-restore-monthly

on:
  schedule:
    - cron: "0 3 2 * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to drill (staging | production)"
        required: true
        type: choice
        default: "staging"
        options:
          - staging
          - production

permissions: {}

concurrency:
  group: backup-restore-monthly-${{ inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  drill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true # ADVISORY — flip to required after first green run
    environment: ${{ inputs.environment || 'staging' }}
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ENV_NAME: ${{ inputs.environment || 'staging' }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve role ARN for environment
        id: env
        env:
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
        run: |
          set -euo pipefail
          case "$ENV_NAME" in
            staging)    echo "role=$STAGING_ROLE"    >> "$GITHUB_OUTPUT" ;;
            production) echo "role=$PRODUCTION_ROLE" >> "$GITHUB_OUTPUT" ;;
            *)          echo "Unknown environment: $ENV_NAME"; exit 1 ;;
          esac

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ steps.env.outputs.role }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: backup-restore-${{ github.run_id }}
          audience: sts.amazonaws.com

      - name: Resolve cluster + task definition + bucket via CFN exports
        id: ecs
        run: |
          set -euo pipefail
          STACK="Backup-${ENV_NAME}"
          cfn_export() {
            local name="$1"
            aws cloudformation list-exports \
              --region "$AWS_REGION" \
              --query "Exports[?Name=='${name}'].Value" \
              --output text
          }
          CLUSTER=$(cfn_export "Backup-${ENV_NAME}-ClusterName")
          TASK_DEF=$(cfn_export "Backup-${ENV_NAME}-TaskDefinitionArn")
          BUCKET=$(cfn_export "Backup-${ENV_NAME}-BucketName")
          if [ -z "$CLUSTER" ] || [ "$CLUSTER" = "None" ]; then
            echo "::error::Stack ${STACK} did not export Backup-${ENV_NAME}-ClusterName"
            exit 1
          fi
          if [ -z "$TASK_DEF" ] || [ "$TASK_DEF" = "None" ]; then
            echo "::error::Stack ${STACK} did not export Backup-${ENV_NAME}-TaskDefinitionArn"
            exit 1
          fi
          if [ -z "$BUCKET" ] || [ "$BUCKET" = "None" ]; then
            echo "::error::Stack ${STACK} did not export Backup-${ENV_NAME}-BucketName"
            exit 1
          fi
          SUBNETS=$(aws ec2 describe-subnets \
            --region "$AWS_REGION" \
            --filters "Name=tag:aws-cdk:subnet-name,Values=public" \
            --query 'Subnets[].SubnetId' \
            --output text)
          # SG: filter by the cluster's VPC + the CDK stack-name tag the
          # BackupStack inherits onto every nested resource. AppSg construct
          # mangles to AppSgABC123 in CFN logical id, so we can't filter on
          # logical id directly.
          # describe-subnets accepts space-separated subnet ids — split the
          # SUBNETS string deliberately. shellcheck SC2086 disabled inline.
          # shellcheck disable=SC2086
          VPC=$(aws ec2 describe-subnets \
            --region "$AWS_REGION" \
            --subnet-ids $SUBNETS \
            --query 'Subnets[0].VpcId' \
            --output text)
          # JMESPath uses backticks for literals; the surrounding single
          # quotes prevent bash from expanding them. shellcheck SC2016
          # disabled inline.
          # shellcheck disable=SC2016
          SG=$(aws ec2 describe-security-groups \
            --region "$AWS_REGION" \
            --filters "Name=vpc-id,Values=${VPC}" \
                      "Name=tag:aws:cloudformation:stack-name,Values=Network-${ENV_NAME}" \
            --query 'SecurityGroups[?contains(GroupName, `AppSg`)].GroupId | [0]' \
            --output text)
          if [ -z "$SG" ] || [ "$SG" = "None" ]; then
            echo "::error::Could not resolve AppSg security group in VPC ${VPC}"
            exit 1
          fi
          {
            echo "cluster=$CLUSTER"
            echo "task_def=$TASK_DEF"
            echo "bucket=$BUCKET"
            echo "subnets=${SUBNETS// /,}"
            echo "security_group=$SG"
          } >> "$GITHUB_OUTPUT"

      - name: RunTask backup (write side, ECS Fargate)
        id: backup
        env:
          CLUSTER: ${{ steps.ecs.outputs.cluster }}
          TASK_DEF: ${{ steps.ecs.outputs.task_def }}
          SUBNETS: ${{ steps.ecs.outputs.subnets }}
          SECURITY_GROUP: ${{ steps.ecs.outputs.security_group }}
        run: |
          set -euo pipefail
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${SUBNETS}],securityGroups=[${SECURITY_GROUP}],assignPublicIp=ENABLED}" \
            --region "$AWS_REGION" \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"
          echo "Waiting for backup task $TASK_ARN to finish..."
          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION"
          EXIT=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)
          if [ "$EXIT" != "0" ]; then
            echo "::error::Backup task exited $EXIT"
            exit 1
          fi

      - name: Restore drill (runner-side, docker is available here)
        env:
          APP_S3_BUCKET: ${{ steps.ecs.outputs.bucket }}
          APP_S3_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail
          DATE_UTC=$(date -u +%Y-%m-%d)
          export APP_S3_PREFIX="backups/${DATE_UTC}"
          # The script boots a scratch postgres:18 container, pg_restores
          # the latest dump, and exit 1's on any row-count mismatch across
          # the six org-scoped tables (audit_event impersonation organization
          # organization_membership resource_grant tool_call_log).
          bash infra/scripts/restore-drill.sh

      - name: Alarm on failure
        if: failure()
        run: |
          echo "::error::Monthly backup-restore drill failed. Investigate via CloudWatch Logs /ecs/monorepo-${ENV_NAME}/backup."
