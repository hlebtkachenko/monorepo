# `boundaries` is a REQUIRED status check on `.github/rulesets/main.json`.
# Same ci-status-shim pattern as knip.yml ŌĆö the required-check name is
# owned by a tiny always-runs aggregator; the real `boundaries-run` job
# is gated on a `changes` upstream so docs-only and infra-only PRs skip
# the ~30-60s turbo boundaries run.
#
# See Linear AFF-68 for the broader rollout.

name: Boundaries

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: boundaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            source:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.mts'
              - '**/*.cts'
              - '**/package.json'
              - 'tsconfig*.json'
              - '**/tsconfig*.json'
              - 'turbo.json'
              - '**/turbo.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/boundaries.yml'

  boundaries-run:
    needs: [changes]
    if: needs.changes.outputs.source == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Turbo boundaries
        run: pnpm turbo boundaries

  # Aggregation shim. `boundaries` is the REQUIRED status check name on the
  # main branch ruleset. This job owns that name so the check posts green on
  # every PR (including docs/infra-only PRs that skip `boundaries-run`).
  # Treats `skipped` as non-failure, matching the `ci` and `knip` shims.
  boundaries:
    needs: [changes, boundaries-run]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Aggregate boundaries result
        run: |
          if echo '${{ join(needs.*.result, ',') }}' | grep -qE 'failure|cancelled'; then
            echo "boundaries failed."; exit 1
          fi
          echo "boundaries passed (or skipped ŌĆö no source changes)."
