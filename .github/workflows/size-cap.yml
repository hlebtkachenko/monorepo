name: Size cap

# Raw LOC cap on review burden. Different signal from `Size limit` workflow:
# size-limit measures shipped JS bundle bytes; size-cap measures lines added
# (review effort). A 50-line PR can blow size-limit (added a 200KB lib);
# a 3000-line PR can be invisible to size-limit (docs + tests).

on:
  pull_request:
    # labeled/unlabeled so adding (or removing) `size-cap-override` re-evaluates
    # immediately. The label-skip below reads the event payload, which is frozen
    # at trigger time — without these, a label added after `opened` never
    # re-runs and the check stays red on a re-run (the payload still lacks it).
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions: {}

concurrency:
  group: size-cap-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  size-cap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: size-cap
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'size-cap-override') }}
        env:
          BASE: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          stat=$(git diff --shortstat "origin/${BASE}...HEAD" -- \
            ':!pnpm-lock.yaml' \
            ':!**/migrations/meta/**' \
            ':!**/*.svg' \
            ':!**/*.png' \
            ':!**/*.ico' \
            ':!**/*.woff' \
            ':!**/*.woff2')
          loc=$(echo "${stat}" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          loc=${loc:-0}
          echo "loc added: ${loc}"
          if [ "${loc}" -gt 2000 ]; then
            echo "::error::PR too large (${loc} lines added). Split into smaller PRs, or add label \`size-cap-override\` if justified."
            exit 1
          fi
          if [ "${loc}" -gt 800 ]; then
            echo "::warning::PR is large (${loc} lines added). Justify in description."
          fi
