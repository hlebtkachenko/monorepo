name: Size limit

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "pnpm-lock.yaml"

permissions: {}

concurrency:
  group: size-limit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  size:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Build web app
        run: pnpm --filter web build
      - name: Run size-limit
        run: pnpm --filter web size
