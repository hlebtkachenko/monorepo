# Spectral ruleset for the Afframe public API spec (apps/api/openapi/v1.json).
#
# Extends the standard OpenAPI ruleset with a few house rules. Run locally via
#   pnpm exec spectral lint apps/api/openapi/v1.json --ruleset apps/api/.spectral.yaml
# CI runs it from .github/workflows/openapi-lint.yml (advisory).
extends: ["spectral:oas"]

rules:
  # House rule: every operation needs a stable operationId — public-API client
  # codegen keys off it. nestjs-zod / @nestjs/swagger generate one per route.
  afframe-operation-operationId:
    description: Every operation must declare an operationId.
    severity: error
    given: $.paths[*][get,post,put,patch,delete,options,head]
    then:
      field: operationId
      function: truthy

  # House rule: every operation must be tagged so the docs group correctly.
  operation-tags: error

  # House rule: every operation must declare a description for the docs page.
  operation-description: warn

  # The spec describes a deployed public API: server + info must be present.
  oas3-api-servers: error
  info-description: warn

  # House rule (advisory): every operation needs a short summary — Scalar
  # uses it as the sidebar label; codegen'd MCP tools use it as the title.
  afframe-operation-summary:
    description: Every operation should declare a summary.
    severity: warn
    given: $.paths[*][get,post,put,patch,delete,options,head]
    then:
      field: summary
      function: truthy

  # House rule (advisory): every named component schema needs a description —
  # SDK docs and MCP tool inputSchemas inherit them.
  afframe-component-schema-description:
    description: Every component schema should carry a description.
    severity: warn
    given: $.components.schemas[*]
    then:
      field: description
      function: truthy

  # House rule (advisory): error responses must reference the shared ApiError
  # envelope component instead of inlining a one-off shape (ADR-0023).
  afframe-error-responses-use-envelope:
    description: 4xx/5xx responses should $ref the shared error response components.
    severity: warn
    # Inspect the unresolved document — the whole point is to see the $ref.
    resolved: false
    given: $.paths[*][get,post,put,patch,delete].responses[?(@property.match(/^[45]/))]
    then:
      field: $ref
      function: truthy
