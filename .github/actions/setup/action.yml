name: Setup pnpm + Node + install
description: Bootstrap monorepo deps with pnpm 11 and Node (default 24). Caller runs actions/checkout first.
inputs:
  node-version:
    description: Node major version
    required: false
    default: "24"
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        run_install: false
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash

    - name: Configure Turbo Remote Cache defaults
      # If the caller workflow sets TURBO_API + TURBO_TOKEN at workflow or
      # job env scope, add the team + timeout defaults so turbo CLI picks
      # up a fully-configured remote cache automatically.
      #
      # When TURBO_API or TURBO_TOKEN is unset (e.g. the variable / secret
      # is missing, or this is a fork PR that can't access secrets), this
      # step no-ops and turbo falls back to the local .turbo cache only.
      # That keeps fork PRs working without giving them write access to
      # the cache.
      #
      # `continue-on-error: true` means a Cloudflare outage at this point
      # cannot red the build — worst case is a colder cache.
      shell: bash
      continue-on-error: true
      run: |
        if [ -n "${TURBO_API:-}" ] && [ -n "${TURBO_TOKEN:-}" ]; then
          echo "TURBO_TEAM=team_afframe" >> "$GITHUB_ENV"
          echo "TURBO_REMOTE_CACHE_TIMEOUT=30" >> "$GITHUB_ENV"
          echo "::add-mask::$TURBO_TOKEN"
          echo "turbo remote cache: enabled (api=$TURBO_API)" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "turbo remote cache: disabled (TURBO_API or TURBO_TOKEN unset)" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Restore turbo cache (read-only)
      # Per-job key (`github.job`) — the previous run-wide shared key meant
      # only the first-finishing job saved, every other job restored a stale
      # entry from a different SHA, and ALL jobs paid a 29-50s Post-Run save
      # attempt (CICD-04). Content-addressed hash segment keeps cross-branch
      # sharing; prefix restore-keys warm the `.turbo` directory on a partial
      # match. Inputs that invalidate: dependency graph (lockfile +
      # package.json), turbo config (turbo.json, tsconfig.json), eslint
      # config (lint task inputs).
      #
      # Restore-only on every event EXCEPT push to main (PRs, schedules,
      # dispatches): the Cloudflare remote cache (ADR-0021) is the real
      # cross-run layer, so paying a save per PR job bought nothing. Main
      # pushes save below — per-job keys, so there is no cross-job save race
      # (matrix legs of one job still share a key; loser logs a harmless
      # "Unable to reserve cache" warning).
      if: github.event_name != 'push' || github.ref != 'refs/heads/main'
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: .turbo
        key: turbo-${{ runner.os }}-${{ github.job }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/package.json', '**/tsconfig.json', 'eslint.config.js') }}-${{ github.sha }}
        restore-keys: |
          turbo-${{ runner.os }}-${{ github.job }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/package.json', '**/tsconfig.json', 'eslint.config.js') }}-
          turbo-${{ runner.os }}-${{ github.job }}-

    - name: Restore + save turbo cache (main push)
      # Writer side of the layer above. Only push-to-main runs save (post-job
      # hook), and the per-job key means each job owns its own entry — PR jobs
      # that also run on main pushes then restore the latest main entry via
      # restore-keys. Jobs that never run on main (knip, boundaries,
      # size-limit, schedule-only checks) stay cold at this layer; the remote
      # Cloudflare cache covers them.
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: .turbo
        key: turbo-${{ runner.os }}-${{ github.job }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/package.json', '**/tsconfig.json', 'eslint.config.js') }}-${{ github.sha }}
        restore-keys: |
          turbo-${{ runner.os }}-${{ github.job }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/package.json', '**/tsconfig.json', 'eslint.config.js') }}-
          turbo-${{ runner.os }}-${{ github.job }}-
