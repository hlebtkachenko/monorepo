commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  commands:
    prettier:
      glob: "*.{ts,tsx,js,jsx,mjs,json,jsonc,md,yml,yaml,css}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: "*.{ts,tsx,js,jsx,mjs}"
      run: pnpm exec eslint --flag v10_config_lookup_from_file --fix {staged_files}
      stage_fixed: true
    no-drizzle-kit-generate:
      glob: "*.{json,jsonc,yml,yaml,sh,ts,mjs,cjs}"
      run: |
        # Exclude lines that also say "forbidden": those are this repo's own
        # guard messages / anti-drizzle-kit scripts (lefthook.yml, packages/db
        # package.json), not real command invocations.
        if grep -nE 'drizzle-kit[[:space:]]+(generate|push)' {staged_files} | grep -v forbidden; then
          echo "ADR-0009: 'drizzle-kit generate' / 'drizzle-kit push' are forbidden — migrations are handwritten SQL in packages/db/migrations/."
          exit 1
        fi
    gitleaks:
      # Local secret scan on staged files. Defence-in-depth: CI gitleaks
      # (ci.yml gitleaks job) is the authoritative gate; this hook catches
      # secrets before they reach the remote. No-ops if gitleaks is not
      # installed (brew install gitleaks) so the hook never blocks a commit
      # on a fresh checkout without local tooling.
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --staged --redact --no-banner
        else
          echo "[lefthook gitleaks] not installed — skipping. brew install gitleaks to enable local secret scan."
        fi

pre-push:
  # Budget: total pre-push must stay under ~10s on a typical push so the
  # dev loop doesn't slow. Heavier checks (typecheck, full test, build,
  # osv-scanner, zizmor, knip) stay CI-only — pre-push is just the cheap
  # gates that catch the failure modes that cost a GitHub roundtrip.
  commands:
    pr-title:
      # Lints HEAD commit subject against the same Conventional Commits
      # rules as .github/workflows/pr-title.yml (conv-title check).
      # squash-merge ships ONLY the PR title to main, and `gh pr create`
      # defaults the title to the latest commit subject — so a bad subject
      # here will become a bad PR title and fail conv-title in CI.
      # Catches it before the push and the CI roundtrip.
      # `glob: "*"` forces the command to run on every push (default
      # behaviour skips when push has no file changes).
      glob: "*"
      run: node scripts/check-pr-title.mjs "$(git log -1 --format='%s')"
    actionlint:
      # Mirrors `.github/workflows/workflow-lint.yml` actionlint job.
      # Only runs when workflow YAML or composite actions changed.
      # ~300ms — catches GitHub Actions syntax + expression errors before
      # CI burns ~30s of runner time on the same failure.
      # No-ops gracefully if actionlint is not installed (brew install actionlint).
      glob:
        - ".github/workflows/*.yml"
        - ".github/workflows/*.yaml"
        - ".github/actions/**"
      run: |
        if command -v actionlint >/dev/null 2>&1; then
          actionlint {push_files}
        else
          echo "[lefthook actionlint] not installed — skipping. brew install actionlint to enable."
        fi
    boundaries:
      # Mirrors `.github/workflows/boundaries.yml` — turbo boundaries
      # enforces the dependency-tag deny-list in turbo.json (e.g. "ui"
      # cannot depend on "data"). ~1s on a warm turbo cache. Runs only
      # when something that could change the dep graph is in the push.
      glob:
        - "turbo.json"
        - "**/package.json"
        - "packages/**"
        - "apps/**"
        - "pnpm-workspace.yaml"
        - "pnpm-lock.yaml"
      run: pnpm turbo boundaries
