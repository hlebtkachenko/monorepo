name: OSSF Scorecard

on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Do NOT publish to scorecard.dev. The repo is public only to use
          # GitHub Actions free-tier minutes; we do not want to be indexed by
          # discoverability tools. SARIF still uploads to the private
          # Security tab via the upload-sarif step below.
          publish_results: false

      - name: Filter out project-level informational checks
        shell: bash
        run: |
          set -euo pipefail
          # Remove checks that require org-level policy or external registration,
          # not fixable in code: Branch-Protection, CII-Best-Practices, Code-Review,
          # Fuzzing, Maintained, SAST, Vulnerabilities.
          SKIP="BranchProtectionID|CIIBestPracticesID|CodeReviewID|FuzzingID|MaintainedID|SASTID|VulnerabilitiesID"
          jq --arg skip "$SKIP" '
            .runs[].results |= map(select(.ruleId | test($skip) | not))
          ' results.sarif > results-filtered.sarif
          mv results-filtered.sarif results.sarif

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # zizmor: ignore[impostor-commit]
        with:
          sarif_file: results.sarif
