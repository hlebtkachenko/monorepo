name: DB migration idempotency

# Runs when migration SQL files change on a PR.
# Applies migrations twice and diffs the pg_dump output — any diff means
# the runner applied something on the second pass, which is a bug.
#
# ADVISORY — not a required check yet. Flip after first green PR cycle.

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/db/migrations/**"

permissions: {}

concurrency:
  group: db-idempotency-${{ github.ref }}
  cancel-in-progress: true

jobs:
  idempotency:
    name: Apply migrations twice, diff schema
    runs-on: ubuntu-latest
    continue-on-error: true  # ADVISORY
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
      - uses: ./.github/actions/setup

      - name: Wait for postgres
        run: |
          set -euo pipefail
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do
            echo "waiting for postgres..."
            sleep 2
          done

      - name: Install pg client 18 via PGDG apt repo
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          # Ubuntu 24.04 default repos don't carry postgresql-18.
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          codename=$(. /etc/os-release && echo "$VERSION_CODENAME")
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${codename}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-18

      - name: Bootstrap roles and default privileges
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          for f in infra/compose/postgres/init.d/*.sql; do
            echo "Applying $f"
            psql -h 127.0.0.1 -p 5432 -U postgres -f "$f"
          done

      - name: Apply migrations (first pass)
        env:
          DATABASE_DIRECT_URL: postgresql://app_owner:dev_owner@127.0.0.1:5432/postgres
          DATABASE_URL: postgresql://app_owner:dev_owner@127.0.0.1:5432/postgres
        run: pnpm --filter @workspace/db db:migrate

      - name: Dump schema after first pass
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: app_owner
          PGPASSWORD: dev_owner
          PGDATABASE: postgres
        run: |
          # Route through scripts/db-schema-snapshot.sh which already strips
          # pg_dump's random \restrict / \unrestrict tokens (PG18) — without
          # this filter two consecutive dumps differ by their session tokens
          # even when the schema is identical.
          set -euo pipefail
          export PATH="/usr/lib/postgresql/18/bin:$PATH"
          chmod +x scripts/db-schema-snapshot.sh
          scripts/db-schema-snapshot.sh > /tmp/first.sql

      - name: Apply migrations (second pass — should be no-op)
        env:
          DATABASE_DIRECT_URL: postgresql://app_owner:dev_owner@127.0.0.1:5432/postgres
          DATABASE_URL: postgresql://app_owner:dev_owner@127.0.0.1:5432/postgres
        run: pnpm --filter @workspace/db db:migrate

      - name: Dump schema after second pass
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: app_owner
          PGPASSWORD: dev_owner
          PGDATABASE: postgres
        run: |
          set -euo pipefail
          export PATH="/usr/lib/postgresql/18/bin:$PATH"
          scripts/db-schema-snapshot.sh > /tmp/second.sql

      - name: Diff schemas (any diff = non-idempotent migration)
        run: |
          set -euo pipefail
          if ! diff /tmp/first.sql /tmp/second.sql; then
            echo "::error::Schema changed on second migration pass — migrations are not idempotent."
            exit 1
          fi
          echo "Schema is identical after two passes. Migrations are idempotent."
