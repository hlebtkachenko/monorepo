# ECR migration: replace registry with `${{ vars.AWS_ACCOUNT_ID_PROD }}.dkr.ecr.eu-central-1.amazonaws.com`,
# swap docker/login-action for aws-actions/amazon-ecr-login. Trust policy must use environment scope,
# not branch scope (branch claims are spoofable from PR forks).
name: _build-image

on:
  workflow_call:
    inputs:
      image-name:
        description: "Short image name (lands at ghcr.io/<owner>/<image-name>)"
        required: true
        type: string
      dockerfile-path:
        description: "Dockerfile path"
        required: false
        type: string
        default: "apps/web/Dockerfile"
      context-path:
        description: "Build context"
        required: false
        type: string
        default: "."
      platforms:
        description: "Target platforms (comma-separated)"
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      push:
        description: "Whether to push to registry"
        required: false
        type: boolean
        default: true
    outputs:
      image-digest:
        description: "Resulting image digest (sha256:...)"
        value: ${{ jobs.build.outputs.digest }}
      image-ref:
        description: "Resulting image refs (multi-line)"
        value: ${{ jobs.build.outputs.tags }}

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      id-token: write
      contents: read
      packages: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.1
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ inputs.image-name }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=ref,event=branch,prefix=branch-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ inputs.context-path }}
          file: ${{ inputs.dockerfile-path }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.repository.updated_at }}
            BUILD_VERSION=${{ steps.meta.outputs.version }}

      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Cosign keyless sign
        if: ${{ inputs.push }}
        env:
          IMAGE: ghcr.io/${{ github.repository }}/${{ inputs.image-name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
