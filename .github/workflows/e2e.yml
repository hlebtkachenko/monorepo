name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: none
    env:
      PORT: "3010"
      AWS_ACCOUNT_ID: "000000000000"
      APP_DOMAIN: example.com
      BETTER_AUTH_URL: "http://localhost:3010"
      BETTER_AUTH_SECRET: "e2e-test-secret-not-real-0123456789ab"
    steps:
      - uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
      - uses: ./.github/actions/setup

      - name: Build web app
        run: pnpm turbo build --filter=web...

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: apps/web
        run: pnpm e2e

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/e2e/.results/
          retention-days: 14
