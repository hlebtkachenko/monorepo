name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  # Never cancel a signing/release run mid-flight — interrupted Sigstore flows
  # leave half-state on Rekor.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      tarball-name: ${{ steps.pack.outputs.tarball }}
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Install
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build
        shell: bash
        run: pnpm turbo build

      - id: pack
        name: Pack apps/web standalone bundle
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="web-${GITHUB_REF_NAME}.tar.gz"
          if [ -d apps/web/.next/standalone ]; then
            tar -czf "${TARBALL}" -C apps/web/.next/standalone .
          else
            # Fallback if standalone output is not configured yet.
            tar -czf "${TARBALL}" -C apps/web .next public package.json
          fi
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - id: hash
        name: Compute SLSA subject hashes (base64)
        shell: bash
        run: |
          set -euo pipefail
          HASHES=$(sha256sum "${{ steps.pack.outputs.tarball }}" | base64 -w0)
          echo "hashes=${HASHES}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-tarball
          path: ${{ steps.pack.outputs.tarball }}
          retention-days: 30

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
          gh release upload "${GITHUB_REF_NAME}" \
            "${{ steps.pack.outputs.tarball }}" \
            --clobber

  # SLSA L3 build provenance via the SLSA generator reusable workflow.
  # MUST be pinned to a semantic tag (the SLSA verifier rejects SHAs and float tags).
  slsa-provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true
      provenance-name: web-${{ github.ref_name }}.intoto.jsonl

  # SBOM + L2 provenance + cosign + license check via the shared orchestrator.
  supply-chain:
    needs: [build]
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write
      actions: read
    uses: ./.github/workflows/_supply-chain.yml
    with:
      artifact-path: ${{ needs.build.outputs.tarball-name }}
      package-name: web
      version: ${{ github.ref_name }}
      release-mode: true
