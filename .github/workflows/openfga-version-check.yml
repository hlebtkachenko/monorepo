name: OpenFGA + pgbouncer + cloudflared version check

# Checks the openfga/openfga, edoburu/pgbouncer, and cloudflare/cloudflared
# image versions pinned as TypeScript string literals in
# infra/cdk/lib/app-stack.ts against their upstream GitHub release tags.
# Dependabot Docker only scans Dockerfile FROM lines, so these registry pins
# are invisible to it — this workflow fills the gap per the CLAUDE.md
# Dependency Update Coverage Rule.
#
# The openfga/openfga version is also pinned in two other files that
# Dependabot doesn't cross-check against app-stack.ts:
#   infra/Dockerfile.openfga-bootstrap        (ARG OPENFGA_VERSION)
#   infra/openfga/docker-compose.openfga.yml  (local dev overlay)
# The openfga job fails if any of the three pins disagree, so a skew like
# the one fixed in #533 (bootstrap Dockerfile + compose lagging app-stack.ts)
# is caught automatically instead of drifting silently.
#
# Upstream sources:
#   openfga/openfga        — https://github.com/openfga/openfga/releases
#   edoburu/pgbouncer      — https://github.com/edoburu/docker-pgbouncer/releases
#   cloudflare/cloudflared — https://github.com/cloudflare/cloudflared/releases

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: openfga-version-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Ensure issue labels exist
        # DEP-01: `gh issue create --label X` fails when the label does not
        # exist in the repo (this broke 3 consecutive weekly runs). Create
        # idempotently — `|| true` swallows the "already exists" error.
        run: |
          gh label create openfga-update --color 0E8A16 --description "openfga/openfga image pin behind upstream" --repo "$GITHUB_REPOSITORY" || true
          gh label create pgbouncer-update --color 0E8A16 --description "edoburu/pgbouncer image pin behind upstream" --repo "$GITHUB_REPOSITORY" || true
          gh label create cloudflared-update --color 0E8A16 --description "cloudflare/cloudflared image pin behind upstream" --repo "$GITHUB_REPOSITORY" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check openfga/openfga version
        id: openfga
        run: |
          CURRENT=$(grep -oP 'openfga/openfga:v\K[0-9]+\.[0-9]+\.[0-9]+' infra/cdk/lib/app-stack.ts | head -1)
          LATEST=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/openfga/openfga/releases/latest \
            | jq -r '.tag_name | ltrimstr("v")')
          echo "current=$CURRENT"
          echo "latest=$LATEST"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check openfga pin consistency across files
        # Closes the coverage gap that let infra/Dockerfile.openfga-bootstrap
        # and infra/openfga/docker-compose.openfga.yml lag app-stack.ts at
        # v1.15.1 while app-stack.ts moved on (#533). Fails the job if the
        # three pins ever disagree again.
        run: |
          set -euo pipefail
          APP_STACK_VERSION="${{ steps.openfga.outputs.current }}"
          DOCKERFILE_VERSION=$(grep -oP 'ARG OPENFGA_VERSION=v\K[0-9]+\.[0-9]+\.[0-9]+' infra/Dockerfile.openfga-bootstrap)
          COMPOSE_VERSIONS=$(grep -oP 'openfga/openfga:v\K[0-9]+\.[0-9]+\.[0-9]+' infra/openfga/docker-compose.openfga.yml | sort -u)
          COMPOSE_COUNT=$(printf '%s\n' "$COMPOSE_VERSIONS" | wc -l | tr -d ' ')
          if [ "$COMPOSE_COUNT" -ne 1 ]; then
            echo "::error::infra/openfga/docker-compose.openfga.yml pins multiple openfga versions: $COMPOSE_VERSIONS"
            exit 1
          fi
          COMPOSE_VERSION="$COMPOSE_VERSIONS"
          echo "app-stack.ts: $APP_STACK_VERSION"
          echo "Dockerfile.openfga-bootstrap: $DOCKERFILE_VERSION"
          echo "docker-compose.openfga.yml: $COMPOSE_VERSION"
          if [ "$APP_STACK_VERSION" != "$DOCKERFILE_VERSION" ] || [ "$APP_STACK_VERSION" != "$COMPOSE_VERSION" ]; then
            echo "::error::openfga version pins disagree — app-stack.ts=$APP_STACK_VERSION Dockerfile.openfga-bootstrap=$DOCKERFILE_VERSION docker-compose.openfga.yml=$COMPOSE_VERSION"
            exit 1
          fi

      - name: Check edoburu/pgbouncer version
        id: pgbouncer
        run: |
          # edoburu/pgbouncer tags follow the pattern vX.Y.Z-pN where X.Y.Z is
          # the upstream pgbouncer version and -pN is the patch suffix. The
          # edoburu/docker-pgbouncer GitHub repo releases track these tags.
          CURRENT=$(grep -oP 'edoburu/pgbouncer:v\K[0-9]+\.[0-9]+\.[0-9]+-p[0-9]+' infra/cdk/lib/app-stack.ts | head -1)
          LATEST=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/edoburu/docker-pgbouncer/releases/latest \
            | jq -r '.tag_name | ltrimstr("v")')
          echo "current=$CURRENT"
          echo "latest=$LATEST"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing OpenFGA issue
        if: steps.openfga.outputs.has_updates == 'true'
        id: existing-openfga
        run: |
          COUNT=$(gh issue list --label openfga-update --state open --json number --jq length)
          echo "exists=$COUNT" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create OpenFGA issue
        if: steps.openfga.outputs.has_updates == 'true' && steps.existing-openfga.outputs.exists == '0'
        run: |
          gh issue create \
            --title "chore: openfga/openfga update available (v${{ steps.openfga.outputs.latest }})" \
            --label openfga-update \
            --body "$(cat <<'BODY'
          New **openfga/openfga** release detected.

          | | Version |
          |---|---|
          | Current pin | `v${{ steps.openfga.outputs.current }}` |
          | Latest release | `v${{ steps.openfga.outputs.latest }}` |

          **File to update:** `infra/cdk/lib/app-stack.ts`
          Search for `ContainerImage.fromRegistry("openfga/openfga:` and bump the tag.

          Verify the release notes at https://github.com/openfga/openfga/releases before updating.
          BODY
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for existing pgbouncer issue
        if: steps.pgbouncer.outputs.has_updates == 'true'
        id: existing-pgbouncer
        run: |
          COUNT=$(gh issue list --label pgbouncer-update --state open --json number --jq length)
          echo "exists=$COUNT" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create pgbouncer issue
        if: steps.pgbouncer.outputs.has_updates == 'true' && steps.existing-pgbouncer.outputs.exists == '0'
        run: |
          gh issue create \
            --title "chore: edoburu/pgbouncer update available (v${{ steps.pgbouncer.outputs.latest }})" \
            --label pgbouncer-update \
            --body "$(cat <<'BODY'
          New **edoburu/pgbouncer** release detected.

          | | Version |
          |---|---|
          | Current pin | `v${{ steps.pgbouncer.outputs.current }}` |
          | Latest release | `v${{ steps.pgbouncer.outputs.latest }}` |

          **File to update:** `infra/cdk/lib/app-stack.ts`
          Search for `ContainerImage.fromRegistry("edoburu/pgbouncer:` and bump the tag.

          Verify the release notes at https://github.com/edoburu/docker-pgbouncer/releases before updating.
          BODY
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check cloudflare/cloudflared version
        id: cloudflared
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # cloudflared releases are tagged YYYY.M.P (no v prefix). The CDK
          # pin is the public-ingress edge for all three prod hosts.
          CURRENT=$(grep -oP 'cloudflare/cloudflared:\K[0-9]+\.[0-9]+\.[0-9]+' infra/cdk/lib/app-stack.ts | head -1)
          LATEST=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/cloudflare/cloudflared/releases/latest \
            | jq -r '.tag_name | ltrimstr("v")')
          echo "current=$CURRENT"
          echo "latest=$LATEST"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing cloudflared issue
        if: steps.cloudflared.outputs.has_updates == 'true'
        id: existing-cloudflared
        run: |
          COUNT=$(gh issue list --label cloudflared-update --state open --json number --jq length)
          echo "exists=$COUNT" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create cloudflared issue
        if: steps.cloudflared.outputs.has_updates == 'true' && steps.existing-cloudflared.outputs.exists == '0'
        run: |
          gh issue create \
            --title "chore: cloudflare/cloudflared update available (${{ steps.cloudflared.outputs.latest }})" \
            --label cloudflared-update \
            --body "$(cat <<'BODY'
          New **cloudflare/cloudflared** release detected.

          | | Version |
          |---|---|
          | Current pin | `${{ steps.cloudflared.outputs.current }}` |
          | Latest release | `${{ steps.cloudflared.outputs.latest }}` |

          **Files to update:**
          1. `infra/cdk/lib/app-stack.ts` — search for `ContainerImage.fromRegistry("cloudflare/cloudflared:` and bump the tag (takes effect at next deploy).
          2. `infra/vault/compose.yaml` — the Vault VPS sidecar pins the same image **with a digest**; bump tag + digest together (digest from https://hub.docker.com/r/cloudflare/cloudflared/tags), then `docker compose pull && docker compose up -d cloudflared` on the VPS.

          Verify the release notes at https://github.com/cloudflare/cloudflared/releases before updating.
          BODY
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
