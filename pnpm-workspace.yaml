packages:
  - "apps/*"
  - "packages/*"
  - "infra/cdk"
  - "infra/cloudflare"
  - "infra/openfga"
overrides:
  # Force >=5.3.1: 4 CVEs in transitive 5.0.5 (path traversal, CRLF injection, 2x DoS)
  basic-ftp: ">=5.3.1"
  # Force >=0.25.0: GHSA dev-server SSRF. Transitive 0.18.20 via drizzle-kit -> @esbuild-kit/core-utils
  esbuild: ">=0.25.0"
  # Force >=8.5.10: XSS via unescaped </style> in CSS stringify. Transitive 8.4.31 via next@16
  postcss: ">=8.5.10"
  # Pin v9.x: eslint v10 breaks eslint-plugin-react@7.37.5 'react/display-name'
  eslint: "^9.39.2"
allowBuilds:
  "@nestjs/core": true
  # @parcel/watcher pulled in transitively by next-intl message loader.
  # Native postinstall is optional; pnpm falls back to FS polling.
  "@parcel/watcher": false
  "@scarf/scarf": false
  "@sentry/cli": true
  "@swc/core": true
  core-js-pure: false
  cpu-features: true
  esbuild: true
  # Git-hook install is driven by the root `prepare` script (`lefthook install`).
  # The package's own postinstall is redundant and fails inside git worktrees
  # where core.hooksPath is set.
  lefthook: false
  msgpackr-extract: true
  msw: false
  protobufjs: true
  sharp: true
  ssh2: true
  # Native postinstall is broken inside pnpm-managed isolated node_modules
  # (napi-postinstall can't resolve its own package.json). JS fallback is
  # transparent; only build-time resolution is marginally slower.
  unrs-resolver: false
  # vue-demi pulled in transitively by @scalar/api-reference-react (Scalar
  # mounts a Vue 3 tree under the hood). The postinstall is a Vue 2 / 3
  # compatibility switch; pnpm-isolated install doesn't need it.
  vue-demi: false
  # Cloudflare's official Worker runtime. Used by wrangler dev for local
  # iteration; CI deploys don't depend on the native binary so the build
  # script could be 'false' here, but local dev breaks without it.
  workerd: true
