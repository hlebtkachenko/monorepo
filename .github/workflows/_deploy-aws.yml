name: _deploy-aws

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub environment (staging | production)"
        required: true
        type: string
      stack:
        description: "Stack scope: all | infra-only | app-only"
        required: false
        type: string
        default: "all"
      image_tag_override:
        description: "Existing image tag to deploy (e.g. sha-abcdef). When set, skips image build + push and the secret-ensure steps; the CDK step uses this tag. The three images (web, api, admin) must already exist in ECR for the target env."
        required: false
        type: string
        default: ""
      force_rebuild_images:
        description: "Force the build-images matrix to run even when no app source changed since the last successful deploy. Default false — the detect-changes job skips image builds when apps/** + relevant packages did not change, and reuses the last-deployed image tag from SSM."
        required: false
        type: boolean
        default: false
    outputs:
      deployed:
        description: "Whether the deploy step actually ran"
        value: ${{ jobs.deploy.outputs.deployed }}
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - staging
          - production
      stack:
        description: "Stack scope"
        required: false
        type: choice
        default: "all"
        options:
          - all
          - infra-only
          - app-only
      image_tag_override:
        description: "Existing image tag to deploy (e.g. sha-abcdef). Empty = build+push images for the current commit (or reuse last-deployed images if app source did not change since last deploy). Set this to a specific tag to pin a CDK-only retry."
        required: false
        type: string
        default: ""
      force_rebuild_images:
        description: "Force build-images matrix even when no app source changed since last deploy."
        required: false
        type: boolean
        default: false

permissions: {}

concurrency:
  # Per-env, scope-independent. `stack=app-only` and `stack=infra-only`
  # touch overlapping CFN/ECS state; sequencing them per env prevents
  # races on shared resources (log groups, secrets, services).
  group: deploy-aws-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      go: ${{ steps.flag.outputs.go }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - id: flag
        env:
          BOOTSTRAPPED: ${{ vars.AWS_BOOTSTRAPPED }}
        run: |
          if [ "${BOOTSTRAPPED}" = "true" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "AWS deploy gated: vars.AWS_BOOTSTRAPPED is not 'true'. Set it to 'true' to enable deploys."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

  # Pre-deploy fast-fail on missing repo vars / secrets. CDK throws on the
  # same conditions ~8 min into the deploy job; surfacing them here turns
  # an opaque half-deploy failure into a 30-second guard step.
  validate-inputs:
    needs: guard
    if: needs.guard.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    environment: ${{ inputs.environment }}
    env:
      ENV_NAME: ${{ inputs.environment }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      APP_DOMAIN_STAGING: ${{ vars.APP_DOMAIN_STAGING }}
      APP_DOMAIN_PRODUCTION: ${{ vars.APP_DOMAIN_PRODUCTION }}
      ADMIN_DOMAIN_STAGING: ${{ vars.ADMIN_DOMAIN_STAGING }}
      ADMIN_DOMAIN_PRODUCTION: ${{ vars.ADMIN_DOMAIN_PRODUCTION }}
      STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
      PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
      STAGING_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN_STAGING }}
      PRODUCTION_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN_PRODUCTION }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_FORWARD_TO: ${{ secrets.EMAIL_FORWARD_TO }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Assert required vars + secrets are present
        run: |
          set -euo pipefail
          fail=0
          check() {
            local label="$1" value="$2"
            if [ -z "${value:-}" ] || [[ "$value" =~ ^[[:space:]]*$ ]]; then
              echo "::error::Required input '${label}' is empty for env=${ENV_NAME}"
              fail=1
            fi
          }
          check AWS_REGION "$AWS_REGION"
          check AWS_ACCOUNT_ID "$AWS_ACCOUNT_ID"
          check RESEND_API_KEY "$RESEND_API_KEY"
          check EMAIL_FORWARD_TO "$EMAIL_FORWARD_TO"
          case "$ENV_NAME" in
            staging)
              check APP_DOMAIN_STAGING "$APP_DOMAIN_STAGING"
              check ADMIN_DOMAIN_STAGING "$ADMIN_DOMAIN_STAGING"
              check AWS_DEPLOY_ROLE_ARN_STAGING "$STAGING_ROLE"
              check CLOUDFLARE_TUNNEL_TOKEN_STAGING "$STAGING_TUNNEL_TOKEN"
              ;;
            production)
              check APP_DOMAIN_PRODUCTION "$APP_DOMAIN_PRODUCTION"
              check ADMIN_DOMAIN_PRODUCTION "$ADMIN_DOMAIN_PRODUCTION"
              check AWS_DEPLOY_ROLE_ARN_PRODUCTION "$PRODUCTION_ROLE"
              check CLOUDFLARE_TUNNEL_TOKEN_PRODUCTION "$PRODUCTION_TUNNEL_TOKEN"
              ;;
            *)
              echo "::error::Unknown environment: $ENV_NAME"
              exit 1
              ;;
          esac
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more required deploy inputs are empty. Set them in repo settings (Variables / Secrets) for the '${ENV_NAME}' environment before re-running."
            exit "$fail"
          fi
          echo "All required deploy inputs present for env=${ENV_NAME}."

  # Detect whether app source changed since the last successful deploy to
  # this environment. Outputs drive the `build-images` skip decision and
  # the IMAGE_TAG handed to `cdk deploy`. SSM Parameter Store
  # `/monorepo/${env}/last-deploy/git-sha` is written at the end of the
  # `deploy` job — first-ever deploy or a wiped param falls through to a
  # full rebuild (safe default).
  #
  # Why not dorny/paths-filter? It's PR-event-centric. We need a
  # workflow_dispatch-compatible comparison against an arbitrary past
  # commit (the last deploy), which is a plain `git diff --name-only`.
  detect-changes:
    needs: [guard, validate-inputs]
    if: needs.guard.outputs.go == 'true' && inputs.stack != 'infra-only'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ENV_NAME: ${{ inputs.environment }}
    outputs:
      skip_image_build: ${{ steps.decide.outputs.skip_image_build }}
      image_tag: ${{ steps.decide.outputs.image_tag }}
      last_deploy_sha: ${{ steps.decide.outputs.last_deploy_sha }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          # Need history back to the last-deploy SHA for `git diff`.
          fetch-depth: 0
          persist-credentials: false

      - name: Mask account-bearing inputs in logs
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
          ALERT_EMAIL: ${{ secrets.EMAIL_FORWARD_TO }}
        run: |
          echo "::add-mask::$ACCOUNT_ID"
          if [ -n "$STAGING_ROLE" ]; then echo "::add-mask::$STAGING_ROLE"; fi
          if [ -n "$PRODUCTION_ROLE" ]; then echo "::add-mask::$PRODUCTION_ROLE"; fi
          if [ -n "$ALERT_EMAIL" ]; then echo "::add-mask::$ALERT_EMAIL"; fi

      - name: Resolve role ARN
        id: env
        env:
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
        run: |
          case "$ENV_NAME" in
            staging)    echo "role=$STAGING_ROLE" >> "$GITHUB_OUTPUT" ;;
            production) echo "role=$PRODUCTION_ROLE" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unknown environment: $ENV_NAME"; exit 1 ;;
          esac

      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ steps.env.outputs.role }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-detect-${{ github.run_id }}
          audience: sts.amazonaws.com
          role-duration-seconds: 3600

      - id: decide
        env:
          IMAGE_TAG_OVERRIDE: ${{ inputs.image_tag_override }}
          FORCE_REBUILD: ${{ inputs.force_rebuild_images }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          emit() {
            local skip="$1" tag="$2" base="$3"
            {
              printf 'skip_image_build=%s\n' "$skip"
              printf 'image_tag=%s\n' "$tag"
              printf 'last_deploy_sha=%s\n' "$base"
            } >> "$GITHUB_OUTPUT"
          }

          # Priority 1: explicit image_tag_override → skip build, use that tag.
          if [ -n "$IMAGE_TAG_OVERRIDE" ]; then
            echo "image_tag_override set — skipping build."
            emit true "$IMAGE_TAG_OVERRIDE" ""
            exit 0
          fi

          # Priority 2: operator force-rebuild → build.
          if [ "$FORCE_REBUILD" = "true" ]; then
            echo "force_rebuild_images=true — building."
            emit false "sha-$GITHUB_SHA" ""
            exit 0
          fi

          # Priority 3: compare HEAD against SSM last-deploy SHA.
          LAST_SHA=$(aws ssm get-parameter --name "/monorepo/${ENV_NAME}/last-deploy/git-sha" --region "$AWS_REGION" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          LAST_TAG=$(aws ssm get-parameter --name "/monorepo/${ENV_NAME}/last-deploy/image-tag" --region "$AWS_REGION" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          echo "Last deploy SHA: ${LAST_SHA:-<none>}"
          echo "Last image tag:  ${LAST_TAG:-<none>}"

          if [ -z "$LAST_SHA" ] || [ "$LAST_SHA" = "None" ] || [ -z "$LAST_TAG" ] || [ "$LAST_TAG" = "None" ]; then
            echo "First deploy (or wiped state) — full build."
            emit false "sha-$GITHUB_SHA" ""
            exit 0
          fi

          if ! git rev-parse --verify "$LAST_SHA" >/dev/null 2>&1; then
            echo "Last SHA $LAST_SHA not reachable in checkout — full build."
            emit false "sha-$GITHUB_SHA" ""
            exit 0
          fi

          # Paths that affect image content. Anything else (CDK source,
          # docs, infra/cerbos handled separately by Cerbos asset hash)
          # cannot change what's baked into web/api/admin images.
          APP_PATHS_REGEX='^(apps/(web|api|admin)/|packages/(auth|db|shared|email|ui|testcontainers|i18n|observability)/|pnpm-lock\.yaml$|\.github/actions/setup/)'

          diff=$(git diff --name-only "$LAST_SHA" HEAD || true)
          if [ -z "$diff" ]; then
            echo "No file changes since $LAST_SHA — skipping build, reusing $LAST_TAG."
            emit true "$LAST_TAG" "$LAST_SHA"
            exit 0
          fi

          if echo "$diff" | grep -qE "$APP_PATHS_REGEX"; then
            echo "App source changed since $LAST_SHA — building."
            echo "Files (first 20):"
            echo "$diff" | grep -E "$APP_PATHS_REGEX" | head -20
            emit false "sha-$GITHUB_SHA" "$LAST_SHA"
          else
            echo "No app source changes since $LAST_SHA — skipping build, reusing $LAST_TAG."
            echo "Changed files (CDK/docs/other, first 20):"
            echo "$diff" | head -20
            emit true "$LAST_TAG" "$LAST_SHA"
          fi

  # Build the 3 app images in parallel (web, api, admin) on separate
  # runners. Sequential pre-2026-05-19 build time was web ~5m + api ~4m +
  # admin ~1.5m ≈ 10.5 min. Matrix wall-clock = max(web) + ~30s setup
  # overhead ≈ 5.5 min. Net saving ~5 min per deploy.
  #
  # `fail-fast: true` so a CRITICAL CVE on web cancels api + admin builds —
  # the deploy can't run anyway.
  #
  # Skipped when stack=infra-only OR image_tag_override is set OR
  # detect-changes determined no app source changed since the last deploy
  # (then deploy reuses the last-deployed image tag from SSM).
  build-images:
    needs: [guard, validate-inputs, detect-changes]
    if: needs.guard.outputs.go == 'true' && inputs.stack != 'infra-only' && needs.detect-changes.outputs.skip_image_build != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      matrix:
        service: [web, api, admin]
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ENV_NAME: ${{ inputs.environment }}
      IMAGE_TAG: sha-${{ github.sha }}
      SERVICE: ${{ matrix.service }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false

      - name: Mask account-bearing inputs in logs
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
          ALERT_EMAIL: ${{ secrets.EMAIL_FORWARD_TO }}
        run: |
          echo "::add-mask::$ACCOUNT_ID"
          if [ -n "$STAGING_ROLE" ]; then echo "::add-mask::$STAGING_ROLE"; fi
          if [ -n "$PRODUCTION_ROLE" ]; then echo "::add-mask::$PRODUCTION_ROLE"; fi
          if [ -n "$ALERT_EMAIL" ]; then echo "::add-mask::$ALERT_EMAIL"; fi

      - name: Resolve role ARN
        id: env
        env:
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
        run: |
          case "$ENV_NAME" in
            staging)    echo "role=$STAGING_ROLE" >> "$GITHUB_OUTPUT" ;;
            production) echo "role=$PRODUCTION_ROLE" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unknown environment: $ENV_NAME"; exit 1 ;;
          esac

      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ steps.env.outputs.role }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-build-${{ matrix.service }}-${{ github.run_id }}
          audience: sts.amazonaws.com
          role-duration-seconds: 3600

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - id: ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5

      # First-deploy chicken-and-egg: Data stack creates the ECR repos, but
      # the docker push here runs BEFORE `cdk deploy`. Idempotent — does
      # nothing if the repo already exists. Matches the Data stack config so
      # the next `cdk deploy Data-*` stays clean (still need a one-time
      # `stack=infra-only` for brand-new services to seed CFN ownership).
      - name: Ensure ECR repository exists
        run: |
          set -euo pipefail
          repo="monorepo-${ENV_NAME}-${SERVICE}"
          if aws ecr describe-repositories --repository-names "$repo" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "OK   ECR repo exists: $repo"
          else
            echo "CREATE ECR repo: $repo"
            aws ecr create-repository \
              --repository-name "$repo" \
              --image-tag-mutability IMMUTABLE \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256 \
              --region "$AWS_REGION" >/dev/null
          fi

      - name: Build + push ${{ matrix.service }} image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/monorepo-${{ inputs.environment }}-${{ matrix.service }}:${{ env.IMAGE_TAG }}
          # SLSA L2 attestations (provenance + sbom) deliberately disabled.
          # With them ON, docker/build-push-action emits an OCI image-index
          # multi-manifest artifact (mediaType
          # application/vnd.oci.image.index.v1+json). ECR Basic Scanning
          # rejects that with UnsupportedImageTypeException — no scan ever
          # runs and the CVE gate downstream fails on NOT_FOUND.
          # Restore both flags when this account moves to ECR Enhanced
          # Scanning (Inspector), which supports OCI artifacts. Tracked as
          # the SLSA L2 follow-up (was AFF audit §4.1).
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.service }}-${{ inputs.environment }}
          cache-to: type=gha,scope=${{ matrix.service }}-${{ inputs.environment }},mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.repository.updated_at }}
            BUILD_VERSION=${{ env.IMAGE_TAG }}

      # CVE gate: wait for ECR's scanOnPush to finish, fail on CRITICAL.
      # ECR Basic scanning takes ~30-90s after push. The wait + describe
      # together usually adds ~10s of wall time per matrix item; if the
      # scan finds nothing CRITICAL the deploy continues.
      - name: Wait for ECR scan + fail on CRITICAL CVE
        run: |
          set -euo pipefail
          repo="monorepo-${ENV_NAME}-${SERVICE}"
          tag="${IMAGE_TAG}"
          echo "Waiting for scan results: $repo:$tag"

          # scanOnPush is async — there's a propagation delay between
          # `docker push` and ECR registering the scan. `aws ecr wait
          # image-scan-complete` errors with ScanNotFoundException if the
          # scan hasn't started yet. Either kick the scan ourselves
          # (idempotent: re-starting an existing scan returns
          # LimitExceededException for that day, which we suppress) or poll
          # describe-image-scan-findings until findingsStatus != IN_PROGRESS.
          aws ecr start-image-scan \
            --repository-name "$repo" \
            --image-id imageTag="$tag" \
            --region "$AWS_REGION" >/dev/null 2>&1 || true

          # Poll describe-image-scan-findings up to ~5 min. The findings
          # status transitions IN_PROGRESS -> COMPLETE | FAILED.
          status=""
          for i in $(seq 1 60); do
            status=$(aws ecr describe-image-scan-findings \
              --repository-name "$repo" \
              --image-id imageTag="$tag" \
              --region "$AWS_REGION" \
              --query 'imageScanStatus.status' \
              --output text 2>/dev/null || echo "NOT_FOUND")
            case "$status" in
              COMPLETE) break ;;
              FAILED)
                echo "::error::ECR scan FAILED for $repo:$tag"
                aws ecr describe-image-scan-findings \
                  --repository-name "$repo" \
                  --image-id imageTag="$tag" \
                  --region "$AWS_REGION" \
                  --query 'imageScanStatus' --output json || true
                exit 1
                ;;
              *) echo "  poll $i/60: status=$status"; sleep 5 ;;
            esac
          done
          if [ "$status" != "COMPLETE" ]; then
            echo "::error::ECR scan did not complete in 5 min for $repo:$tag (last status: $status)"
            exit 1
          fi

          # Allowlist of CVE IDs that are accepted (no upstream fix, no
          # exploit path in our containers, etc). One per line, # comments.
          allowlist_file=".github/security/cve-allowlist.txt"
          allowed_ids=""
          if [ -f "$allowlist_file" ]; then
            allowed_ids=$(grep -vE '^\s*#|^\s*$' "$allowlist_file" | sort -u | xargs || true)
          fi
          echo "CVE allowlist: ${allowed_ids:-<empty>}"

          # Fetch CRITICAL finding names (one per line) then filter.
          # describe-image-scan-findings returns up to 1000 findings; the
          # filter is narrow enough that pagination is unlikely.
          # ANSI-C quoting ($'...') keeps shellcheck SC2016 quiet on the
          # JMESPath backtick string literal (intentional, not shell
          # command substitution).
          query=$'imageScanFindings.findings[?severity==\x60CRITICAL\x60].name'
          all_criticals=$(aws ecr describe-image-scan-findings \
            --repository-name "$repo" \
            --image-id imageTag="$tag" \
            --region "$AWS_REGION" \
            --query "$query" \
            --output text | tr '\t' '\n' | sort -u)

          if [ -z "$all_criticals" ]; then
            echo "OK  No CRITICAL CVEs in $repo:$tag"
            exit 0
          fi

          unallowed=""
          for cve in $all_criticals; do
            allowed=0
            for a in $allowed_ids; do
              if [ "$cve" = "$a" ]; then allowed=1; break; fi
            done
            if [ "$allowed" = "0" ]; then unallowed="$unallowed $cve"; fi
          done

          if [ -n "$unallowed" ]; then
            count=$(echo "$unallowed" | wc -w | tr -d ' ')
            echo "::error::$repo:$tag has $count un-allowlisted CRITICAL CVE(s):$unallowed"
            echo "Run \`aws ecr describe-image-scan-findings --repository-name $repo --image-id imageTag=$tag --region $AWS_REGION\` to see the full list."
            exit 1
          fi

          allowed_count=$(echo "$all_criticals" | wc -l | tr -d ' ')
          echo "OK  All $allowed_count CRITICAL CVE(s) in $repo:$tag are allowlisted."
          echo "Allowlisted: $(echo "$all_criticals" | tr '\n' ' ')"

  deploy:
    needs: [guard, validate-inputs, detect-changes, build-images]
    # Run the deploy when guard is green AND (build-images succeeded OR was
    # skipped). build-images is skipped for: infra-only, image_tag_override
    # set, OR detect-changes determined no app source changed. detect-changes
    # itself is skipped only on infra-only — its result must be success then.
    # `needs.X.result` values: success | skipped | failure | cancelled.
    #
    # The `!cancelled()` prefix is REQUIRED — without it GitHub Actions
    # applies an implicit `success()` over `needs:`, and a SKIPPED ancestor
    # (build-images on image_tag_override / no-app-changes / infra-only)
    # auto-skips this job before the explicit conditions below ever run.
    # Verified on deploy run 26110934645 (image_tag_override path,
    # build-images=skipped) which silently SKIPPED deploy without these.
    if: |
      !cancelled() &&
      needs.guard.outputs.go == 'true' &&
      needs.validate-inputs.result == 'success' &&
      (needs.detect-changes.result == 'success' || needs.detect-changes.result == 'skipped') &&
      (needs.build-images.result == 'success' || needs.build-images.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    outputs:
      deployed: ${{ steps.summary.outputs.deployed }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ENV_NAME: ${{ inputs.environment }}
      STACK_SCOPE: ${{ inputs.stack }}
      # Tag resolution priority (decided by detect-changes):
      #   1. inputs.image_tag_override (operator pin)
      #   2. SSM last-deployed tag when no app source changed (changeset-aware
      #      skip — saves ~5 min image-build wall)
      #   3. sha-<github.sha> (default: build fresh)
      # detect-changes is skipped for infra-only — fall back to sha tag.
      IMAGE_TAG: ${{ needs.detect-changes.outputs.image_tag || format('sha-{0}', github.sha) }}
      # Truthy when image build path was skipped (infra-only, override, or
      # no-app-change). The secret-ensure steps still need to run if any
      # app container will be deployed; the only path that truly skips
      # them is stack=infra-only.
      SKIP_IMAGE_BUILD: ${{ inputs.stack == 'infra-only' && 'true' || 'false' }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false

      - name: Mask account-bearing inputs in logs
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
          ALERT_EMAIL: ${{ secrets.EMAIL_FORWARD_TO }}
        run: |
          echo "::add-mask::$ACCOUNT_ID"
          if [ -n "$STAGING_ROLE" ]; then echo "::add-mask::$STAGING_ROLE"; fi
          if [ -n "$PRODUCTION_ROLE" ]; then echo "::add-mask::$PRODUCTION_ROLE"; fi
          # Operator email is PII. Mask it so no subsequent `set -x` /
          # `aws ... --output text` / debug echo leaks it into the run log.
          # The CDK templates themselves no longer reference this address
          # (security-stack + observability-stack switched to SNS-only
          # subscribers); the workflow subscribes it to the alert topics
          # out-of-band via `aws sns subscribe` further down.
          if [ -n "$ALERT_EMAIL" ]; then echo "::add-mask::$ALERT_EMAIL"; fi

      - name: Resolve role ARN + domains for environment
        id: env
        env:
          STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
          STAGING_DOMAIN: ${{ vars.APP_DOMAIN_STAGING }}
          PRODUCTION_DOMAIN: ${{ vars.APP_DOMAIN_PRODUCTION }}
          STAGING_ADMIN_DOMAIN: ${{ vars.ADMIN_DOMAIN_STAGING }}
          PRODUCTION_ADMIN_DOMAIN: ${{ vars.ADMIN_DOMAIN_PRODUCTION }}
        run: |
          case "$ENV_NAME" in
            staging)
              echo "role=$STAGING_ROLE" >> "$GITHUB_OUTPUT"
              echo "domain=$STAGING_DOMAIN" >> "$GITHUB_OUTPUT"
              echo "admin_domain=$STAGING_ADMIN_DOMAIN" >> "$GITHUB_OUTPUT"
              ;;
            production)
              echo "role=$PRODUCTION_ROLE" >> "$GITHUB_OUTPUT"
              echo "domain=$PRODUCTION_DOMAIN" >> "$GITHUB_OUTPUT"
              echo "admin_domain=$PRODUCTION_ADMIN_DOMAIN" >> "$GITHUB_OUTPUT"
              ;;
            *) echo "Unknown environment: $ENV_NAME"; exit 1 ;;
          esac

      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ steps.env.outputs.role }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.run_id }}
          audience: sts.amazonaws.com
          # Long deploys: CDK + migrations + secret captures + budget
          # reconciliation. 3600s is the standard IAM-role default; raise
          # MaxSessionDuration on the role if your deploy regularly nears it.
          role-duration-seconds: 3600

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: "24"
          cache: pnpm

      # Scoped install: this job only needs @workspace/cdk + its deps to run
      # `cdk deploy`. Image builds happen inside Docker (no runner
      # node_modules). Full-workspace install added ~30-60s of dependency
      # resolution with zero benefit.
      - run: pnpm install --frozen-lockfile --filter @workspace/cdk...

      # QEMU + Buildx: needed before any Docker build. The web/api/admin
      # images are cross-built to arm64 here; `cdk deploy` ALSO builds the
      # Cerbos (App) and Backup arm64 DockerImageAssets inline, so QEMU +
      # Buildx must be present even when image_tag_override skips our own
      # build steps. Only skipped for `stack=infra-only` (Network + Data
      # have no Docker assets at all).
      - name: Docker QEMU (arm64 cross-build on amd64 runners)
        if: env.STACK_SCOPE != 'infra-only'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Docker Buildx (enables gha cache + multi-arch)
        if: env.STACK_SCOPE != 'infra-only'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # NOTE: ECR login + the 3 image builds + the CVE gate moved to the
      # parallel `build-images` matrix job above. This deploy job only runs
      # AFTER all three images are pushed + scan-clean. Keep QEMU + Buildx
      # here (above) because cdk deploy ALSO builds arm64 DockerImageAssets
      # inline for Cerbos (App stack) and the Backup Lambda.

      - name: Ensure workflow-managed Secrets Manager secrets exist + capture full ARNs
        id: secrets
        if: env.SKIP_IMAGE_BUILD != 'true'
        env:
          TUNNEL_TOKEN: ${{ secrets[format('CLOUDFLARE_TUNNEL_TOKEN_{0}', inputs.environment)] }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          set -euo pipefail

          # AppStack references 4 workflow-managed Secrets Manager secrets by
          # FULL ARN (Secret.fromSecretCompleteArn — see app-stack.ts for the
          # bare-vs-full-ARN rationale). Each secret is ensured here BEFORE
          # `cdk deploy` runs, then its full ARN is captured into a step
          # output and passed to CDK via --context flags below. This keeps
          # the ECS task def `valueFrom` and the IAM grantRead policy
          # Resource pinned to the SAME exact full ARN, so Secrets Manager's
          # GetSecretValue auth always matches 1:1.
          #
          # Idempotent shape per secret:
          #   1. describe-secret to detect PendingDeletion → restore-secret
          #   2. describe-secret → if exists, optionally put-secret-value
          #      (only for value-driven secrets; signing secrets keep value)
          #   3. else create-secret with the appropriate value
          #   4. describe-secret --query ARN → step output
          #
          # capture <output-name> <secret-name>: emit the live full ARN as a
          # GitHub Actions step output (consumed by cdk deploy --context).
          capture() {
            local out="$1" name="$2"
            local arn
            arn=$(aws secretsmanager describe-secret \
              --secret-id "$name" \
              --region "$AWS_REGION" \
              --query ARN --output text)
            if [ -z "$arn" ] || [ "$arn" = "None" ]; then
              echo "::error::Failed to read ARN of secret $name (describe-secret returned empty)"
              exit 1
            fi
            # Secrets Manager ARNs always carry a 6-char alphanumeric suffix
            # (e.g. `-AbCdEf`). A bare ARN here means describe-secret returned
            # an unexpected shape; passing it to CDK produces partial IAM
            # reads that fail at ECS task start with AccessDenied. Refuse it.
            if ! [[ "$arn" =~ -[A-Za-z0-9]{6}$ ]]; then
              echo "::error::Captured ARN $arn for $name is missing the -XXXXXX suffix. Refusing — would cause IAM/Resource mismatch at task start." >&2
              exit 1
            fi
            echo "$out=$arn" >> "$GITHUB_OUTPUT"
            echo "captured: $out=$arn"
          }

          # restore_if_pending <secret-name>: undo a prior delete-secret so
          # subsequent describe / put / create steps see an active secret.
          restore_if_pending() {
            local name="$1"
            local deleted
            deleted=$(aws secretsmanager describe-secret --secret-id "$name" --region "$AWS_REGION" --query 'DeletedDate' --output text 2>/dev/null || echo "MISSING")
            if [ "$deleted" != "MISSING" ] && [ "$deleted" != "None" ]; then
              echo "Secret $name in PendingDeletion — restoring."
              aws secretsmanager restore-secret --secret-id "$name" --region "$AWS_REGION" >/dev/null
            fi
          }

          # ---------- 1. Cloudflare Tunnel token ----------
          if [ -z "$TUNNEL_TOKEN" ]; then
            echo "::error::CLOUDFLARE_TUNNEL_TOKEN_${ENV_NAME^^} secret is not set. Create the tunnel in Cloudflare and store its token."
            exit 1
          fi
          echo "::add-mask::$TUNNEL_TOKEN"
          NAME="monorepo-${ENV_NAME}-cloudflare-tunnel-token"
          restore_if_pending "$NAME"
          if aws secretsmanager describe-secret --secret-id "$NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            aws secretsmanager put-secret-value --secret-id "$NAME" --secret-string "$TUNNEL_TOKEN" --region "$AWS_REGION" >/dev/null
          else
            aws secretsmanager create-secret --name "$NAME" --secret-string "$TUNNEL_TOKEN" --description "Cloudflare Tunnel connector token for cloudflared sidecar (monorepo ${ENV_NAME})" --region "$AWS_REGION" >/dev/null
          fi
          capture cloudflareTunnelSecretArn "$NAME"

          # ---------- 2. Resend API key ----------
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::error::RESEND_API_KEY repo secret is not set. Create the Resend account + key (docs/runbooks/AWS-DEPLOY.md step 7)."
            exit 1
          fi
          echo "::add-mask::$RESEND_API_KEY"
          NAME="monorepo-${ENV_NAME}-resend-api-key"
          restore_if_pending "$NAME"
          if aws secretsmanager describe-secret --secret-id "$NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            aws secretsmanager put-secret-value --secret-id "$NAME" --secret-string "$RESEND_API_KEY" --region "$AWS_REGION" >/dev/null
          else
            aws secretsmanager create-secret --name "$NAME" --secret-string "$RESEND_API_KEY" --description "Resend API key for transactional email (monorepo ${ENV_NAME})" --region "$AWS_REGION" >/dev/null
          fi
          capture resendApiKeySecretArn "$NAME"

          # ---------- 3. Better Auth signing secret ----------
          # 44-char alphanumeric, generated ONCE on first creation. We never
          # put a new value into an existing signing secret — that would
          # invalidate every active session on each deploy.
          NAME="monorepo-${ENV_NAME}-better-auth-secret"
          DESC="Better Auth session-signing secret (32+ bytes), monorepo ${ENV_NAME}"
          restore_if_pending "$NAME"
          if aws secretsmanager describe-secret --secret-id "$NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Secret $NAME already exists — leaving value untouched."
          else
            VALUE=$(LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom | head -c 44)
            echo "::add-mask::$VALUE"
            aws secretsmanager create-secret --name "$NAME" --secret-string "$VALUE" --description "$DESC" --region "$AWS_REGION" >/dev/null
            echo "Secret $NAME created with fresh 44-char value."
          fi
          capture betterAuthSecretArn "$NAME"

      # Sanity check: when image_tag_override is set the operator is asking
      # CDK to reuse images that should already be in ECR. Fail fast if any
      # of the three (web, api, admin) is missing — otherwise the App stack
      # will deploy and ECS will start crash-looping on `ImagePullFailure`
      # ~5 min from now.
      - name: Verify override images exist in ECR
        if: inputs.image_tag_override != '' && env.STACK_SCOPE != 'infra-only'
        run: |
          set -euo pipefail
          missing=0
          for svc in web api admin; do
            repo="monorepo-${ENV_NAME}-${svc}"
            if aws ecr describe-images \
                --repository-name "$repo" \
                --image-ids imageTag="$IMAGE_TAG" \
                --region "$AWS_REGION" >/dev/null 2>&1; then
              echo "OK   ${repo}:${IMAGE_TAG}"
            else
              echo "::error::MISSING ${repo}:${IMAGE_TAG} — image_tag_override points at a non-existent image"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::${missing} image(s) missing in ECR for tag ${IMAGE_TAG}. Re-run with image_tag_override='' to build fresh."
            exit 1
          fi

      # Pre-create the 7 ECS log groups idempotently.
      #
      # CFN's AWS::IAM::Policy GetAtt(LogGroup.Arn) hits CloudControl, which
      # has ~1s read-after-write lag. Brand-new log groups (created within
      # the same UPDATE) trigger 'Unable to retrieve Arn attribute for
      # AWS::Logs::LogGroup ... was not found' on the IAM policy update.
      # See deploy run 26089910853 (2026-05-19 10:03Z) — that's the failure
      # mode this step prevents.
      #
      # By pre-creating with the same names CDK uses, CDK's stack template
      # sees them as "existing, no-op" and the IAM policy's GetAtt resolves
      # to an already-propagated ARN. CloudFormation's import-by-name
      # semantics treat these as CDK-managed once the stack is in sync.
      #
      # Idempotent on the AWS side (ResourceAlreadyExistsException is
      # suppressed). Retention is set to ONE_WEEK to match app-stack.ts.
      - name: Pre-create ECS log groups
        # Symmetric across envs — first prod deploy hits the same
        # AWS::Logs::LogGroup IAM/GetAtt race that staging exposed in
        # run 26089910853 if this step is skipped.
        if: env.STACK_SCOPE != 'infra-only'
        run: |
          set -euo pipefail
          for svc in web admin api cloudflared pgbouncer cerbos openfga; do
            lg="/ecs/monorepo-${ENV_NAME}/${svc}"
            if aws logs describe-log-groups --log-group-name-prefix "$lg" --region "$AWS_REGION" --query 'logGroups[?logGroupName==`'"$lg"'`]' --output text 2>&1 | grep -q "$lg"; then
              echo "exists: $lg"
            else
              aws logs create-log-group --log-group-name "$lg" --region "$AWS_REGION" 2>/dev/null && echo "created: $lg" || echo "::warning::create-log-group failed for $lg (may be racing)"
              aws logs put-retention-policy --log-group-name "$lg" --retention-in-days 7 --region "$AWS_REGION" >/dev/null 2>&1 || true
            fi
          done

      # The 'Pre-deploy cleanup (staging only)' step that USED to live here
      # is gone entirely. It force-deleted the generated BetterAuth +
      # AppToken secrets on every deploy; CDK then re-created them with
      # NEW random suffixes; the TaskExecutionRole IAM policy lagged and
      # ECS task start failed with:
      #
      #   AccessDeniedException: ... is not authorized to perform:
      #   secretsmanager:GetSecretValue on resource:
      #   .../monorepo-staging-better-auth-secret-EQ76ea
      #
      # — see deploy run 26089910853 (2026-05-19 12:26Z). The same
      # cascading-secret pattern caused the ECS Deployment Circuit Breaker
      # to trip + the stack to wedge in UPDATE_ROLLBACK_FAILED. Resolved
      # by manual `aws cloudformation continue-update-rollback`.
      #
      # PendingDeletion recovery (the original justification) is now
      # handled inline by the 'Ensure ... secret exists' steps above,
      # which call `aws secretsmanager restore-secret` when DeletedDate
      # is non-null. RemovalPolicy.DESTROY on staging (set in PR #153)
      # handles tear-down on rollback. The combination supersedes the
      # belt-and-braces cleanup.

      # The "Migrate live AWS Budgets to SNS-only subscribers" step lived
      # here. It existed to work around AWS::Budgets immutability on
      # NotificationsWithSubscribers: any subscriber/threshold change forced
      # a REPLACE on the budget name, which collided with the live budget
      # of the same name. security-stack.ts now appends a deterministic
      # 8-char hash suffix to every budgetName, so meaningful spec changes
      # CREATE(new)+DELETE(old) cleanly and the workaround is unnecessary.
      # If you bring this back, also drop the suffix from security-stack.ts.

      # Apply pending `packages/db/migrations/*.sql` to RDS via a one-off
      # ECS Fargate task that reuses the Backup TaskDef (it already has
      # the network + `app_owner` secret wiring). Replaces the operator-
      # driven bastion `pnpm db:migrate` step in docs/runbooks/AWS-DEPLOY.md.
      #
      # Runs BEFORE `cdk deploy App-*` so:
      #   1. New schema (auth_token, audit_event.workspace_id nullable, etc.)
      #      is in place when ECS rolls out the new App task definition.
      #   2. Old App task (still on the previous task def) keeps serving
      #      until rollout — migrations include `DROP TABLE auth_invite`
      #      (0020), which the old code does not read; the inverse path
      #      (apply AFTER deploy) crashed the OLD task and tripped
      #      circuit breaker.
      #
      # Idempotent: every applied SQL file is journaled in `_app_migrations`
      # and skipped on re-run. The script also no-ops cleanly when
      # `packages/db/migrations/` is empty.
      - name: Apply DB migrations via one-off ECS task
        if: env.STACK_SCOPE != 'infra-only'
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: bash infra/scripts/apply-migrations-via-ecs.sh

      # Single cdk deploy, AFTER images + secrets exist. App and the stacks
      # that depend on it (Security, Observability, Backup) cannot deploy
      # before the web/api images are in ECR and the tunnel/Resend secrets
      # exist — so there is exactly one deploy, it runs last, and always
      # passes imageTag. infra-only = Network + Data only (the App-independent
      # foundation); Security/Observability/Backup depend on App.
      - name: Deploy CDK stacks
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          APP_DOMAIN: ${{ steps.env.outputs.domain }}
          # Admin public host — its own per-env value, NOT a subdomain of
          # APP_DOMAIN (production admin is admin.afframe.com, web is
          # app.afframe.com). bin/app.ts requires it.
          ADMIN_DOMAIN: ${{ steps.env.outputs.admin_domain }}
          # Comma-separated workspace ids allowed into admin.afframe.com.
          # Empty when the variable is unset — the admin gate then fails
          # closed (nobody authorized). Set vars.ADMIN_WORKSPACE_ALLOWLIST
          # to grant staff access; changing it is a redeploy.
          ADMIN_WORKSPACE_ALLOWLIST: ${{ vars.ADMIN_WORKSPACE_ALLOWLIST }}
          # Outbound email "From" address. Optional override; bin/app.ts
          # falls back to no-reply@afframe.com (the Resend-verified parent
          # domain). Set vars.MAIL_FROM_ADDRESS_{ENV} to override per-env
          # once you verify a per-env subdomain on Resend. See
          # docs/runbooks/AWS-DEPLOY.md "Email sender verification".
          MAIL_FROM_ADDRESS: ${{ vars.MAIL_FROM_ADDRESS }}
          # ALERT_EMAIL is intentionally NOT passed to CDK. The operator
          # email never enters CFN templates / `cdk diff` snapshots / CI
          # logs. The post-deploy step "Subscribe operator email to alert
          # SNS topics" handles it out-of-band with ::add-mask::.
          # Full Secrets Manager ARNs captured by the "Ensure workflow-managed
          # Secrets Manager secrets" step. AppStack reads each one from CDK
          # context and instantiates Secret.fromSecretCompleteArn, so the
          # task def + grantRead policy resource share one exact full ARN.
          CLOUDFLARE_TUNNEL_SECRET_ARN: ${{ steps.secrets.outputs.cloudflareTunnelSecretArn }}
          RESEND_API_KEY_SECRET_ARN: ${{ steps.secrets.outputs.resendApiKeySecretArn }}
          BETTER_AUTH_SECRET_ARN: ${{ steps.secrets.outputs.betterAuthSecretArn }}
        run: |
          case "$STACK_SCOPE" in
            all)        STACKS=("Network-${ENV_NAME}" "Data-${ENV_NAME}" "App-${ENV_NAME}" "Security-${ENV_NAME}" "Observability-${ENV_NAME}" "Backup-${ENV_NAME}") ;;
            infra-only) STACKS=("Network-${ENV_NAME}" "Data-${ENV_NAME}") ;;
            app-only)   STACKS=("App-${ENV_NAME}") ;;
            *) echo "::error::Unknown stack scope: $STACK_SCOPE"; exit 1 ;;
          esac
          # --exclusively: do not deploy stacks not named in STACKS[] just
          # because they are upstream dependencies that happen to be dirty.
          # --concurrency 3: Security, Observability, Backup are App-stack
          # siblings (no cross-deps after App is up) — deploy them in
          # parallel. Saves ~2 min on full `stack=all` deploys.
          # Secret ARN context flags — passed only when the App stack is in
          # scope and the secrets step ran. App-stack.ts reads each ARN via
          # `node.tryGetContext()` and feeds it into Secret.fromSecretCompleteArn,
          # making the task def `valueFrom` and the IAM grantRead Resource
          # both pin to the same full ARN (with random suffix). See app-stack.ts
          # for the bare-vs-full-ARN failure mode this avoids.
          SECRET_CTX=()
          if [ "$STACK_SCOPE" != "infra-only" ]; then
            for pair in \
              "cloudflareTunnelSecretArn=${CLOUDFLARE_TUNNEL_SECRET_ARN}" \
              "resendApiKeySecretArn=${RESEND_API_KEY_SECRET_ARN}" \
              "betterAuthSecretArn=${BETTER_AUTH_SECRET_ARN}"; do
              key="${pair%%=*}"
              val="${pair#*=}"
              if [ -z "$val" ]; then
                echo "::error::Missing secret ARN context for $key — the 'Ensure workflow-managed Secrets Manager secrets' step did not run or did not capture."
                exit 1
              fi
              SECRET_CTX+=(--context "$pair")
            done
          fi

          pnpm --filter @workspace/cdk exec cdk deploy "${STACKS[@]}" \
            --exclusively \
            --concurrency 3 \
            --context "env=${ENV_NAME}" \
            --context "imageTag=${IMAGE_TAG}" \
            "${SECRET_CTX[@]}" \
            --require-approval=never

      # Subscribe operator email to the 3 alert SNS topics. CDK does NOT
      # add the email subscriber from inside the template (would leak the
      # address as plaintext into the CFN template + `cdk diff` output
      # that any account-read role can fetch). Workflow does it here,
      # idempotently, with ::add-mask:: on the address.
      #
      # Topics + roles:
      #   - Security-${env} KillSwitchOpsTopicArn  — operator email lands
      #     here for budget breaches (80% + 100%) and kill-switch handler
      #     failures.
      #   - Security-${env} KillSwitchTopicArn     — Lambda kill-switch
      #     consumes; we ALSO subscribe the email so the operator gets a
      #     copy when the kill-switch fires (defense in depth).
      #   - Observability-${env} BillingTopicArn   — CloudWatch alarm
      #     fan-out for the 6 attack-vector + 2 Fargate-Critical alarms.
      #
      # Idempotent: skip if a CONFIRMED email subscription already exists
      # on the topic for this address. Pending subscriptions are not
      # re-subscribed (the recipient has the confirmation link in inbox).
      - name: Subscribe operator email to alert SNS topics
        if: env.STACK_SCOPE != 'infra-only'
        env:
          ALERT_EMAIL: ${{ secrets.EMAIL_FORWARD_TO }}
        run: |
          set -euo pipefail
          if [ -z "${ALERT_EMAIL:-}" ]; then
            echo "::error::EMAIL_FORWARD_TO repo secret is empty — no operator alert email to subscribe."
            exit 1
          fi
          echo "::add-mask::$ALERT_EMAIL"

          subscribe_idempotent() {
            local topic_arn="$1" label="$2"
            if [ -z "$topic_arn" ] || [ "$topic_arn" = "None" ]; then
              echo "::warning::$label topic ARN empty — skipping subscription."
              return 0
            fi
            # Look for an existing subscription (any status) where Endpoint
            # equals the operator email. ListSubscriptionsByTopic caps at
            # 100 results per page, so we paginate via NextToken until empty
            # to avoid creating duplicate subscriptions once the page fills.
            local existing=0 next_token="" page match
            while :; do
              if [ -n "$next_token" ]; then
                page=$(aws sns list-subscriptions-by-topic --topic-arn "$topic_arn" --region "$AWS_REGION" --starting-token "$next_token" --output json)
              else
                page=$(aws sns list-subscriptions-by-topic --topic-arn "$topic_arn" --region "$AWS_REGION" --output json)
              fi
              match=$(echo "$page" | jq -r --arg e "$ALERT_EMAIL" '[.Subscriptions[]? | select(.Protocol=="email" and .Endpoint==$e)] | length')
              existing=$((existing + match))
              next_token=$(echo "$page" | jq -r '.NextToken // ""')
              [ -z "$next_token" ] && break
            done
            if [ "$existing" -gt 0 ]; then
              echo "OK   $label: operator email already subscribed (count=$existing)."
              return 0
            fi
            echo "SUB  $label: subscribing operator email (one-time AWS confirmation email will arrive)."
            aws sns subscribe --topic-arn "$topic_arn" --protocol email --notification-endpoint "$ALERT_EMAIL" --region "$AWS_REGION" >/dev/null
          }

          # JMESPath query strings — ANSI-C wrap quiets shellcheck SC2016.
          ops_query=$'Stacks[0].Outputs[?OutputKey==\x60KillSwitchOpsTopicArn\x60].OutputValue'
          kill_query=$'Stacks[0].Outputs[?OutputKey==\x60KillSwitchTopicArn\x60].OutputValue'
          bill_query=$'Stacks[0].Outputs[?OutputKey==\x60BillingTopicArn\x60].OutputValue'
          OPS_ARN=$(aws cloudformation describe-stacks --stack-name "Security-${ENV_NAME}" --region "$AWS_REGION" --query "$ops_query" --output text 2>/dev/null || echo "")
          KILL_ARN=$(aws cloudformation describe-stacks --stack-name "Security-${ENV_NAME}" --region "$AWS_REGION" --query "$kill_query" --output text 2>/dev/null || echo "")
          BILL_ARN=$(aws cloudformation describe-stacks --stack-name "Observability-${ENV_NAME}" --region "$AWS_REGION" --query "$bill_query" --output text 2>/dev/null || echo "")

          subscribe_idempotent "$OPS_ARN"  "KillSwitchOpsTopic"
          subscribe_idempotent "$KILL_ARN" "KillSwitchTopic"
          subscribe_idempotent "$BILL_ARN" "BillingTopic"

      # Persist last-deploy state for the next run's detect-changes job.
      # Only writes on a fully-successful deploy. Two parameters:
      #   - git-sha   : current commit, the baseline for the next diff
      #   - image-tag : the tag actually deployed (may be the SSM-reused
      #                 last tag when changeset-aware skip fired)
      # Failure to write SSM is non-fatal — the next run will fall through
      # to a full rebuild (safe default).
      - name: Record last-deploy state in SSM
        if: env.STACK_SCOPE != 'infra-only'
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          aws ssm put-parameter \
            --name "/monorepo/${ENV_NAME}/last-deploy/git-sha" \
            --type String \
            --value "$GITHUB_SHA" \
            --overwrite \
            --region "$AWS_REGION" >/dev/null || echo "::warning::Failed to write last-deploy/git-sha"
          aws ssm put-parameter \
            --name "/monorepo/${ENV_NAME}/last-deploy/image-tag" \
            --type String \
            --value "$IMAGE_TAG" \
            --overwrite \
            --region "$AWS_REGION" >/dev/null || echo "::warning::Failed to write last-deploy/image-tag"
          echo "Recorded: sha=$GITHUB_SHA tag=$IMAGE_TAG (env=$ENV_NAME)"

      - id: summary
        run: echo "deployed=true" >> "$GITHUB_OUTPUT"

  # Post-deploy smoke test of the live URL + auto-rollback on failure.
  # Probes the web /api/version + admin /api/health endpoints through
  # Cloudflare Tunnel. If either fails to reach 200 within ~150s, we
  # roll the ECS service back to the previous task-definition revision
  # and exit the workflow non-zero. Covers Bucket 1 of past failures
  # (ECS Circuit Breaker on App-staging, 5/20 fails) by giving the
  # operator an automatic recovery path instead of a wedged service.
  smoke:
    needs: [guard, validate-inputs, deploy]
    if: |
      !cancelled() &&
      needs.guard.outputs.go == 'true' &&
      needs.validate-inputs.result == 'success' &&
      needs.deploy.result == 'success' &&
      inputs.stack != 'infra-only'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    env:
      ENV_NAME: ${{ inputs.environment }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      STAGING_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
      PRODUCTION_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
      STAGING_APP_DOMAIN: ${{ vars.APP_DOMAIN_STAGING }}
      PRODUCTION_APP_DOMAIN: ${{ vars.APP_DOMAIN_PRODUCTION }}
      STAGING_ADMIN_DOMAIN: ${{ vars.ADMIN_DOMAIN_STAGING }}
      PRODUCTION_ADMIN_DOMAIN: ${{ vars.ADMIN_DOMAIN_PRODUCTION }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - id: env
        run: |
          set -euo pipefail
          case "$ENV_NAME" in
            staging)
              echo "role=$STAGING_ROLE" >> "$GITHUB_OUTPUT"
              echo "app=https://$STAGING_APP_DOMAIN" >> "$GITHUB_OUTPUT"
              echo "admin=https://$STAGING_ADMIN_DOMAIN" >> "$GITHUB_OUTPUT"
              ;;
            production)
              echo "role=$PRODUCTION_ROLE" >> "$GITHUB_OUTPUT"
              echo "app=https://$PRODUCTION_APP_DOMAIN" >> "$GITHUB_OUTPUT"
              echo "admin=https://$PRODUCTION_ADMIN_DOMAIN" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unknown environment: $ENV_NAME"
              exit 1
              ;;
          esac
      - id: smoke
        name: Smoke probe (web + admin)
        env:
          APP_URL: ${{ steps.env.outputs.app }}
          ADMIN_URL: ${{ steps.env.outputs.admin }}
        run: |
          set -euo pipefail
          # 30 attempts x 5s = 150s ceiling. Aligns with healthCheckGracePeriod
          # (180s) so the probe gives ECS a chance to settle.
          for i in $(seq 1 30); do
            v=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 10 "$APP_URL/api/version" || true)
            h=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 10 "$ADMIN_URL/api/health" || true)
            # /api/auth/me returns 200 (signed-in) or 401 (anonymous) — both
            # prove the auth handler is wired. Anything else = broken.
            m=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 10 "$APP_URL/api/auth/me" || true)
            if [ "$v" = "200" ] && [ "$h" = "200" ] && { [ "$m" = "200" ] || [ "$m" = "401" ]; }; then
              echo "smoke: PASS  version=$v admin-health=$h auth-me=$m  (attempt $i)"
              exit 0
            fi
            echo "smoke: try=$i  version=$v admin-health=$h auth-me=$m"
            sleep 5
          done
          echo "::error::smoke failed after 30 attempts"
          exit 1
      - name: Configure AWS credentials for rollback
        if: failure() && steps.smoke.conclusion == 'failure'
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ steps.env.outputs.role }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-smoke-rollback-${{ github.run_id }}
          audience: sts.amazonaws.com
          role-duration-seconds: 1800
      - name: Roll back ECS service to previous task-definition revision
        if: failure() && steps.smoke.conclusion == 'failure'
        run: |
          set -euo pipefail
          CLUSTER="monorepo-${ENV_NAME}"
          # Single FargateService per env (app-stack.ts). Discover it instead
          # of hard-coding a CDK-generated logical name.
          SERVICE_ARN=$(aws ecs list-services --cluster "$CLUSTER" --region "$AWS_REGION" --query 'serviceArns[0]' --output text)
          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
            echo "::error::no service in cluster $CLUSTER — cannot roll back"
            exit 1
          fi
          SERVICE_NAME=${SERVICE_ARN##*/}
          CURRENT_TD=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE_NAME" --region "$AWS_REGION" --query 'services[0].taskDefinition' --output text)
          FAMILY="${CURRENT_TD##*/}"
          FAMILY="${FAMILY%:*}"
          echo "Rolling back service=$SERVICE_NAME family=$FAMILY current=$CURRENT_TD"
          PREV_TD=$(aws ecs list-task-definitions --family-prefix "$FAMILY" --status ACTIVE --sort DESC --max-items 2 --region "$AWS_REGION" --query 'taskDefinitionArns[1]' --output text)
          if [ -z "$PREV_TD" ] || [ "$PREV_TD" = "None" ]; then
            echo "::error::no previous ACTIVE task-def revision in family $FAMILY — cannot roll back automatically"
            exit 1
          fi
          echo "Target previous revision: $PREV_TD"
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE_NAME" \
            --task-definition "$PREV_TD" \
            --force-new-deployment \
            --region "$AWS_REGION" >/dev/null
          echo "::error::smoke failed; rollback issued to $PREV_TD; exiting non-zero"
          exit 1
