# Tests for the vat_rate resource policy.
#
# Verifies:
#   - Org admin can edit (has can_administer derived role)
#   - Org owner can edit (has can_administer derived role)
#   - Org member cannot edit
#   - Workspace admin cannot edit
#   - Guest cannot edit
#   - All roles can view
#   - Delete denied for everyone (no delete rule)
---
name: VAT rate resource policy tests
description: Admin-only edit/create; view for all; no delete
principals:
  admin-001:
    id: admin-001
    roles: [org_admin]
  owner-001:
    id: owner-001
    roles: [org_owner]
  member-001:
    id: member-001
    roles: [org_member]
  ws-admin-001:
    id: ws-admin-001
    roles: [workspace_admin]
  guest-001:
    id: guest-001
    roles: [org_guest]
resources:
  vat-std:
    id: vat-std
    kind: vat_rate
    attr: {}
tests:
  - name: org admin can edit vat_rate
    input:
      principals: [admin-001]
      resources: [vat-std]
      actions: [edit]
    expected:
      - principal: admin-001
        resource: vat-std
        actions:
          edit: EFFECT_ALLOW

  - name: org owner can edit vat_rate
    input:
      principals: [owner-001]
      resources: [vat-std]
      actions: [edit]
    expected:
      - principal: owner-001
        resource: vat-std
        actions:
          edit: EFFECT_ALLOW

  - name: org member cannot edit vat_rate
    input:
      principals: [member-001]
      resources: [vat-std]
      actions: [edit]
    expected:
      - principal: member-001
        resource: vat-std
        actions:
          edit: EFFECT_DENY

  - name: workspace admin cannot edit vat_rate
    input:
      principals: [ws-admin-001]
      resources: [vat-std]
      actions: [edit]
    expected:
      - principal: ws-admin-001
        resource: vat-std
        actions:
          edit: EFFECT_DENY

  - name: guest cannot edit vat_rate
    input:
      principals: [guest-001]
      resources: [vat-std]
      actions: [edit]
    expected:
      - principal: guest-001
        resource: vat-std
        actions:
          edit: EFFECT_DENY

  - name: org member can view vat_rate
    input:
      principals: [member-001]
      resources: [vat-std]
      actions: [view]
    expected:
      - principal: member-001
        resource: vat-std
        actions:
          view: EFFECT_ALLOW

  - name: guest can view vat_rate
    input:
      principals: [guest-001]
      resources: [vat-std]
      actions: [view]
    expected:
      - principal: guest-001
        resource: vat-std
        actions:
          view: EFFECT_ALLOW

  - name: delete is denied for org admin (no delete rule in policy)
    input:
      principals: [admin-001]
      resources: [vat-std]
      actions: [delete]
    expected:
      - principal: admin-001
        resource: vat-std
        actions:
          delete: EFFECT_DENY
