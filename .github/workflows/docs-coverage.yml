# Docs coverage gate.
#
# Verifies that every resource declared in the shared API surface has a
# matching MDX file under apps/docs/content/developers/. Catches a
# contributor adding a resource (e.g. invoices) without authoring the
# corresponding narrative doc.
#
# Skipped automatically until apps/docs/ scaffolds in Phase C.
# Advisory until the first green PR cycle.

name: Docs coverage

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/shared/src/api/**"
      - "apps/docs/content/developers/**"
      - "apps/docs/package.json"
      - ".github/workflows/docs-coverage.yml"
  push:
    branches: [main]
    paths:
      - "apps/docs/content/developers/**"

permissions: {}

concurrency:
  group: docs-coverage-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  coverage:
    name: Resource → MDX cover
    runs-on: ubuntu-latest
    continue-on-error: true # ADVISORY
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
        with:
          persist-credentials: false

      - name: Skip when docs scaffold absent
        id: probe
        run: |
          if [ ! -d apps/docs/content/developers ]; then
            echo "scaffold=false" >> "$GITHUB_OUTPUT"
            echo "apps/docs/content/developers not scaffolded yet — skipping coverage gate."
          else
            echo "scaffold=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/setup
        if: steps.probe.outputs.scaffold == 'true'

      - name: Resource → MDX coverage
        if: steps.probe.outputs.scaffold == 'true'
        run: |
          set -euo pipefail
          if ! node scripts/governance/check-docs-coverage.mjs; then
            echo "::error::Docs coverage gap. Add the missing MDX page(s)."
            exit 1
          fi
          echo "Every resource has a developer MDX page."
