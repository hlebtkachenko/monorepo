name: Dependency review

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: dep-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Gate at "critical" — most "high"-severity findings are in
          # transitive dev-only packages (puppeteer, turbo/gen, etc) that
          # never load at runtime. osv-scanner-pr and Dependabot security
          # updates still surface high+medium for human review without
          # blocking every dep-bump PR.
          fail-on-severity: critical
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, AGPL-1.0, LGPL-3.0
          allow-dependencies-licenses: "pkg:npm/jszip"
          comment-summary-in-pr: on-failure
