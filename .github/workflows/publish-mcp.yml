# Publish @afframe/mcp to npm. Tag-gated: fires only on an `mcp-v*` tag, which
# is cut by hand on Hleb's authorization (never on merge), and does not collide
# with release.yml's `v*` glob. Requires (manual, one-time) the `afframe` npm org
# and an automation `NPM_TOKEN` repo secret scoped to publish @afframe/mcp.
name: publish-mcp

on:
  push:
    tags:
      - "mcp-v*"

permissions: {}

concurrency:
  group: publish-mcp-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # npm provenance (Sigstore)
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Verify tag matches package version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          case "$REF_NAME" in
            mcp-v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "::error::tag '$REF_NAME' is not mcp-vX.Y.Z"; exit 1 ;;
          esac
          tag_version="${REF_NAME#mcp-v}"
          pkg_version=$(node -p "require('./apps/mcp/package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag ${tag_version} != apps/mcp/package.json ${pkg_version}"
            exit 1
          fi
          echo "publishing @afframe/mcp@${pkg_version}"

      - name: Typecheck + test + build
        run: |
          pnpm --filter @afframe/mcp typecheck
          pnpm --filter @afframe/mcp test
          pnpm --filter @afframe/mcp build

      - name: Bundle smoke (fails fast without a key)
        run: |
          if node apps/mcp/bin/afframe-mcp.js 2>/dev/null; then
            echo "::error::bundle did not fail-fast without AFFRAME_API_KEY"
            exit 1
          fi
          echo "bundle loads + fails fast: ok"

      - name: Pack + assert contents
        working-directory: apps/mcp
        run: |
          pnpm pack
          tar -tzf afframe-mcp-*.tgz | sort
          if tar -xzf afframe-mcp-*.tgz -O package/package.json | grep -q "workspace:"; then
            echo "::error::published manifest still contains a workspace: reference"
            exit 1
          fi

      - name: Publish to npm (provenance)
        working-directory: apps/mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN is not set"
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=\${NODE_AUTH_TOKEN}" > ~/.npmrc
          npm publish ./afframe-mcp-*.tgz --provenance --access public
