name: OSV-Scanner Nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: osv-scanner-nightly
  cancel-in-progress: false

jobs:
  scan:
    permissions:
      actions: read
      contents: read
      security-events: write # SARIF upload to the Security tab
    # Reusable workflow — invoked at the job level via `uses:`, NOT as a step.
    # Reusable workflow refs cannot be SHA-pinned by GitHub policy; pin to the semantic tag.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      # osv-scanner exits non-zero on any vulnerability finding by default,
      # which fails the workflow run. SARIF upload to the Security tab still
      # happens via the reusable workflow regardless of exit status.
      scan-args: |-
        --recursive
        --skip-git
        ./
