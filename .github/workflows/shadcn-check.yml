name: shadcn component updates

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: shadcn-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.1
      - uses: ./.github/actions/setup

      - name: Check for component updates
        id: diff
        run: |
          OUTPUT=$(pnpm shadcn diff 2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qE "^[-+]"; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing issue
        if: steps.diff.outputs.has_updates == 'true'
        id: existing
        run: |
          COUNT=$(gh issue list --label shadcn-update --state open --json number --jq length)
          echo "exists=$COUNT" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue
        if: steps.diff.outputs.has_updates == 'true' && steps.existing.outputs.exists == '0'
        run: |
          gh issue create \
            --title "chore: shadcn/ui component updates available" \
            --label shadcn-update \
            --body "$(cat <<'BODY'
          Upstream shadcn/ui components have changes.

          Run locally to review:
          ```sh
          pnpm shadcn diff
          ```

          Update specific component:
          ```sh
          pnpm shadcn add <component-name> --overwrite
          ```
          BODY
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
