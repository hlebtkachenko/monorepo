name: DB migration lint (squawk)

# Runs squawk against migration SQL files on PRs that touch migrations/.
# Flags destructive or unsafe DDL patterns (missing NOT VALID, lock escalation
# risks, etc.) before they reach main.
#
# ADVISORY — continue-on-error: true per project convention for new workflows.
# Flip to required after a full PR cycle passes green.

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/db/migrations/**"

permissions: {}

concurrency:
  group: db-migration-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  squawk:
    name: squawk migration lint
    runs-on: ubuntu-latest
    continue-on-error: true  # ADVISORY
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.1

      - name: Install squawk via cargo
        run: |
          set -euo pipefail
          # squawk distributes via crates.io; binary releases on GitHub are
          # inconsistent across versions. cargo install is the canonical path.
          # ubuntu-latest ships cargo via rustup.
          cargo install squawk --locked --version 2.52.1
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Lint migrations
        # Rule exclusions (per project convention; revisit when retrofitting):
        # - prefer-text-field: we use varchar/text intentionally per schema design.
        # - disallowed-unique-constraint: unique constraints via indexes are
        #   preferred but some early migrations use inline UNIQUE — allowed.
        # - require-timeout-settings: not retrofitted yet. The migration runner
        #   wraps every file in a transaction; bare `SET LOCAL statement_timeout`
        #   + `SET LOCAL lock_timeout` per migration would be tidier but is out
        #   of scope for the current rebuild. Track via a separate cleanup PR.
        # - ban-drop-column: 0013 intentionally drops `workspace_billing.plan`
        #   (the column was only present from 0012, never written to in
        #   production data, and is owned by the same PR that introduced it).
        #   Squawk can't distinguish that from a destructive drop.
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          squawk \
            --exclude prefer-text-field,disallowed-unique-constraint,require-timeout-settings,ban-drop-column,prefer-bigint-over-int,prefer-bigint-over-smallint,constraint-missing-not-valid,adding-foreign-key-constraint \
            packages/db/migrations/*.sql
