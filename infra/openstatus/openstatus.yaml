# yaml-language-server: $schema=https://www.openstatus.dev/schema.json
#
# OpenStatus monitors-as-code for status.afframe.com.
# Deployed on the OVH VPS, NOT AWS. See ./README.md and
# docs/adr/0019-status-page-and-uptime-monitoring.md.
#
# This file is operator-authored INTENT. The upstream `openstatus` CLI
# (`internal/api/client.go`) hardcodes `https://api.openstatus.dev/v1` and
# does NOT support self-host — see STATUS-PAGE.md "CLI does not target
# self-host". On self-host, monitors are applied via the dashboard UI;
# this YAML is the source-of-truth for what was configured, not a file
# any tool currently consumes. ANY change here therefore also needs the
# matching dashboard click — tracked as a launch-checklist item (OBS-13).
#
# `regions` references the private-location probe registered on the VPS.
# In the dashboard the location is named "OVH EU"; reconcile any internal
# slug at apply time.
#
# Sleeping-page awareness (OBS-12): a cold-paused env serves HTTP 503 from
# the `afframe-sleeping` Cloudflare Worker (infra/cloudflare-sleeping/ —
# HTML page, JSON `{"error":"service_unavailable"}` on api hosts). Staging
# parks ~6 days/week, so its monitors must treat that deliberate 503 as OK.
# The distinguishing failure while parked is Cloudflare error 1033 / HTTP
# 530 (tunnel dead, no sleeping route bound) — hence `statusCode not_eq 530`
# on the staging monitors instead of `eq 200`. Production monitors stay
# strict (`eq 200`): post-launch prod runs 24/7 (LAUNCH-CHECKLIST #2) and a
# sleeping page in a customer's face IS an incident. Until that un-park
# happens, expect the prod monitors to read "down" while prod is
# deliberately paused — pause them in the dashboard if the noise matters.

web-app-prod:
  name: "App (production)"
  description: "afframe.com web app reachability — app.afframe.com/api/version"
  frequency: "1m"
  active: true # OBS-09: production deployed since 2026-05 — monitor it
  regions:
    - ovh-eu
  retry: 3
  kind: http
  request:
    url: https://app.afframe.com/api/version
    method: GET
    headers:
      User-Agent: openstatus-afframe
  assertions:
    - kind: statusCode
      compare: eq
      target: 200

api-prod:
  name: "API (production)"
  description: "afframe.com API health — api.afframe.com/api/health, body must report ok"
  frequency: "1m"
  active: true # OBS-09
  regions:
    - ovh-eu
  retry: 3
  kind: http
  request:
    url: https://api.afframe.com/api/health
    method: GET
    headers:
      User-Agent: openstatus-afframe
  assertions:
    - kind: statusCode
      compare: eq
      target: 200
    - kind: textBody
      compare: contains
      target: '"status":"ok"'

admin-prod:
  name: "Admin (production)"
  description: "afframe.com admin app reachability — admin.afframe.com/api/health"
  frequency: "1m"
  active: true # OBS-09
  regions:
    - ovh-eu
  retry: 3
  kind: http
  request:
    url: https://admin.afframe.com/api/health
    method: GET
    headers:
      User-Agent: openstatus-afframe
  assertions:
    - kind: statusCode
      compare: eq
      target: 200
    - kind: textBody
      compare: contains
      target: '"ok":true'

bot-worker:
  name: "Dev bot (Cloudflare Worker)"
  description: "bot.afframe.com/health — the single choke point for EVERY alert path (errors, alarms, asks). OBS-11: if the Worker dies, all alerting dies silently; this is the external watchdog's watchdog (the GHA bot-watchdog covers it from a third failure domain)."
  frequency: "5m"
  active: true
  regions:
    - ovh-eu
  retry: 3
  kind: http
  request:
    url: https://bot.afframe.com/health
    method: GET
    headers:
      User-Agent: openstatus-afframe
  assertions:
    - kind: statusCode
      compare: eq
      target: 200
    - kind: textBody
      compare: contains
      target: '"ok":true'

dns-afframe:
  name: "DNS (afframe.com)"
  description: "afframe.com apex DNS resolution"
  frequency: "5m"
  active: true
  regions:
    - ovh-eu
  retry: 3
  kind: dns
  request:
    url: afframe.com
  assertions:
    # The self-host dashboard requires a target value for DNS assertions —
    # `Not Equal 0.0.0.0` passes for any real IP returned (Cloudflare proxy
    # returns 104.x / 172.67.x ranges). Effectively asserts "DNS resolves".
    - kind: dnsRecord
      key: A
      compare: not_eq
      target: "0.0.0.0"

# Staging monitors (OBS-12): sleeping-page-aware. Staging is parked ~6
# days/week; the deliberate 503 sleeping page must NOT read as "down".
# `statusCode not_eq 530` means: anything the tunnel/edge can still serve
# (200 live, 503 asleep) is OK; Cloudflare error 1033/530 — tunnel dead
# with no sleeping route bound, the genuinely-broken state — alarms.
# Trade-off (accepted): an in-app 5xx while staging is AWAKE does not trip
# these monitors; deploy smoke + the prod-parity monitors above carry that.

staging-web:
  name: "App (staging)"
  description: "app-staging.afframe.com web app — private, kept off the public status page. Sleeping-page-aware: 200 (live) and 503 (parked) both pass; only 530 (tunnel down) fails."
  frequency: "5m"
  active: true
  regions:
    - ovh-eu
  retry: 3
  kind: http
  request:
    url: https://app-staging.afframe.com/api/version
    method: GET
    headers:
      User-Agent: openstatus-afframe
  assertions:
    - kind: statusCode
      compare: not_eq
      target: 530

staging-api:
  name: "API (staging)"
  description: "api-staging.afframe.com API health — private, kept off the public status page. Sleeping-page-aware: 200 (live) and 503 (parked) both pass; only 530 (tunnel down) fails."
  frequency: "5m"
  active: true
  regions:
    - ovh-eu
  retry: 3
  kind: http
  request:
    url: https://api-staging.afframe.com/api/health
    method: GET
    headers:
      User-Agent: openstatus-afframe
  assertions:
    - kind: statusCode
      compare: not_eq
      target: 530

staging-admin:
  name: "Admin (staging)"
  description: "admin-staging.afframe.com admin app — private, kept off the public status page. Sleeping-page-aware: 200 (live) and 503 (parked) both pass; only 530 (tunnel down) fails."
  frequency: "5m"
  active: true
  regions:
    - ovh-eu
  retry: 3
  kind: http
  request:
    url: https://admin-staging.afframe.com/api/health
    method: GET
    headers:
      User-Agent: openstatus-afframe
  assertions:
    - kind: statusCode
      compare: not_eq
      target: 530
