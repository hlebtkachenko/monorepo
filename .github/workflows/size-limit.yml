name: Size limit

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "pnpm-lock.yaml"

permissions: {}

concurrency:
  group: size-limit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  size:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.1
      - uses: ./.github/actions/setup
      - name: Build web app
        run: pnpm --filter web build
      - uses: andresz1/size-limit-action@5fe1fa4e0fffafdde62a8de63d44e9ff7be99e15 # v1.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          package_manager: pnpm
          directory: apps/web
          script: pnpm size
          skip_step: install
