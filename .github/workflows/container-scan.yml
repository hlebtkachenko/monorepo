name: Container Scan

# Scans web, api, and admin app images on PRs that touch their Dockerfile,
# dockerignore, or per-app dependency surface. Each service runs as a
# separate matrix job — adding a 4th app means one entry in `matrix.app`.
# Each guard step short-circuits the matrix item when its Dockerfile
# doesn't exist yet, so the workflow stays green on partial-rollout PRs.

on:
  push:
    branches: [main]
    paths:
      - "apps/web/Dockerfile"
      - "apps/web/.dockerignore"
      - "apps/web/package.json"
      - "apps/api/Dockerfile"
      - "apps/api/.dockerignore"
      - "apps/api/package.json"
      - "apps/admin/Dockerfile"
      - "apps/admin/.dockerignore"
      - "apps/admin/package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/container-scan.yml"
  pull_request:
    paths:
      - "apps/web/Dockerfile"
      - "apps/web/.dockerignore"
      - "apps/web/package.json"
      - "apps/api/Dockerfile"
      - "apps/api/.dockerignore"
      - "apps/api/package.json"
      - "apps/admin/Dockerfile"
      - "apps/admin/.dockerignore"
      - "apps/admin/package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/container-scan.yml"

permissions: {}

concurrency:
  group: container-scan-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  trivy:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        app: [web, api, admin]
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - id: guard
        name: Detect Dockerfile presence
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "apps/${{ matrix.app }}/Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/${{ matrix.app }}/Dockerfile not present yet — skipping ${{ matrix.app }} container scan."
          fi

      # 1. Filesystem scan — runs even before a Dockerfile exists, but only on
      # PRs that touch the watched paths. Catches dependency CVEs in the lock
      # file ahead of any image build.
      - if: steps.guard.outputs.exists == 'true'
        name: Trivy filesystem scan
        # SHA-pinned post the March 2026 supply-chain incident — re-verify if
        # aquasecurity ever force-pushes the tag (SHA pin defends against that).
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ./apps/${{ matrix.app }}
          format: sarif
          output: trivy-fs-${{ matrix.app }}.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: "true"
          skip-dirs: "node_modules,.next"

      - if: steps.guard.outputs.exists == 'true' && always()
        name: Upload Trivy filesystem SARIF
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # zizmor: ignore[impostor-commit]
        with:
          sarif_file: trivy-fs-${{ matrix.app }}.sarif
          category: trivy-filesystem-${{ matrix.app }}

      # 2. Image scan — only when a Dockerfile exists. Builds locally with no
      # push, then scans. linux/arm64 mirrors the eventual ECR Graviton target.
      - if: steps.guard.outputs.exists == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - if: steps.guard.outputs.exists == 'true'
        name: Build local image (no push)
        # docker/build-push-action instead of a raw `docker buildx build` so
        # the GitHub Actions cache backend (type=gha) is wired up — the raw
        # CLI has no access to ACTIONS_RUNTIME_TOKEN. Mirrors the deploy
        # pipeline's cache setup (_deploy-aws.yml build-images job) with a
        # scan-scoped cache key, cutting the QEMU arm64 rebuild (~150-237s
        # per app cold) to a cache-hit restore on unchanged layers (CICD-06).
        # provenance/sbom off to keep a single loadable image manifest.
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: local/${{ matrix.app }}:scan
          provenance: false
          sbom: false
          cache-from: type=gha,scope=scan-${{ matrix.app }}
          cache-to: type=gha,scope=scan-${{ matrix.app }},mode=max

      - if: steps.guard.outputs.exists == 'true'
        name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: local/${{ matrix.app }}:scan
          format: sarif
          output: trivy-image-${{ matrix.app }}.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: "true"

      - if: steps.guard.outputs.exists == 'true' && always()
        name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # zizmor: ignore[impostor-commit]
        with:
          sarif_file: trivy-image-${{ matrix.app }}.sarif
          category: trivy-container-${{ matrix.app }}
