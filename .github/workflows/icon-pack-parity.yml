# Icon-pack parity gate.
#
# `packages/ui/src/icon-packs/` ships three swappable packs (lucide,
# phosphor, fontawesome). Every pack MUST export exactly the names in
# `ICON_NAMES` (types.ts). `satisfies IconMap` catches drift at compile
# time ONLY when the pack file is edited+typechecked in the same PR — a
# pack that's accidentally not imported, or a name added to ICON_NAMES
# without updating every pack, drifts silently. Dependabot covers the
# npm deps but cannot catch parity drift. This is that gate.
#
# Advisory until Hleb flips it required (see docs/conventions/CI-POLICY.md).
# NOT path-filtered at the trigger level: a required check behind a paths
# filter reads as "missing" to the rule engine on unrelated PRs. The job
# therefore runs on EVERY PR (so it always reports and can safely become
# required later), but the expensive part (pnpm setup + the parity check)
# is gated on a change-detection step — a PR touching no icon-pack code
# reports green in seconds instead of spending ~2m installing to no effect.

name: icon-pack-parity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: icon-pack-parity-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  parity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # dorny/paths-filter on pull_request events
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            ui:
              - 'packages/ui/src/icon-packs/**'
              - 'packages/ui/package.json'
              - '.github/workflows/icon-pack-parity.yml'
              - '.github/actions/setup/**'
      - if: steps.changes.outputs.ui == 'true'
        uses: ./.github/actions/setup

      - name: Icon pack parity
        if: steps.changes.outputs.ui == 'true'
        run: pnpm --filter @workspace/ui check:icon-packs

      - name: No icon-pack changes — parity check skipped
        if: steps.changes.outputs.ui != 'true'
        run: echo "No packages/ui/src/icon-packs changes — parity check skipped (reports green)."
