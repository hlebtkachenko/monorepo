# Update check for the vendored FÚ EPO XSD schemas (packages/filing/schemas/fu/).
# Dependabot cannot track these — they are verbatim copies of the official schemas
# published by the Finanční správa at adisspr.mfcr.cz, not an npm package. The MF
# serves the CURRENT version at a fixed URL (no version in the path), so this re-
# fetches each schema and compares its hash against the vendored copy; any drift
# means the MF published a new version to review + re-vendor. Advisory.

name: FÚ EPO schema update check

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compare vendored vs live FÚ schemas
        id: check
        run: |
          set -euo pipefail
          drift=""
          check_one() {
            local code="$1" url="$2"
            local vendored
            vendored=$(find "packages/filing/schemas/fu/${code}" -name '*.xsd' | head -1)
            if [ -z "$vendored" ]; then return; fi
            local live_hash vend_hash
            live_hash=$(curl -sSL -m 60 "$url" | sha256sum | cut -d' ' -f1 || true)
            vend_hash=$(sha256sum "$vendored" | cut -d' ' -f1)
            echo "${code}: vendored=$vend_hash live=$live_hash"
            if [ -n "$live_hash" ] && [ "$live_hash" != "$vend_hash" ]; then
              drift="${drift} ${code}"
            fi
          }
          check_one dphdp3 "https://adisspr.mfcr.cz/adis/jepo/schema/dphdp3_epo2.xsd"
          check_one dphkh1 "https://adisspr.mfcr.cz/adis/jepo/schema/dphkh1_epo2.xsd"
          check_one dppo "https://adisspr.mfcr.cz/adis/jepo/schema/dppdp9_epo2.xsd"
          drift=$(echo "$drift" | xargs || true)
          if [ -n "$drift" ]; then
            {
              echo "has_updates=true"
              echo "drift=$drift"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing issue
        if: steps.check.outputs.has_updates == 'true'
        id: existing
        run: |
          COUNT=$(gh issue list --label fu-epo-schema-update --state open --json number --jq length)
          echo "exists=$COUNT" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue
        if: steps.check.outputs.has_updates == 'true' && steps.existing.outputs.exists == '0'
        run: |
          gh issue create \
            --title "chore: FÚ EPO schema drift (${{ steps.check.outputs.drift }})" \
            --label fu-epo-schema-update \
            --body "The live FÚ schema(s) at adisspr.mfcr.cz differ from the vendored copies under packages/filing/schemas/fu/ (${{ steps.check.outputs.drift }}). The Finanční správa likely published a new version. Re-fetch the XSD, vendor it under a new version directory, run \`pnpm --filter @workspace/filing gen:schemas\`, and register it in src/validate/registry.ts."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
