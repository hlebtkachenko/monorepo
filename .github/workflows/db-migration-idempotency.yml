name: DB migration idempotency

# Applies migrations twice and diffs the pg_dump output — any diff means
# the runner applied something on the second pass, which is a bug.
#
# Required-check shim pattern (same as boundaries.yml / knip.yml): triggers
# on every PR, `changes` does path detection internally, the
# `db-migration-idempotency` aggregator owns the stable check name
# (paths-filter trap, #295).

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: db-idempotency-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            relevant:
              - 'packages/db/migrations/**'
              - '.github/workflows/db-migration-idempotency.yml'

  db-migration-idempotency-run:
    name: Apply migrations twice, diff schema
    needs: [changes]
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Wait for postgres
        run: |
          set -euo pipefail
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do
            echo "waiting for postgres..."
            sleep 2
          done

      - name: Install pg client 18 via PGDG apt repo
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          # Ubuntu 24.04 default repos don't carry postgresql-18.
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          codename=$(. /etc/os-release && echo "$VERSION_CODENAME")
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${codename}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-18

      - name: Bootstrap roles and default privileges
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          for f in infra/compose/postgres/init.d/*.sql; do
            echo "Applying $f"
            psql -h 127.0.0.1 -p 5432 -U postgres -f "$f"
          done

      - name: Apply migrations (first pass)
        env:
          DATABASE_DIRECT_URL: postgresql://app_owner:dev_owner@127.0.0.1:5432/postgres
          DATABASE_URL: postgresql://app_owner:dev_owner@127.0.0.1:5432/postgres
        run: pnpm --filter @workspace/db db:migrate

      - name: Dump schema after first pass
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: app_owner
          PGPASSWORD: dev_owner
          PGDATABASE: postgres
        run: |
          # Route through scripts/db-schema-snapshot.sh which already strips
          # pg_dump's random \restrict / \unrestrict tokens (PG18) — without
          # this filter two consecutive dumps differ by their session tokens
          # even when the schema is identical.
          set -euo pipefail
          export PATH="/usr/lib/postgresql/18/bin:$PATH"
          chmod +x scripts/db-schema-snapshot.sh
          scripts/db-schema-snapshot.sh > /tmp/first.sql

      - name: Apply migrations (second pass — should be no-op)
        env:
          DATABASE_DIRECT_URL: postgresql://app_owner:dev_owner@127.0.0.1:5432/postgres
          DATABASE_URL: postgresql://app_owner:dev_owner@127.0.0.1:5432/postgres
        run: pnpm --filter @workspace/db db:migrate

      - name: Dump schema after second pass
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: app_owner
          PGPASSWORD: dev_owner
          PGDATABASE: postgres
        run: |
          set -euo pipefail
          export PATH="/usr/lib/postgresql/18/bin:$PATH"
          scripts/db-schema-snapshot.sh > /tmp/second.sql

      - name: Diff schemas (any diff = non-idempotent migration)
        run: |
          set -euo pipefail
          if ! diff /tmp/first.sql /tmp/second.sql; then
            echo "::error::Schema changed on second migration pass — migrations are not idempotent."
            exit 1
          fi
          echo "Schema is identical after two passes. Migrations are idempotent."

  # Aggregation shim. `db-migration-idempotency` is the stable status-check
  # name for the ruleset required-check flip. Treats `skipped` as success.
  db-migration-idempotency:
    needs: [changes, db-migration-idempotency-run]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Aggregate db-migration-idempotency result
        run: |
          if echo '${{ join(needs.*.result, ',') }}' | grep -qE 'failure|cancelled'; then
            echo "db-migration-idempotency failed."; exit 1
          fi
          echo "db-migration-idempotency passed (or skipped — no migration changes)."
